<!DOCTYPE html>
<html lang="de">
<head>
<script>
/* === Disky Website-Demo: echte App, sichere Demo-Daten (Platten + Datei-Baum), per Scroll fernsteuerbar === */
(function(){
  try{
    localStorage.setItem('disky_onboarded','1');
    var L=new URLSearchParams(location.search).get('lang'); localStorage.setItem('disky_lang', L||'en');
    localStorage.setItem('disky_autoscan','0');
  }catch(e){}
  var curView=null;
  function waitFor(sel,cb,tries){ tries=tries||0; var el=document.querySelector(sel); if(el){ cb(el); } else if(tries<50){ setTimeout(function(){ waitFor(sel,cb,tries+1); },120); } }
  function gotoView(v){ if(v===curView) return; curView=v; waitFor('.nav[data-v="'+v+'"]',function(el){ el.click(); }); }
  function typeInto(inp,query,done){ inp.focus({preventScroll:true}); inp.value=''; var i=0;   // preventScroll: Fokus im iframe darf den Eltern-Scroll NICHT zum iframe springen lassen (Zurückspringen-Bug, Defense-in-Depth)
    (function step(){ if(i>query.length){ done&&done(); return; } inp.value=query.slice(0,i);
      inp.dispatchEvent(new Event('input',{bubbles:true})); i++; setTimeout(step, i<3?260:90); })(); }
  // Demo: Deep Search öffnen, „Alle"-Linse, Query live eintippen → Treffer zeigen die Platte (auch abgesteckt)
  function demoSearch(query,lens){
    curView='search';
    waitFor('.nav[data-v="search"]',function(nav){ nav.click();
      waitFor('.deep-pill[data-mode="'+(lens||'all')+'"]',function(pill){
        if(!pill.classList.contains('on')) pill.click();
        setTimeout(function(){ waitFor('#deepQ',function(inp){ typeInto(inp,query); }); }, 220);
      });
    });
  }
  window.addEventListener('message', function(e){
    var d=e&&e.data; if(!d) return;
    if('diskyVis' in d){ window.__diskyPaused = !d.diskyVis; try{ document.documentElement.classList.toggle('disky-paused', !d.diskyVis); }catch(_){}; }   // Parent meldet Sichtbarkeit → Starfield UND alle CSS-Animationen pausieren, während der Parent scrollt (kein Cross-Process-Paint im kritischen Scroll-Fenster)
    if(d.diskyDemo==='search'){ demoSearch(d.q||'Nordsee', d.lens||'all'); return; }
    if(d.diskyView){ gotoView(d.diskyView); }
  });
  // Handshake: dem Parent melden, sobald die geseedete App-Navigation gerendert ist (NICHT vor dem Seed-Reload)
  function pingReady(){ (function rdy(){ if(document.querySelector('.nav')){ try{ parent.postMessage({diskyReady:1},'*'); }catch(e){} } else setTimeout(rdy,150); })(); }
  var SEED_VER='7';   // bei Änderung der Seed-Daten/-Logik hochzählen → erzwingt sauberen Re-Seed
  var TB=1e12, GB=1e9;
  var drives=[
    {label:'T9', driveType:'t9', bytes:2.3*TB, capacityBytes:3.6*TB, fileCount:18000, volumeName:'T9'},
    {label:'LaCie Rugged', driveType:'ssd', bytes:4.2*TB, capacityBytes:4.5*TB, fileCount:24000, volumeName:'LaCie Rugged'},
    {label:'Studio RAID', driveType:'ssd', bytes:10.9*TB, capacityBytes:29.1*TB, fileCount:41000, volumeName:'Studio RAID'},
    {label:'Archive 2023', driveType:'ssd', bytes:7.0*TB, capacityBytes:7.3*TB, fileCount:22000, volumeName:'Archive 2023'},
    {label:'Sony A7S', driveType:'ssd', bytes:381*GB, capacityBytes:476*GB, fileCount:7594, volumeName:'Sony A7S'},
    {label:'Macintosh HD', driveType:'mac', bytes:0.62*TB, capacityBytes:1.0*TB, fileCount:9240, volumeName:'Macintosh HD', internal:true, scannedAt:Date.now()-1000*60*60*5}
  ];
  function MB(n){ return Math.round(n*1048576); }
  function GBy(n){ return Math.round(n*1073741824); }
  function genFiles(ids){
    var F=[], h=1, DAY=86400000, NOW=Date.now();
    var REC=NOW-9*DAY, MIDR=NOW-70*DAY, OLD=NOW-260*DAY;   // kürzlich aktiv · mittel · lange inaktiv (>6 Mon)
    function add(d,proj,sub,name,ext,size,hash,mt){
      var rel=proj+'/'+(sub?sub+'/':'')+name+'.'+ext;
      F.push({driveId:ids[d], project:proj, relPath:rel, name:name+'.'+ext, ext:'.'+ext, size:size, mtime:mt||0, hash:hash||('h'+(h++))});
    }
    var i;
    // Wedding — fertig (Export vorhanden), aber nur teilweise gesichert → „Wirklich fertig?"-Review
    for(i=1;i<=16;i++) add(0,'Wedding Mai 2026','RAW','IMG_'+(1000+i),'cr3',MB(26+(i%6)*3),null,MIDR);
    for(i=1;i<=7;i++) add(0,'Wedding Mai 2026','Footage','A001_C0'+(10+i),'mov',GBy(1.4), i<=5?('DUPW'+i):null, MIDR);
    add(0,'Wedding Mai 2026','Export','wedding_film','mp4',GBy(7.8),null,MIDR);
    add(0,'Wedding Mai 2026','Project','wedding','prproj',MB(72),null,MIDR);
    for(i=1;i<=10;i++) add(0,'Wedding Mai 2026','Cache','proxy_'+i,'mxf',GBy(0.55),null,MIDR);
    // Berlin Citytrip — frisches Rohmaterial, noch kein Backup → ROT
    for(i=1;i<=12;i++) add(0,'Berlin Citytrip','Footage','B0'+(20+i),'mp4',GBy(0.85),null,REC);
    for(i=1;i<=6;i++) add(0,'Berlin Citytrip','Stills','DSC_'+(700+i),'jpg',MB(9),null,REC);
    // Client Nova Ad — fertig UND auf zwei Platten gesichert → GRÜN (freigebbar)
    for(i=1;i<=8;i++) add(1,'Client Nova Ad','Footage','N0'+(10+i),'mov',GBy(2.1),'NOVA'+i,OLD);
    add(1,'Client Nova Ad','Export','nova_30s_final','mp4',GBy(4.4),'NOVAEX',OLD);
    add(1,'Client Nova Ad','Project','nova','aep',MB(180),null,OLD);
    for(i=1;i<=8;i++) add(2,'Client Nova Ad','Footage','N0'+(10+i),'mov',GBy(2.1),'NOVA'+i,OLD);
    add(2,'Client Nova Ad','Export','nova_30s_final','mp4',GBy(4.4),'NOVAEX',OLD);
    for(i=1;i<=5;i++) add(1,'Wedding Mai 2026','Footage','A001_C0'+(10+i),'mov',GBy(1.4),'DUPW'+i,MIDR);
    // Doku Nordsee — überwiegend, aber nicht vollständig gesichert → GELB (teilweise)
    for(i=1;i<=14;i++) add(2,'Doku Nordsee','Footage','C'+(100+i),'braw',GBy(3.2), i<=12?('DUPN'+i):null, MIDR);
    add(2,'Doku Nordsee','Export','nordsee_master','mov',GBy(8.0),'DUPNEX',MIDR);
    for(i=1;i<=9;i++) add(2,'Doku Nordsee','Cache','render_'+i,'mxf',GBy(1.1),null,MIDR);
    for(i=1;i<=20;i++) add(2,'Archive 2022','Photos','2022_'+(100+i),'dng',MB(45),null,OLD);
    for(i=1;i<=12;i++) add(3,'Doku Nordsee','Footage','C'+(100+i),'braw',GBy(3.2),'DUPN'+i,MIDR);
    add(3,'Doku Nordsee','Export','nordsee_master','mov',GBy(8.0),'DUPNEX',MIDR);
    for(i=1;i<=10;i++) add(3,'Misc','Documents','scan_'+(20+i),'pdf',MB(4),null,OLD);
    for(i=1;i<=18;i++) add(4,'B-Roll Library','Nature','underwater_'+(10+i),'mp4',GBy(0.7),null,OLD);
    for(i=1;i<=8;i++) add(4,'B-Roll Library','City','street_'+(10+i),'mp4',GBy(0.5),null,OLD);
    // Macintosh HD (interne SSD) — laufendes Projekt liegt nur lokal → ROT, aktiv → „auf Archiv auslagern"
    for(i=1;i<=10;i++) add(5,'Reel Sommer 2026','Footage','R0'+(10+i),'mov',GBy(1.2),null,REC);
    add(5,'Reel Sommer 2026','Selects','reel_sommer_v3','mp4',GBy(3.1),null,REC);
    add(5,'Reel Sommer 2026','Project','reel_sommer','prproj',MB(58),null,REC);
    for(i=1;i<=8;i++) add(5,'Reel Sommer 2026','Cache','peak_'+i,'pek',MB(140),null,REC);
    for(i=1;i<=12;i++) add(5,'Photos Library','Masters','PH_'+(100+i),'heic',MB(8),null,REC);
    for(i=1;i<=4;i++) add(5,'Wedding Mai 2026','Footage','A001_C0'+(10+i),'mov',GBy(1.4),'DUPW'+i,MIDR);
    return F;
  }
  function ensureStores(db){
    if(!db.objectStoreNames.contains('drives')) db.createObjectStore('drives',{keyPath:'id',autoIncrement:true});
    if(!db.objectStoreNames.contains('files')){ var f=db.createObjectStore('files',{keyPath:'id',autoIncrement:true}); f.createIndex('driveId','driveId'); f.createIndex('hash','hash'); }
  }
  function done(){ try{sessionStorage.setItem('diskyDemoSeeded',SEED_VER);}catch(e){} }   // NUR bei erfolgreichem Seed
  function runSeed(){
   try{
    var r=indexedDB.open('drivecat',1);
    r.onupgradeneeded=function(e){ ensureStores(e.target.result); };
    r.onsuccess=function(){ var db=r.result;
      try{
        var t=db.transaction(['drives','files'],'readwrite'); var ds=t.objectStore('drives'); var fs=t.objectStore('files');
        ds.clear(); fs.clear();   // alte Demo-Daten weg (gleiche Transaktion wie das Re-Add der Drives → atomar)
        var ids=[];
        drives.forEach(function(d,idx){ var req=ds.add(d); req.onsuccess=function(){ ids[idx]=req.result; }; });
        t.oncomplete=function(){
          try{
            var t2=db.transaction(['files'],'readwrite'); var fs2=t2.objectStore('files');
            genFiles(ids).forEach(function(f){ fs2.add(f); });
            t2.oncomplete=function(){ done(); location.reload(); };   // erst JETZT als geseedet markieren + neu laden
            t2.onerror=function(){ pingReady(); };                    // Fehler → NICHT als done markieren, App trotzdem zeigen
          }catch(err2){ pingReady(); }
        };
        t.onerror=function(){ pingReady(); };
      }catch(err){ pingReady(); }
    };
    r.onerror=function(){ pingReady(); };
   }catch(e){ pingReady(); }
  }
  // Gate: nur überspringen, wenn der Katalog WIRKLICH da ist (genug Dateien + aktuelle Seed-Version). Sonst neu seeden — loop-sicher.
  (function gate(){
    var TRY_KEY='diskySeedTry';
    function attempt(){
      var raw=sessionStorage.getItem(TRY_KEY)||'', parts=raw.split(':'),
          n=(parts[0]===SEED_VER)?(parseInt(parts[1],10)||0):0;   // andere Version → Zähler zurücksetzen
      if(n>=3){ pingReady(); return; }   // max 3 Re-Seed-Versuche/Version → heilt Korrupt-Fälle, aber kein Endlos-Reload
      try{ sessionStorage.setItem(TRY_KEY,SEED_VER+':'+(n+1)); }catch(e){}
      runSeed();
    }
    var o; try{ o=indexedDB.open('drivecat',1); }catch(e){ attempt(); return; }
    o.onupgradeneeded=function(e){ ensureStores(e.target.result); };
    o.onerror=function(){ attempt(); };
    o.onsuccess=function(){ var db=o.result;
      if(!db.objectStoreNames.contains('files')||!db.objectStoreNames.contains('drives')){ db.close(); attempt(); return; }
      if(sessionStorage.getItem('diskyDemoSeeded')!==SEED_VER){ db.close(); attempt(); return; }   // andere/keine Seed-Version → sauber neu seeden
      try{
        var tx=db.transaction(['drives','files'],'readonly');
        var dg=tx.objectStore('drives').getAll(), fg=tx.objectStore('files').getAll();
        tx.oncomplete=function(){ db.close();
          var dr=dg.result||[], fl=fg.result||[], ids={}; dr.forEach(function(d){ ids[d.id]=1; });
          var orphan=false; for(var i=0;i<fl.length;i++){ if(!ids[fl[i].driveId]){ orphan=true; break; } }   // Datei mit toter driveId → würde als „?" erscheinen
          if(fl.length>=100 && !orphan) pingReady();   // genug Daten + ALLE driveIds gültig → los
          else attempt();                                // leer / verwaist / inkonsistent → sauber neu seeden (Selbstheilung)
        };
        tx.onerror=function(){ db.close(); attempt(); };
      }catch(e){ db.close(); attempt(); }
    };
  })();
})();
</script>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Disky — Festplatten-Katalog</title>
<link rel="preconnect" href="https://unpkg.com" crossorigin>
<link rel="preconnect" href="https://prod.spline.design" crossorigin>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
/* CI-Display-Schrift: General Sans (lokal, offline) — fürs Logo & Headlines. UI bleibt SF. */
@font-face{font-family:'General Sans';src:url('fonts/GeneralSans-500.woff2') format('woff2');font-weight:500;font-display:swap}
@font-face{font-family:'General Sans';src:url('fonts/GeneralSans-600.woff2') format('woff2');font-weight:600;font-display:swap}
@font-face{font-family:'General Sans';src:url('fonts/GeneralSans-700.woff2') format('woff2');font-weight:700;font-display:swap}
:root{
  --bg:#0a0c10; --bg2:#0f131a; --card:#12161d; --card2:#171c24; --line:#26323f;
  --txt:#eef1f6; --mut:#9aa4b4; --acc:#4a9eff; --acc2:#3a8af0; --cyan:#37cfe0; --glow:74,158,255;
  --warn:#ffb454; --ok:#4ade80; --danger:#ff6b6b;
  --fdisp:'General Sans',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
}
.sb-brand .wm,.ov-hello,.wtitle,.modal h2,.contbar .ctitle,.bk-sec,.cl-head b{font-family:var(--fdisp)}
/* Animierbare Ring-Füllung (für Constellation) */
@property --ring{syntax:"<number>";inherits:true;initial-value:0}
@keyframes ringIn{from{--ring:0}}
@keyframes growx{from{width:0}}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
/* PERF: während der Parent scrollt (diskyVis:false) ALLE Animationen/Transitions im iframe einfrieren → kein Cross-Process-Paint (z.B. ovHelloSheen background-position, cpitPulse box-shadow) im kritischen Scroll-Fenster */
html.disky-paused *,html.disky-paused *::before,html.disky-paused *::after{animation-play-state:paused!important;transition:none!important}
body{font:14px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:var(--bg);color:var(--txt);-webkit-font-smoothing:antialiased;position:relative}
/* Native-App-Gefühl: UI-Text nicht markierbar; nur echte Inhalte (Eingaben, Datei-Namen/Pfade) erlauben Auswahl */
body{-webkit-user-select:none;user-select:none;cursor:default;-webkit-tap-highlight-color:transparent}
/* alles Klickbare zeigt den Hand-Cursor (signalisiert „hier kann man klicken") */
button:not(:disabled),a[href],[role="button"],[onclick],.cf-row[data-rel],.dhit,.bkp,.leg:not(.file):not(.muted),.dh-name{cursor:pointer}
input,textarea,select,[contenteditable="true"],
.selectable,.dh-name,.dh-loc,.dm-files,.dmf,.dupmodal .dm-files,.kihit-name,.kihit-loc{
  -webkit-user-select:text;user-select:text;cursor:auto}
/* HUD-Ambient: lebendiger Deep-Space-Glow (blau + cyan), driftet langsam */
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(900px 540px at 50% -8%, rgba(42,92,184,.32), transparent 60%),
    radial-gradient(700px 520px at 102% 6%, rgba(20,124,156,.16), transparent 58%),
    radial-gradient(820px 640px at -4% 102%, rgba(40,82,180,.15), transparent 60%);
  opacity:.92}
/* (Hintergrund-Glow ist statisch — eine Dauer-Animation hier zwingt sämtliche backdrop-filter:blur-
   Flächen zu permanenter Neuberechnung und macht die ganze App träge.) */
/* feines HUD-Punktraster über die ganze App (oben dichter, unten sanft ausgeblendet) */
body::after{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:radial-gradient(rgba(122,166,230,.06) 1px, transparent 1.5px);
  background-size:24px 24px;
  -webkit-mask-image:radial-gradient(135% 115% at 50% -5%, #000 52%, transparent 100%);
  mask-image:radial-gradient(135% 115% at 50% -5%, #000 52%, transparent 100%)}
header{padding:16px 24px 0;border-bottom:1px solid var(--line);position:sticky;top:0;
  background:rgba(10,12,16,.82);backdrop-filter:blur(12px);z-index:10}
.topbar{display:flex;align-items:center;gap:14px}
.brand{display:flex;align-items:center;gap:12px;text-decoration:none;color:inherit;cursor:pointer}
.brand:hover .wm{color:var(--acc)}
.brand .logo{width:36px;height:36px;flex:0 0 auto}
.brand .logo svg{width:100%;height:100%;display:block}
.bnames{display:flex;flex-direction:column;gap:1px}
.wm{font-weight:800;font-size:21px;letter-spacing:-.025em;line-height:1.05}
.sub{color:var(--mut);font-size:12.5px;line-height:1.25}
.acct{margin-left:auto;display:flex;align-items:center;gap:12px}
.acctlink{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;cursor:pointer;font:inherit;font-size:13.5px;font-weight:600;color:#cfe0f5;
  background:linear-gradient(180deg,rgba(74,158,255,.15),rgba(74,158,255,.04));
  border:1px solid rgba(74,158,255,.34);border-radius:11px;padding:10px 14px;
  transition:transform .14s,border-color .14s,background .14s,box-shadow .14s}
.acctlink:hover{transform:translateY(-1px);color:#eaf2ff;border-color:rgba(74,158,255,.62);
  background:linear-gradient(180deg,rgba(74,158,255,.22),rgba(74,158,255,.07));box-shadow:0 12px 26px -16px rgba(74,158,255,.95)}
.acctlink .acct-ic{width:16px;height:16px;flex:0 0 auto;display:flex}.acctlink .acct-ic svg{width:100%;height:100%}
.prochip{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:30px;
  background:rgba(74,222,128,.12);border:1px solid rgba(74,222,128,.45);color:#4ade80;font-size:12.5px;font-weight:600}
.tabs{display:inline-flex;gap:3px;margin:16px 0 14px;background:var(--bg2);border:1px solid var(--line);
  border-radius:13px;padding:4px}
.tab{padding:8px 15px;border-radius:9px;background:transparent;cursor:pointer;border:none;
  color:var(--mut);font-weight:600;font-size:13.5px;transition:background .15s,color .15s}
.tab:hover{color:var(--txt)}
.tab.on{background:var(--card2);color:var(--txt);box-shadow:0 1px 3px rgba(0,0,0,.4)}
#q{margin:4px 0 14px;width:100%;padding:12px 15px;border-radius:12px;border:1px solid var(--line);
  background:var(--bg2);color:var(--txt);font-size:14px}
#q:focus{outline:none;border-color:var(--acc)}
main{padding:24px 24px 90px;max-width:1100px;margin:0 auto;position:relative;z-index:1}
.card{background:var(--bg2);border:1px solid var(--line);border-radius:18px;padding:22px 24px;margin-bottom:16px}
.card h2{margin:0 0 12px;font-size:16px;letter-spacing:-.01em}
button.big{font:inherit;font-weight:700;font-size:15px;padding:14px 24px;border:none;border-radius:12px;
  background:linear-gradient(135deg,#56a6ff,#2f93e8 55%,#2fc3d6);color:#fff;cursor:pointer;transition:transform .15s ease,box-shadow .15s,filter .15s;
  box-shadow:0 6px 22px -6px rgba(74,158,255,.55),inset 0 1px 0 rgba(255,255,255,.18)}
button.big:hover{filter:brightness(1.06);transform:translateY(-1px);box-shadow:0 9px 28px -6px rgba(74,158,255,.7),inset 0 1px 0 rgba(255,255,255,.22)}
button.big:disabled{filter:saturate(.4) brightness(.7);box-shadow:none;cursor:default;transform:none}
button.ghost{font:inherit;padding:10px 16px;border:1px solid var(--line);border-radius:11px;
  background:var(--card2);color:var(--txt);cursor:pointer;transition:.15s}
button.ghost:hover{border-color:var(--acc);transform:translateY(-1px)}
button:disabled{opacity:.5;cursor:not-allowed}
input.txt{font:inherit;padding:10px 12px;border-radius:9px;border:1px solid var(--line);
  background:var(--bg);color:var(--txt)}
input.txt:focus{outline:none;border-color:var(--acc)}
table{width:100%;border-collapse:collapse}
th,td{text-align:left;padding:9px 12px;border-bottom:1px solid var(--line);vertical-align:top}
th{color:var(--mut);font-weight:600;font-size:11.5px;text-transform:uppercase;letter-spacing:.05em}
td.num,th.num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
tr:last-child td{border-bottom:none}
.bar{height:8px;background:var(--line);border-radius:5px;overflow:hidden;margin-top:8px}
.bar>i{display:block;height:100%;background:var(--acc);transition:width .3s}
.tag{display:inline-block;background:var(--bg);border:1px solid var(--line);border-radius:6px;
  padding:1px 8px;font-size:12px;margin:1px 4px 1px 0;color:var(--acc)}
.path{color:var(--mut);font-size:12.5px;word-break:break-all}
.dupe .sz{color:var(--warn);font-weight:700}
.muted{color:var(--mut)}
.hide{display:none!important}
.banner{background:#3a2a12;border:1px solid var(--warn);color:#ffd9a0;padding:12px 16px;
  border-radius:10px;margin-bottom:14px;font-size:13.5px}
.row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.spacer{flex:1}
.prog{margin-top:16px}
.prog .nums{font-variant-numeric:tabular-nums;color:var(--mut);font-size:13px;margin-top:6px}
.pill{display:inline-block;background:var(--card2);border:1px solid var(--line);border-radius:20px;
  padding:3px 11px;font-size:12px;color:var(--mut)}
.kpi{display:flex;gap:22px;flex-wrap:wrap;margin:6px 0 2px}
.kpi b{font-size:22px;display:block}
.kpi span{color:var(--mut);font-size:12px}
.empty{text-align:center;color:var(--mut);padding:50px 20px}
.empty .big-emoji{display:block;margin:0 auto 14px;width:46px;height:46px;color:#3f4a5a}
.empty .big-emoji svg{width:100%;height:100%}
a.gh{color:var(--acc);cursor:pointer;text-decoration:none}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--ok);margin-right:6px}
hr{border:none;border-top:1px solid var(--line);margin:14px 0}
select.txt{cursor:pointer}
/* ── Karte / Sunburst ── */
.crumbs{display:flex;align-items:center;gap:6px;flex-wrap:wrap;font-size:13px}
.crumb{cursor:pointer;color:var(--mut);font-weight:600;padding:5px 11px;border-radius:9px;max-width:240px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;background:var(--bg2);border:1px solid var(--line);transition:color .14s,border-color .14s,background .14s}
.crumb:hover{color:var(--txt);border-color:#2c3a4f;background:var(--card2)}
.crumbs .crumb:last-child{color:#dce9f7;cursor:default;background:rgba(74,158,255,.1);border-color:rgba(74,158,255,.32)}
.crumbs .crumb:last-child:hover{background:rgba(74,158,255,.1);border-color:rgba(74,158,255,.32)}
.csep{color:#3b4453;font-size:14px;flex:0 0 auto;-webkit-user-select:none;user-select:none}
.csep{color:var(--mut)}
/* Karten-Kopfzeile: Breadcrumbs links, „zuletzt gescannt · aktualisieren" rechts (interne Platte) */
/* Storage-Map: Platten-Umschalter (Chips) */
.mapdrives{display:flex;flex-wrap:wrap;gap:9px;margin:2px 0 20px}
.mapdrive{display:inline-flex;align-items:center;gap:9px;font:inherit;font-size:13px;font-weight:600;color:var(--mut);background:var(--bg2);border:1px solid var(--line);border-radius:999px;padding:6px 14px 6px 8px;cursor:pointer;transition:color .14s,border-color .14s,background .14s}
.mapdrive:hover{color:var(--txt);border-color:#3a4658}
.mapdrive.on{color:#eaf2ff;background:linear-gradient(180deg,rgba(74,158,255,.18),rgba(74,158,255,.05));border-color:rgba(74,158,255,.5);box-shadow:0 8px 20px -16px rgba(74,158,255,.9)}
.mapdrive-ic{width:26px;height:20px;flex:0 0 auto}.mapdrive-ic svg{width:100%;height:100%}
.maptop{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:18px}
.mapinfo{display:flex;align-items:center;gap:12px;flex:0 0 auto}
.mapinfo-t{color:var(--mut);font-size:12.5px}
.mapinfo-btn{display:inline-flex;align-items:center;gap:7px;font:inherit;font-size:12.5px;font-weight:600;color:#cfe0f5;cursor:pointer;background:var(--bg2);border:1px solid var(--line);border-radius:9px;padding:6px 12px;transition:border-color .14s,background .14s}
.mapinfo-btn:hover{border-color:rgba(74,158,255,.5);background:rgba(74,158,255,.08)}
.mapinfo-btn svg{width:14px;height:14px}
.mapinfo-btn:disabled{opacity:.6;cursor:default}
.mapinfo-btn.spin svg{animation:spin360 .9s linear infinite;transform-origin:center}
@keyframes spin360{to{transform:rotate(360deg)}}
/* Disky-Loader: CI-Ring (Blau→Cyan, Glow) — überall wo etwas lädt, statt „gefreezt"-Gefühl */
.dsky-load{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:15px;padding:64px 20px;min-height:220px;color:var(--mut)}
/* Loader = das Disky-Universum-Logo: die Ringe rotieren 360° um den festen Kern */
.dsky-spin{width:108px;height:108px;flex:0 0 auto}
.dsky-spin.sm{width:74px;height:74px}
.dsky-spin svg{width:100%;height:100%;filter:drop-shadow(0 0 8px rgba(74,158,255,.5))}
.dsky-spin .dorb{transform-box:view-box;transform-origin:50px 50px}
.dsky-spin .dorb.a{animation:dskyOrb 1.5s linear infinite}
.dsky-spin .dorb.b{animation:dskyOrbR 2.1s linear infinite}
.dsky-spin .dnuc{transform-box:view-box;transform-origin:50px 50px;animation:dskyNuc 1.7s ease-in-out infinite}
@keyframes dskyOrb{to{transform:rotate(360deg)}}
@keyframes dskyOrbR{to{transform:rotate(-360deg)}}
@keyframes dskyNuc{0%,100%{transform:scale(1)}50%{transform:scale(1.18)}}
.dsky-load-txt{font-size:12.5px;letter-spacing:.18em;text-transform:uppercase;animation:dskyPulse 1.7s ease-in-out infinite}
@keyframes dskyPulse{0%,100%{opacity:.4}50%{opacity:.9}}
.sunwrap{display:flex;gap:28px;align-items:flex-start;flex-wrap:wrap;position:relative;min-height:280px}
.sun-loading{position:absolute;inset:0;display:grid;place-items:center;z-index:5}
.sunsvg{position:relative;width:520px;max-width:100%;flex:0 0 auto}
.sunsvg svg{width:100%;height:auto;display:block}
.suncenter{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:118px;text-align:center;pointer-events:none}
.suncenter .cname{font-weight:700;font-size:14px;line-height:1.22;
  overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.suncenter .csize{color:var(--acc);font-size:16px;margin-top:4px;font-variant-numeric:tabular-nums;font-weight:600}
.suncenter .cpct{color:var(--mut);font-size:11px;margin-top:1px}
.seg{stroke:var(--bg);stroke-width:.6;stroke-linejoin:round;cursor:pointer;transition:opacity .12s,filter .12s}
.seg:hover,.seg.hot{filter:brightness(1.14)}
.upbtn{transition:fill .15s}
/* Rad „breitet sich aus" beim Fertig-Laden (und beim Reinzoomen) */
#sungrp{animation:sunSpread .55s cubic-bezier(.22,1,.36,1);transform-box:view-box;transform-origin:260px 260px}
@keyframes sunSpread{from{opacity:0;transform:scale(.5)}to{opacity:1;transform:scale(1)}}
/* Liste „klappt auf" (gestaffelt) */
.legend .leg{animation:legIn .34s cubic-bezier(.22,1,.36,1) both}
@keyframes legIn{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
/* Lade-Skeleton: pulsierendes Glow-Rad + Listen-Platzhalter (nahtloser Übergang) */
.sun-skel{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:84%;aspect-ratio:1;border-radius:50%;pointer-events:none;z-index:0;
  background:radial-gradient(circle, transparent 0 23%, rgba(74,158,255,.14) 31%, rgba(55,207,224,.06) 56%, transparent 72%);animation:skelGlow 1.7s ease-in-out infinite}
.sun-skel::before{content:"";position:absolute;inset:16%;border-radius:50%;border:2px solid rgba(74,158,255,.22);
  box-shadow:0 0 48px rgba(74,158,255,.32),inset 0 0 48px rgba(74,158,255,.14);animation:skelRing 1.7s ease-in-out infinite}
@keyframes skelGlow{0%,100%{opacity:.45}50%{opacity:.9}}
@keyframes skelRing{0%,100%{transform:scale(.95);opacity:.5}50%{transform:scale(1.05);opacity:1}}
.leg-skel{display:flex;align-items:center;gap:10px;padding:8px}
.leg-skel .d{width:11px;height:11px;border-radius:50%;background:rgba(74,158,255,.28);flex:0 0 auto;animation:skelGlow 1.7s ease-in-out infinite}
.leg-skel .b{height:11px;border-radius:6px;background:linear-gradient(90deg,rgba(255,255,255,.05),rgba(255,255,255,.12),rgba(255,255,255,.05));background-size:200% 100%;animation:skelShimmer 1.5s linear infinite}
@keyframes skelShimmer{to{background-position:-200% 0}}
.legend{flex:1;min-width:250px}
.legtitle{font-weight:700;margin-bottom:8px;font-size:13.5px;color:var(--mut)}
.leg{display:flex;align-items:center;gap:10px;padding:6px 8px;border-radius:8px;cursor:default}
.leg.nav,.leg.rev,.leg.file{cursor:pointer}
.leg.nav:hover,.leg.rev:hover,.leg.file:hover{background:rgba(255,255,255,.045)}
.lrev{width:13px;height:13px;flex:0 0 auto;color:var(--mut);opacity:0;transition:opacity .12s}
.lrev svg{width:100%;height:100%}
.leg.rev:hover .lrev{opacity:.85}
.leg:hover{background:var(--card2)}
.leg.muted{cursor:default}
.leg.muted:hover{background:transparent}
/* Klick-Feedback auf Datei-Zeile: grün = Platte angeschlossen (öffnet im Finder), rot = nicht angeschlossen */
.leg.lg-ok{animation:legOk .75s ease both}
.leg.lg-no{animation:legNo .7s ease both}
.leg.lg-ok .ldot{animation:legDotOk .75s ease both}
.leg.lg-no .ldot{animation:legDotNo .7s ease both}
@keyframes legOk{0%{background:rgba(74,222,128,.22);box-shadow:inset 0 0 0 1px rgba(74,222,128,.55)}100%{background:transparent;box-shadow:none}}
@keyframes legNo{0%{background:rgba(255,107,107,.22);box-shadow:inset 0 0 0 1px rgba(255,107,107,.55);transform:translateX(0)}15%{transform:translateX(-3px)}45%{transform:translateX(3px)}70%{transform:translateX(-1px)}100%{background:transparent;box-shadow:none;transform:translateX(0)}}
@keyframes legDotOk{0%{box-shadow:0 0 11px 2px rgba(74,222,128,.95)}100%{box-shadow:none}}
@keyframes legDotNo{0%{box-shadow:0 0 11px 2px rgba(255,107,107,.95)}100%{box-shadow:none}}
.ldot{width:11px;height:11px;border-radius:50%;flex:0 0 auto}
.lname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lname svg{width:13px;height:13px;vertical-align:-2px;margin-right:6px;color:var(--mut);opacity:.7}
.lpct{color:var(--mut);font-size:11.5px;width:34px;text-align:right;font-variant-numeric:tabular-nums}
.lsize{color:var(--txt);font-variant-numeric:tabular-nums;font-size:13px;width:78px;text-align:right}
/* ── Pro / Upgrade ── */
.pill.pro{background:rgba(74,222,128,.12);border-color:rgba(74,222,128,.5);color:var(--ok);font-weight:600}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);
  display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;animation:fadein .18s ease}
.modal{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:26px 28px;
  max-width:560px;width:100%;position:relative;box-shadow:0 24px 60px rgba(0,0,0,.5)}
.modal h2{margin:0;font-size:20px}
.modal .x{position:absolute;top:16px;right:18px;background:none;border:none;color:var(--mut);
  font-size:18px;cursor:pointer;line-height:1}
.modal .x:hover{color:var(--txt)}
/* ── Onboarding (Erster Start) ── */
.onb{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;padding:24px;
  background:radial-gradient(120% 100% at 50% 0%,rgba(74,158,255,.12),transparent 55%),rgba(6,9,13,.86);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);animation:fadein .2s ease}
.onb-card{position:relative;width:100%;max-width:560px;background:linear-gradient(180deg,rgba(20,28,40,.9),rgba(12,16,22,.95));
  border:1px solid var(--line);border-radius:22px;padding:36px 38px 28px;overflow:hidden;
  box-shadow:0 40px 90px -40px rgba(0,0,0,.95),inset 0 1px 0 rgba(150,200,255,.12)}
.onb-card::before{content:"";position:absolute;left:0;right:0;top:0;height:1px;background:linear-gradient(90deg,transparent,rgba(120,180,255,.55),rgba(55,207,224,.35),transparent)}
.onb-eyebrow{display:flex;align-items:center;gap:8px;font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#6ea0d8;margin-bottom:14px}
.onb-hero{display:flex;justify-content:center;margin:4px 0 20px}
.onb-hero svg{width:92px;height:92px;filter:drop-shadow(0 0 26px rgba(74,158,255,.5))}
.onb-title{font-family:var(--fdisp),system-ui,sans-serif;font-size:26px;font-weight:800;letter-spacing:-.02em;margin:0 0 10px;line-height:1.12;
  background:linear-gradient(105deg,#fff,#aeb8c6);-webkit-background-clip:text;background-clip:text;color:transparent}
.onb-title .ch-rec{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#4ade80;margin-left:8px;-webkit-text-fill-color:#4ade80}
.onb-desc{color:#aab4c2;font-size:14.5px;line-height:1.55;margin:0 0 22px;max-width:46ch}.onb-desc b{color:#dbe7f5}
.onb-feats{display:flex;flex-direction:column;gap:14px;margin:2px 0 20px}
.onb-feat{display:flex;align-items:center;gap:14px}
.onb-feat-ic{width:38px;height:38px;flex:0 0 auto;display:grid;place-items:center;border-radius:11px;background:rgba(74,158,255,.12);border:1px solid rgba(74,158,255,.28);color:#6ea8e6}
.onb-feat-ic svg{width:19px;height:19px}
.onb-feat b{display:block;font-size:14.5px;color:#eef2f7;font-weight:600}.onb-feat span{font-size:12.5px;color:var(--mut)}
.onb-note{display:flex;align-items:center;gap:9px;font-size:12.5px;color:#8fd6a0;background:rgba(74,222,128,.07);border:1px solid rgba(74,222,128,.22);border-radius:11px;padding:10px 13px;margin:0}
.onb-note svg{width:16px;height:16px;flex:0 0 auto}
.onb-choices{display:flex;flex-direction:column;gap:12px;margin:2px 0 20px}
.onb-choice{display:flex;align-items:flex-start;gap:13px;text-align:left;width:100%;font:inherit;cursor:pointer;color:var(--txt);
  background:var(--bg2);border:1.5px solid var(--line);border-radius:14px;padding:15px 16px;transition:border-color .14s,background .14s}
.onb-choice:hover{border-color:#3a4658}
.onb-choice.on{border-color:rgba(74,158,255,.6);background:linear-gradient(180deg,rgba(74,158,255,.1),rgba(74,158,255,.02))}
.onb-choice-rd{width:18px;height:18px;flex:0 0 auto;margin-top:1px;border-radius:50%;border:2px solid #3a4658;position:relative;transition:border-color .14s}
.onb-choice.on .onb-choice-rd{border-color:var(--acc)}
.onb-choice.on .onb-choice-rd::after{content:"";position:absolute;inset:3px;border-radius:50%;background:var(--acc)}
.onb-choice b{display:block;font-size:14.5px;color:#eef2f7;margin-bottom:3px}.onb-choice span{font-size:12.5px;color:var(--mut);line-height:1.45}
.onb-choice .ch-rec{display:inline;font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#4ade80;margin-left:8px}
.onb-foot{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:8px}
.onb-dots{display:flex;gap:7px}
.onb-dot{width:7px;height:7px;border-radius:50%;background:#2a3342;transition:background .2s,width .2s}
.onb-dot.on{background:var(--acc);width:20px;border-radius:4px}
.onb-actions{display:flex;align-items:center;gap:10px}
.onb-skip{font:inherit;font-size:13px;color:var(--mut);background:none;border:none;cursor:pointer}.onb-skip:hover{color:var(--txt)}
.onb-btn{font:inherit;font-size:14px;font-weight:600;color:#fff;cursor:pointer;border:none;border-radius:11px;padding:11px 22px;
  background:linear-gradient(180deg,#4a9eff,#3a8af0);box-shadow:0 14px 30px -16px rgba(74,158,255,.9);transition:transform .14s}
.onb-btn:hover{transform:translateY(-1px)}
.onb-btn.ghost{background:var(--bg2);border:1px solid var(--line);color:var(--txt);box-shadow:none}
.prices{display:flex;gap:14px;margin:18px 0 6px;flex-wrap:wrap}
.price{flex:1;min-width:200px;background:var(--bg);border:1px solid var(--line);border-radius:14px;
  padding:18px;position:relative;display:flex;flex-direction:column}
.price.best{border-color:var(--acc);box-shadow:0 0 0 1px var(--acc) inset}
.price .badge{position:absolute;top:-10px;right:14px;background:var(--acc);color:#fff;
  font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px}
.price .pt{color:var(--mut);font-weight:600;font-size:13px}
.price .pp{font-size:30px;font-weight:800;margin:6px 0 12px}
.price .pp span{font-size:13px;font-weight:500;color:var(--mut)}
.price ul{list-style:none;padding:0;margin:0 0 16px;flex:1}
.price li{padding:4px 0 4px 22px;position:relative;font-size:13.5px}
.price li:before{content:"✓";position:absolute;left:0;color:var(--ok);font-weight:700}
.price a.big{display:block;text-align:center;text-decoration:none}
.price:not(.best) a.big{background:var(--card2);color:var(--txt);border:1px solid var(--line)}
/* ── Scan-Formular ── */
.scanform{display:flex;gap:16px;flex-wrap:wrap;margin-top:12px}
.typepick{display:flex;gap:8px;flex-wrap:wrap}
.tp{background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:8px 6px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:3px;width:86px;color:var(--mut);font-size:11px;font-family:inherit}
.tp:hover{border-color:var(--acc)}
.tp.sel{border-color:var(--acc);background:#16202e;color:var(--txt)}
.tpimg{width:60px;height:48px}
/* Netflix-artige Icon-Auswahl */
.iconpick{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:12px;margin-top:8px}
.ipk{background:var(--bg);border:1.5px solid var(--line);border-radius:14px;padding:12px 8px 10px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:7px;color:var(--mut);font:inherit;transition:transform .14s,border-color .14s,background .14s}
.ipk:hover{transform:translateY(-3px) scale(1.03);border-color:#37404e;color:var(--txt)}
.ipk.sel{border-color:var(--acc);background:#16202e;color:var(--txt);box-shadow:0 0 0 1px var(--acc),0 8px 22px rgba(74,158,255,.18)}
.ipkimg{width:74px;height:58px}.ipkimg svg{width:100%;height:100%;display:block}
.ipklbl{font-size:11.5px;font-weight:600;text-align:center;line-height:1.2}
.tpimg svg,.driveimg svg{width:100%;height:100%;display:block}
.driveimg{width:60px;height:48px;flex:0 0 auto;margin-right:4px}

.kihero{background:linear-gradient(180deg,rgba(74,158,255,.06),var(--bg2));border-color:#27405f}
.kibadge{display:inline-block;font-size:12px;font-weight:700;color:var(--acc);
  background:rgba(74,158,255,.12);border:1px solid rgba(74,158,255,.4);border-radius:30px;padding:5px 12px;margin-bottom:8px}
.kibar{display:flex;gap:10px}
.kibar input{flex:1;padding:14px 16px;border-radius:13px;border:1px solid var(--line);background:var(--bg);color:var(--txt);font-size:16px}
.kibar input:focus{outline:none;border-color:var(--acc)}
.kichips{margin-top:12px}
.kchip{display:inline-block;background:var(--card2);border:1px solid var(--line);border-radius:20px;
  padding:5px 12px;margin:3px 4px 3px 0;font-size:13px;color:var(--mut);cursor:pointer}
.kchip:hover{border-color:var(--acc);color:var(--txt)}
.kistatus{margin-top:12px;font-size:13px}
.kibuildrow{margin-top:14px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.kibuildrow .big{padding:9px 18px;font-size:14px}
.kigrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px}
.kicard{background:var(--bg2);border:1px solid var(--line);border-radius:14px;overflow:hidden}
.kithumb{position:relative;background:#0b0e13;aspect-ratio:16/10;display:flex;align-items:center;justify-content:center}
.kithumb img{width:100%;height:100%;object-fit:cover;display:block}
.kinothumb{opacity:.4;color:#6b7686;width:30px;height:30px}.kinothumb svg{width:100%;height:100%}
.kiscore{position:absolute;top:8px;right:8px;background:rgba(10,12,16,.8);color:var(--acc);
  font-weight:700;font-size:12px;border-radius:8px;padding:2px 7px}
.kimeta{padding:9px 11px}
.kiname{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kipath{font-size:11.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.aitoggle{display:flex;gap:9px;align-items:flex-start;margin-top:14px;padding:12px 14px;border:1px solid var(--line);
  border-radius:12px;background:rgba(74,158,255,.04);font-size:13px;color:var(--mut);cursor:pointer;line-height:1.45}
.aitoggle input{margin-top:2px;flex:0 0 auto}.aitoggle b{color:var(--txt)}
/* ── Willkommen (erster Scan) ── */
.welcome{position:relative;text-align:center;max-width:640px;margin:34px auto 0;padding:30px 24px 60px}
.wglow{position:absolute;top:-30px;left:50%;transform:translateX(-50%);width:540px;height:380px;border-radius:50%;
  background:radial-gradient(circle,rgba(74,158,255,.18) 0%,rgba(10,12,16,0) 62%);pointer-events:none;z-index:0}
.welcome>*{position:relative;z-index:1}
.wicon{width:100px;height:100px;margin:0 auto 24px}.wicon svg{width:100%;height:100%}
.wtitle{font-size:clamp(26px,4vw,38px);letter-spacing:-.025em;margin:0 0 12px;font-weight:800;
  background:linear-gradient(105deg,#ffffff 0%,#eef2f7 40%,#9aa6b8 100%);-webkit-background-clip:text;background-clip:text;color:transparent;display:inline-block}
.kihero h2{background:linear-gradient(105deg,#ffffff 0%,#eef2f7 40%,#9aa6b8 100%);-webkit-background-clip:text;background-clip:text;color:transparent;display:inline-block}
.wsub{color:var(--mut);font-size:16px;line-height:1.6;max-width:48ch;margin:0 auto 26px}
.wcta{font-size:16px;padding:15px 30px}
.wmeta{color:var(--mut);font-size:13px;margin-top:18px}
.wlink{color:var(--acc);cursor:pointer}.wlink:hover{text-decoration:underline}
.scanbar{display:flex;align-items:center;gap:10px}
/* Native: angeschlossene Laufwerke */
#connected{max-width:680px;margin:34px auto 0}
.connhead{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--mut);font-weight:700;margin-bottom:13px;text-align:left}
.conngrid{display:flex;flex-direction:column;gap:10px}
.conncard{display:flex;align-items:center;gap:14px;background:var(--bg2);border:1px solid var(--line);border-radius:15px;padding:14px 16px}
.conncard .driveimg svg{width:100%;height:100%}
.connname{font-weight:700;font-size:14.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.connmeta{font-weight:500;font-size:11.5px;color:var(--mut);margin-left:4px}
.connsub{color:var(--mut);font-size:12.5px;margin-top:2px}
.connscan{font:inherit;font-weight:600;font-size:13px;padding:9px 17px;border:none;border-radius:10px;background:var(--acc);color:#fff;cursor:pointer;flex:0 0 auto;transition:.15s}
.connscan:hover{background:var(--acc2);transform:translateY(-1px)}
.connchip{flex:0 0 auto;font-size:12.5px;color:#4ade80;background:rgba(74,222,128,.12);border:1px solid rgba(74,222,128,.4);border-radius:20px;padding:6px 12px;display:inline-flex;align-items:center;gap:7px}
.connchip.busy{color:var(--acc);background:rgba(74,158,255,.12);border-color:rgba(74,158,255,.4)}
.connhead-row{display:flex;align-items:center;gap:14px;margin-bottom:13px}
.connhead-row .connhead{margin:0;flex:1}
.asw{display:inline-flex;align-items:center;gap:9px;cursor:pointer;user-select:none}
.asw input{position:absolute;opacity:0;width:0;height:0}
.asw-track{width:34px;height:20px;border-radius:20px;background:#2a3340;position:relative;transition:.18s;flex:0 0 auto}
.asw-track::after{content:"";position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:.18s}
.asw input:checked + .asw-track{background:var(--acc)}
.asw input:checked + .asw-track::after{transform:translateX(14px)}
.asw-lbl{font-size:12.5px;color:var(--mut);font-weight:600}
.bgstatus{display:flex;align-items:center;gap:9px;font-size:13px;color:var(--acc);margin:-4px 0 13px}
.bgspin{width:13px;height:13px;border-radius:50%;border:2px solid rgba(74,158,255,.3);border-top-color:var(--acc);animation:bgspin .7s linear infinite;flex:0 0 auto}
@keyframes bgspin{to{transform:rotate(360deg)}}
/* ── Seiten-Hero (Header je Seite) ── */
.phero{position:relative;display:flex;align-items:center;justify-content:space-between;gap:24px;margin:2px 0 22px;padding:22px 26px;border-radius:20px;overflow:hidden;background:radial-gradient(120% 150% at 88% 0,rgba(74,158,255,.14),transparent 58%),linear-gradient(180deg,#11161f,#0c0f15);border:1px solid rgba(74,158,255,.16);box-shadow:inset 0 1px 0 rgba(130,190,255,.22),0 0 60px -30px rgba(74,158,255,.7)}
.phero-txt{position:relative;z-index:1;min-width:0}
.phero-eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:.09em;font-weight:700;color:var(--acc);margin-bottom:7px}
.phero-title{font-family:var(--fdisp),-apple-system,system-ui,sans-serif;font-size:clamp(24px,3vw,34px);font-weight:800;letter-spacing:-.025em;line-height:1.16;margin:0 0 8px;background:linear-gradient(105deg,#ffffff 0%,#eef2f7 40%,#9aa6b8 100%);-webkit-background-clip:text;background-clip:text;color:transparent;display:inline-block}
/* Gradient-Clip-Text clippt Unterlängen (g/y/p/j) bei zu engem line-height → etwas Luft nach unten geben */
.phero-title,.wtitle,.kihero h2,.ov-hello,.onb-title{padding-bottom:.08em}
.phero-desc{color:var(--mut);font-size:14px;line-height:1.5;max-width:560px;margin:0}
.phero-art{position:relative;z-index:1;flex:0 0 auto;width:168px;height:108px}
.phero-art svg{width:100%;height:100%;overflow:visible}
@media(max-width:760px){.phero-art{display:none}.phero{padding:18px 20px}}
@keyframes phFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes phFloat2{0%,100%{transform:translateY(0)}50%{transform:translateY(4px)}}
@keyframes phBlink{0%,100%{opacity:1}50%{opacity:.28}}
@keyframes phSpin{to{transform:rotate(360deg)}}
@keyframes phEq{0%,100%{opacity:.55;transform:scale(1)}50%{opacity:1;transform:scale(1.15)}}
@keyframes phRise{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@keyframes phDup{0%,100%{transform:translate(0,0)}50%{transform:translate(-3px,-2px)}}
.ph-float{animation:phFloat 4s ease-in-out infinite}
.ph-float2{animation:phFloat2 4.6s ease-in-out infinite}
.ph-blink{animation:phBlink 2.4s ease-in-out infinite}
.ph-blink2{animation:phBlink 3.2s ease-in-out infinite}
.ph-spin{animation:phSpin 9s linear infinite;transform-box:view-box;transform-origin:84px 56px}
.ph-eq{animation:phEq 2.6s ease-in-out infinite;transform-box:fill-box;transform-origin:center}
.ph-dup{animation:phDup 3.4s ease-in-out infinite;transform-box:fill-box}
.ph-rise>*{animation:phRise 3s ease-in-out infinite;transform-box:fill-box}
.ph-rise>*:nth-child(2){animation-delay:.3s}.ph-rise>*:nth-child(3){animation-delay:.6s}.ph-rise>*:nth-child(4){animation-delay:.9s}
/* ── Projekte ── */
.pgroup{margin-bottom:12px;background:var(--bg2);border:1px solid var(--line);border-radius:16px;overflow:hidden;transition:border-color .15s}
.pgroup[open]{border-color:#2c3a4f}
.phead{display:flex;align-items:center;gap:12px;margin:0;padding:14px 18px;cursor:pointer;list-style:none}
.phead::-webkit-details-marker{display:none}
.phead:hover{background:rgba(255,255,255,.02)}
.parrow{width:7px;height:7px;border-right:2px solid var(--mut);border-bottom:2px solid var(--mut);transform:rotate(-45deg);transition:transform .15s;flex:0 0 auto;margin-right:1px}
.pgroup[open] .parrow{transform:rotate(45deg)}
.phead .pimg{width:40px;height:32px;flex:0 0 auto}.phead .pimg svg{width:100%;height:100%}
.phead h2{margin:0;font-size:16px;letter-spacing:-.01em}
.phead .ptot{color:var(--mut);font-size:12.5px;margin-left:auto;text-align:right}.phead .ptot b{color:var(--txt)}
/* Sortier-Leiste */
.ptools{display:flex;align-items:center;gap:5px;margin:2px 0 14px;flex-wrap:wrap}
.ptools .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:#5b6675;font-weight:700;margin-right:4px}
.psort{font:inherit;font-size:12.5px;font-weight:600;color:var(--mut);background:none;border:1px solid transparent;border-radius:8px;padding:5px 11px;cursor:pointer;transition:.12s}
.psort:hover{color:var(--txt);background:rgba(255,255,255,.04)}
.psort.on{color:var(--acc);background:rgba(74,158,255,.1);border-color:rgba(74,158,255,.3)}
/* Projekt-Zeilen (Anteil = % der Platte, dezent im Hintergrund) */
.plist{padding:2px 9px 11px}
.prow{position:relative;display:flex;align-items:center;gap:13px;padding:9px 12px;border-radius:10px;cursor:pointer;overflow:hidden;z-index:0}
.prow::before{content:"";position:absolute;left:0;top:0;bottom:0;width:var(--share,0%);background:linear-gradient(90deg,rgba(74,158,255,.15),rgba(74,158,255,.04));z-index:-1;transition:background .15s}
.prow:hover{background:rgba(255,255,255,.025)}
.prow:hover::before{background:linear-gradient(90deg,rgba(74,158,255,.26),rgba(74,158,255,.07))}
.pr-name{font-weight:600;font-size:14px;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pr-files{color:#8a94a3;font-size:12px;flex:0 0 92px;text-align:right;font-variant-numeric:tabular-nums}
.pr-date{color:#6b7686;font-size:12px;flex:0 0 176px;text-align:right;font-variant-numeric:tabular-nums}
.pr-size{font-weight:700;font-size:14px;flex:0 0 84px;text-align:right;letter-spacing:-.01em;font-variant-numeric:tabular-nums}
.pr-share{color:#6b7686;font-size:11.5px;flex:0 0 40px;text-align:right;font-variant-numeric:tabular-nums}
@media(max-width:820px){.pr-date{display:none}}
@media(max-width:560px){.pr-files{display:none}}
.ff{display:flex;flex-direction:column;gap:5px}
.ff label{font-size:11.5px;color:var(--mut)}
.ff .txt{min-width:150px}
/* ── Typ-Aufteilung (Karte) ── */
.typetitle{font-size:12px;color:var(--mut);text-transform:uppercase;letter-spacing:.05em;font-weight:700;margin-bottom:7px}
.typebar{display:flex;height:14px;border-radius:8px;overflow:hidden;background:var(--line)}
.typebar>i{display:block;height:100%}
.tlegend{display:flex;gap:16px;flex-wrap:wrap;margin:10px 0 20px}
.tchip{display:flex;align-items:center;gap:6px;font-size:13px}
.tchip b{font-variant-numeric:tabular-nums}
/* ─────────── Shell: Sidebar + Content ─────────── */
/* Fensterleiste oben: Liquid-Glass — durchgehende Greifzone zum Verschieben (titleBarStyle: hiddenInset) */
.titlebar{position:fixed;top:0;left:0;right:0;height:30px;z-index:40;-webkit-app-region:drag;pointer-events:auto;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(180deg,rgba(36,46,64,.55),rgba(15,20,29,.34));
  -webkit-backdrop-filter:blur(22px) saturate(170%);backdrop-filter:blur(22px) saturate(170%);
  border-bottom:1px solid rgba(150,185,245,.13);
  box-shadow:inset 0 1px 0 rgba(190,215,255,.18),inset 0 -8px 14px -10px rgba(120,170,255,.22),0 2px 14px -6px rgba(0,0,0,.55)}
/* feiner Lichtreflex (specular highlight) wie bei Liquid Glass */
.titlebar::after{content:"";position:absolute;left:84px;right:14px;top:0;height:50%;pointer-events:none;
  background:linear-gradient(180deg,rgba(255,255,255,.10),transparent);border-radius:0 0 40px 40px}
.tb-title{font-family:var(--fdisp),system-ui,sans-serif;font-size:11.5px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;
  color:rgba(198,214,236,.46);text-shadow:0 1px 2px rgba(0,0,0,.45);pointer-events:none;position:relative;z-index:1}
.app-shell{display:flex;min-height:100vh;padding-top:30px;position:relative;z-index:1}
.sidebar{width:250px;flex:0 0 250px;border-right:1px solid var(--line);padding:12px 14px 16px;
  display:flex;flex-direction:column;gap:4px;position:sticky;top:30px;height:calc(100vh - 30px);overflow-y:auto;
  background:rgba(12,15,21,.55);backdrop-filter:blur(10px)}
.sb-brand{display:flex;align-items:center;gap:10px;text-decoration:none;color:inherit;padding:10px 8px 18px}
.sb-brand .logo{width:30px;height:30px;flex:0 0 auto}.sb-brand .logo svg{width:100%;height:100%}
.sb-brand .wm{font-weight:800;font-size:19px;letter-spacing:-.02em}
.sb-nav{display:flex;flex-direction:column;gap:2px}
.nav{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:10px;border:none;background:transparent;
  color:var(--mut);font:inherit;font-weight:600;font-size:14px;cursor:pointer;text-align:left;width:100%;transition:background .12s,color .12s}
.nav:hover{background:var(--card2);color:var(--txt)}
.nav.on{background:linear-gradient(90deg,rgba(74,158,255,.16),rgba(74,158,255,.03));color:#fff;box-shadow:inset 2px 0 0 var(--acc),0 0 22px -10px rgba(74,158,255,.6)}
.nav .ic{width:18px;height:18px;flex:0 0 auto;color:currentColor}.nav.on .ic{color:var(--acc)}.nav .ic svg{width:100%;height:100%}
.sb-scan{margin:14px 0 4px;padding:11px;border:none;border-radius:11px;
  background:linear-gradient(135deg,#56a6ff,#2f93e8 55%,#2fc3d6);color:#fff;
  font:inherit;font-weight:700;font-size:14px;cursor:pointer;transition:filter .15s,transform .15s,box-shadow .15s;
  box-shadow:0 6px 22px -8px rgba(74,158,255,.6),inset 0 1px 0 rgba(255,255,255,.18)}
.sb-scan:hover{filter:brightness(1.07);transform:translateY(-1px);box-shadow:0 10px 28px -8px rgba(74,158,255,.75),inset 0 1px 0 rgba(255,255,255,.22)}
.sb-sec{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:#5b6675;font-weight:700;margin:16px 8px 6px}
.sb-sec-hint{display:flex;align-items:center;gap:5px;text-transform:none;letter-spacing:0;font-weight:500;font-size:10.5px;color:#576472;margin-top:5px}
.sb-sec-hint .sbh-ic{width:11px;height:11px;flex:0 0 auto;color:#5e87b8;opacity:.95}
.sb-sec-row{display:flex;align-items:center;justify-content:space-between}
.sb-manage{font:inherit;text-transform:none;letter-spacing:0;font-size:10.5px;font-weight:600;color:#5e87b8;background:none;border:none;cursor:pointer;padding:0;opacity:.85}
.sb-manage:hover{opacity:1;color:#7fb0e8;text-decoration:underline}
.sb-drive{position:relative;overflow:hidden;display:flex;align-items:center;gap:9px;padding:8px 9px;border-radius:9px;cursor:pointer;color:var(--mut);border:none;background:transparent;width:100%;text-align:left;font:inherit;margin-bottom:4px}
.sb-drive .sbfill{position:absolute;left:0;top:0;bottom:0;width:var(--p,0%);border-radius:9px;pointer-events:none;z-index:0;
  background:linear-gradient(90deg,rgba(96,165,250,.26),rgba(47,127,240,.09));
  box-shadow:inset -1.5px 0 0 rgba(130,190,255,.55);animation:growx .7s cubic-bezier(.22,1,.36,1) both}
.sb-drive:hover{background:var(--card2)}
.sb-drive .di{position:relative;z-index:1;width:26px;height:20px;flex:0 0 auto}.sb-drive .di svg{width:100%;height:100%}
.sb-drive .dn{position:relative;z-index:1;font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;color:#eef2f7;text-shadow:0 1px 3px rgba(7,10,14,.7)}
.sb-drive .ds{position:relative;z-index:1;font-size:11px;font-weight:500;color:#c2ccda;flex:0 0 auto;text-shadow:0 1px 3px rgba(7,10,14,.85)}
.sb-stat{position:relative;z-index:1;width:7px;height:7px;border-radius:50%;flex:0 0 auto;margin-left:3px}
.sb-stat.on{background:#4ade80;box-shadow:0 0 6px rgba(74,222,128,.9)}
.sb-stat.off{background:#39424f}
.sb-drive.sb-off .di{opacity:.5}.sb-drive.sb-off .dn{color:#aeb8c6}
.sb-foot{padding-top:14px;border-top:1px solid var(--line);display:flex;align-items:center;gap:10px;flex-wrap:wrap;font-size:13px}
/* Sprach-Umschalter EN/DE */
.sb-help{margin-top:auto;display:flex;align-items:center;gap:9px;padding:10px 11px;border:1px solid var(--line);border-radius:11px;background:rgba(255,255,255,.02);color:#cfe0f5;font:inherit;font-size:13px;font-weight:600;cursor:pointer;width:100%;text-align:left;transition:background .15s,border-color .15s,transform .15s;-webkit-app-region:no-drag}
.sb-help:hover{border-color:rgba(74,158,255,.55);background:rgba(74,158,255,.1);transform:translateY(-1px)}
.sb-help .hic{width:16px;height:16px;flex:0 0 auto;color:var(--acc)}.sb-help .hic svg{width:100%;height:100%}
.sb-help .htxt{display:flex;flex-direction:column;gap:2px;min-width:0;line-height:1.2}
.sb-help .htitle{font-size:13px;font-weight:600;color:#cfe0f5;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-help .hbadge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:#7ee0a6;white-space:nowrap}
.sb-help .hbadge::before{content:"";width:6px;height:6px;border-radius:50%;background:#4ade80;box-shadow:0 0 6px rgba(74,222,128,.9);flex:0 0 auto}
.sb-lang{margin-top:12px;display:flex;gap:2px;padding:3px;border:1px solid var(--line);border-radius:9px;background:rgba(255,255,255,.02);align-self:flex-start;-webkit-app-region:no-drag}
/* Feedback-Modal */
.fbk{max-width:520px;width:92vw}
.fb-re{display:flex;gap:10px;align-items:flex-start;background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.28);border-radius:12px;padding:11px 13px;margin:6px 0 18px;font-size:13px;color:#c2ecd2;line-height:1.5}
.fb-re .fb-reic{width:17px;height:17px;flex:0 0 auto;color:#7ee0a6;margin-top:1px}.fb-re .fb-reic svg{width:100%;height:100%}
.fb-types{display:flex;gap:8px;margin:0 0 6px}
.fb-type{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;padding:11px 6px;border:1px solid var(--line);border-radius:12px;background:rgba(255,255,255,.02);cursor:pointer;font:inherit;font-size:12.5px;font-weight:600;color:var(--mut);transition:.15s}
.fb-type .em{font-size:18px;line-height:1}
.fb-type:hover{border-color:rgba(74,158,255,.5);color:var(--txt)}
.fb-type.on{border-color:var(--acc);background:rgba(74,158,255,.12);color:#eaf2ff;box-shadow:inset 0 0 0 1px rgba(74,158,255,.4)}
.fb-lbl{display:block;font-size:12px;color:var(--mut);margin:14px 0 5px}
.fb-ta{width:100%;min-height:118px;resize:vertical;padding:12px 14px;border-radius:12px;border:1px solid var(--line);background:rgba(8,11,16,.6);color:var(--txt);font:inherit;font-size:14px;line-height:1.5}
.fb-in{width:100%;padding:11px 13px;border-radius:11px;border:1px solid var(--line);background:rgba(8,11,16,.6);color:var(--txt);font:inherit;font-size:14px}
.fb-ta:focus,.fb-in:focus{outline:none;border-color:var(--acc)}
.fb-send{display:block;width:100%;margin-top:16px;padding:13px;border:none;border-radius:12px;background:var(--acc);color:#fff;font:inherit;font-weight:700;font-size:15px;cursor:pointer;transition:filter .15s,transform .15s}
.fb-send:hover{filter:brightness(1.08);transform:translateY(-1px)}
.fb-alt{text-align:center;margin-top:12px;font-size:12.5px;color:var(--mut)}
.fb-alt b{color:#cfe0f5;cursor:pointer}.fb-alt b:hover{color:#eaf2ff;text-decoration:underline}
.sb-lang button{flex:0 0 auto;font:inherit;font-size:11px;font-weight:700;letter-spacing:.06em;color:var(--mut);background:none;border:none;border-radius:6px;padding:4px 11px;cursor:pointer;transition:background .14s,color .14s}
.sb-lang button:hover{color:var(--txt)}
.sb-lang button.on{background:linear-gradient(90deg,rgba(74,158,255,.22),rgba(74,158,255,.08));color:#fff;box-shadow:inset 0 0 0 1px rgba(74,158,255,.3)}
.content{flex:1;min-width:0;position:relative}
/* Oberer Streifen: KEINE sichtbare Titelleiste mehr (passte nicht zum Stil) — nur noch unsichtbarer
   Fenster-Ziehbereich + Träger fürs Suchfeld. Sanfte Abdunkelung nach oben statt Rand/Glow. */
.contbar{position:sticky;top:0;z-index:8;padding:12px 28px;min-height:52px;display:flex;gap:14px;align-items:center;
  background:linear-gradient(180deg,rgba(11,14,19,.6),rgba(11,14,19,0));backdrop-filter:blur(9px);
  -webkit-mask-image:linear-gradient(180deg,#000 60%,transparent);mask-image:linear-gradient(180deg,#000 60%,transparent)}
.contbar:has(#q.hide){background:none;backdrop-filter:none}
.contbar #q{margin:0;flex:1}
/* Fenster am oberen Bereich greifen & ziehen (macOS hiddenInset) */
.contbar{-webkit-app-region:drag}
.contbar input,.contbar button,.contbar a{-webkit-app-region:no-drag}
.sidebar{-webkit-app-region:drag}
.sb-brand,.nav,.sb-scan,.sb-drive,.sb-foot,.sb-foot *{-webkit-app-region:no-drag}
#app{padding:24px 40px 120px;max-width:1080px;margin:0 auto;position:relative;z-index:1}
/* Übersicht-Hintergrund: Starfield-Canvas (ersetzt Topographie). Fix am Viewport, hinter dem Inhalt,
   left = Sidebar-Breite. Der Canvas füllt diesen Container; weiche Vignette blendet die Ränder ab. */
.ov-bg{position:fixed;top:0;left:250px;right:0;bottom:0;z-index:0;pointer-events:none;overflow:hidden;
  -webkit-mask-image:radial-gradient(125% 110% at 50% 45%, #000 55%, transparent 100%);
  mask-image:radial-gradient(125% 110% at 50% 45%, #000 55%, transparent 100%)}
.ov-bg canvas{position:absolute;inset:0;width:100%;height:100%;display:block}
@media(max-width:760px){.ov-bg{left:0}}
/* Holografischer Scanline-Schimmer übers ganze Fenster (sehr dezent) + langsamer Scan-Sweep */
.fx-scan{position:fixed;inset:0;z-index:100;pointer-events:none;opacity:.05;mix-blend-mode:overlay;
  background:repeating-linear-gradient(0deg,rgba(150,200,255,.6) 0 1px,transparent 1px 3px)}
.fx-scan::after{content:"";position:absolute;left:0;right:0;height:180px;top:-180px;
  background:linear-gradient(180deg,transparent,rgba(130,190,255,.10),transparent);animation:fxSweep 7.5s linear infinite}
@keyframes fxSweep{0%{top:-180px}100%{top:100%}}
@media(prefers-reduced-motion:reduce){.fx-scan::after{display:none}}
/* Übersicht */
.ov-hello{font-size:clamp(25px,3.3vw,35px);font-weight:800;letter-spacing:-.02em;margin:2px 0 24px;
  background:linear-gradient(105deg,#ffffff 0%,#eef2f7 40%,#9aa6b8 100%);-webkit-background-clip:text;background-clip:text;color:transparent;display:inline-block}
.tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:14px;margin-bottom:28px}
.tile{background:var(--bg2);border:1px solid var(--line);border-radius:16px;padding:18px 20px}
.tile .tn{font-size:27px;font-weight:800;letter-spacing:-.02em;line-height:1.1}
.tile .tl{color:var(--mut);font-size:13px;margin-top:3px}
.tile .tsub{color:#5b6675;font-size:11.5px;margin-top:2px}
.tile.accent .tn{color:var(--acc)}.tile.warn .tn{color:var(--warn)}.tile.ok .tn{color:#4ade80}
.tile.link{cursor:pointer;transition:border-color .15s,transform .15s}.tile.link:hover{border-color:var(--acc);transform:translateY(-2px)}
.ov-sec{font-size:13px;text-transform:uppercase;letter-spacing:.05em;color:var(--mut);font-weight:700;margin:0 0 16px}
/* ── Übersicht: Statline (große Zahl + Label) ── */
.ov-statline{display:flex;flex-wrap:wrap;gap:16px 38px;margin:-6px 0 14px;align-items:flex-start}
.ov-stat{display:flex;flex-direction:column;gap:4px;min-width:0}
.ov-stat .v{font-family:var(--fdisp),-apple-system,system-ui,sans-serif;font-size:clamp(22px,2.3vw,29px);font-weight:700;letter-spacing:-.02em;line-height:1.02;color:#eef2f7;font-variant-numeric:tabular-nums}
.ov-stat .l{font-size:13px;color:var(--mut);font-weight:500}
.ov-stat.warn .v{color:var(--warn)}
.ov-stat .sub{font-size:12px;color:var(--warn);font-weight:600;margin-top:1px;white-space:nowrap}
.ov-stat.link{cursor:pointer;border-radius:11px;margin:-7px -11px;padding:7px 11px;transition:background .14s}
.ov-stat.link:hover{background:rgba(255,180,84,.09)}
/* ── Übersicht: Cockpit-Header (Hero-Panel + Metrik-Karten) ── */
.cockpit{position:relative;border-radius:22px;padding:30px 30px 24px;margin:2px 0 20px;overflow:hidden;
  background:
    radial-gradient(120% 150% at 8% -20%, rgba(74,158,255,.16), transparent 52%),
    radial-gradient(90% 130% at 102% -10%, rgba(55,207,224,.10), transparent 55%),
    linear-gradient(180deg, rgba(24,33,46,.72), rgba(13,17,24,.55));
  border:1px solid var(--line);
  box-shadow:inset 0 1px 0 rgba(150,200,255,.12), 0 28px 70px -46px rgba(0,0,0,.95)}
.cockpit::before{content:"";position:absolute;left:0;right:0;top:0;height:1px;pointer-events:none;
  background:linear-gradient(90deg,transparent,rgba(120,180,255,.5),rgba(55,207,224,.35),transparent)}
.cpit-eyebrow{position:relative;display:flex;align-items:center;gap:8px;font-size:11px;font-weight:700;
  letter-spacing:.18em;text-transform:uppercase;color:#6ea0d8;margin-bottom:12px}
.cpit-dot{width:7px;height:7px;border-radius:50%;background:#4ade80;box-shadow:0 0 0 0 rgba(74,222,128,.55);animation:cpitPulse 2.6s ease-out infinite}
@keyframes cpitPulse{0%{box-shadow:0 0 0 0 rgba(74,222,128,.5)}70%{box-shadow:0 0 0 7px rgba(74,222,128,0)}100%{box-shadow:0 0 0 0 rgba(74,222,128,0)}}
.cockpit .ov-hello{display:block;margin:0;font-size:clamp(30px,3.8vw,44px);line-height:1.16}
/* schlanke Begrüßung über der Mindmap */
.ov-greet{margin:2px 2px 20px}
.ov-greet .ov-hello{display:block;margin:8px 0 0;font-size:clamp(32px,4.4vw,52px);line-height:1.1;font-weight:800;letter-spacing:-.03em;
  background:linear-gradient(100deg,#ffffff 0%,#eef2f7 38%,#c4ccd8 62%,#ffffff 100%);background-size:230% 100%;
  -webkit-background-clip:text;background-clip:text;color:transparent;
  filter:drop-shadow(0 3px 20px rgba(0,0,0,.5));animation:ovHelloSheen 7.5s linear infinite}
@keyframes ovHelloSheen{0%{background-position:0% 0}100%{background-position:230% 0}}
/* JARVIS-Status-Zeile (Robo meldet sich) */
.ov-status{display:flex;align-items:center;gap:9px;margin:13px 0 0;font-family:"SF Mono",ui-monospace,Menlo,monospace;font-size:13px;letter-spacing:.01em;color:#8fa6bf;opacity:0;animation:ovStatusIn .6s .35s forwards}
.ov-status b{color:#dce9f7;font-weight:600}
.ovs-dot{width:8px;height:8px;border-radius:50%;background:#4ade80;box-shadow:0 0 9px #4ade80;flex:0 0 auto;animation:ovsPulse 2s ease-in-out infinite}
.ovs-dot.warn{background:#ffb454;box-shadow:0 0 9px #ffb454}
@keyframes ovStatusIn{to{opacity:1}}
@keyframes ovsPulse{0%,100%{opacity:1}50%{opacity:.35}}
/* JARVIS-Konsole oben rechts: Live-Uhr + Datum + Systemstatus → Cockpit-Gefühl, das man offen lässt */
.ov-hud{align-self:flex-start;text-align:right;font-family:"SF Mono",ui-monospace,Menlo,monospace;padding-top:2px;opacity:0;animation:ovStatusIn .6s .2s forwards}
.ovh-time{font-size:clamp(26px,2.6vw,34px);font-weight:600;color:#e6eefb;letter-spacing:.05em;font-variant-numeric:tabular-nums;line-height:1;text-shadow:0 0 18px rgba(74,158,255,.32)}
.ovh-time .sec{color:#5f86c4;font-size:.62em}
.ovh-date{font-size:11.5px;color:#7b8aa0;letter-spacing:.2em;text-transform:uppercase;margin-top:7px}
.ovh-sys{display:inline-flex;align-items:center;gap:7px;font-size:10.5px;letter-spacing:.16em;color:#5fae7e;margin-top:10px;text-transform:uppercase}
.ovh-sys .ovs-dot{width:7px;height:7px}
@media(max-width:720px){.ov-hud{display:none}}
/* Kennzahlen: dezentes „Live-Telemetrie"-Aufblitzen (als käme frische Messung rein) */
.ov-stats .sv.sv-blip{animation:svBlip .7s ease}
@keyframes svBlip{0%{filter:none}26%{filter:brightness(1.7) drop-shadow(0 0 9px rgba(74,158,255,.7))}100%{filter:none}}
.cpit-sub{position:relative;color:#93a1b5;font-size:14.5px;line-height:1.5;margin:8px 0 22px;max-width:600px}
/* Festplatten-Reihe im Cockpit (über den Kennzahlen) */
.ov-disks{position:relative;display:flex;flex-wrap:wrap;gap:10px;margin:0 0 16px}
.ov-disk{display:flex;align-items:center;gap:11px;background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.012));border:1px solid rgba(255,255,255,.075);border-radius:13px;padding:9px 15px 9px 12px;cursor:pointer;font:inherit;color:var(--txt);text-align:left;transition:transform .15s,border-color .15s,background .15s}
.ov-disk:hover{transform:translateY(-2px);border-color:rgba(74,158,255,.45);background:linear-gradient(180deg,rgba(74,158,255,.08),rgba(255,255,255,.012))}
.ov-disk-ic{width:34px;height:27px;flex:0 0 auto}.ov-disk-ic svg{width:100%;height:100%}
.ov-disk-name{display:block;font-size:13.5px;font-weight:600;color:#eef2f7;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:170px}
.ov-disk-sub{display:block;font-size:11.5px;color:var(--mut);margin-top:1px;font-variant-numeric:tabular-nums}
.cpit-metrics{position:relative;display:grid;grid-template-columns:repeat(auto-fit,minmax(148px,1fr));gap:12px}
.cpit-card{position:relative;display:flex;flex-direction:column;align-items:flex-start;text-align:left;overflow:hidden;
  background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.012));
  border:1px solid rgba(255,255,255,.075);border-radius:15px;padding:15px 16px 14px;
  font:inherit;color:var(--txt);transition:transform .16s ease,border-color .16s,background .16s,box-shadow .16s}
.cpit-card::after{content:"";position:absolute;left:14px;right:14px;top:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(150,200,255,.3),transparent)}
.cpit-card .cpit-ic{width:19px;height:19px;color:#6ea8e6;opacity:.92;margin-bottom:9px}
.cpit-card .cpit-ic svg{width:100%;height:100%;display:block}
.cpit-card .cpit-v{font-family:var(--fdisp),-apple-system,system-ui,sans-serif;font-size:clamp(23px,2.2vw,30px);
  font-weight:700;letter-spacing:-.025em;line-height:1;color:#f1f5fb;font-variant-numeric:tabular-nums}
.cpit-card .cpit-l{font-size:12.5px;color:var(--mut);margin-top:6px;font-weight:500}
.cpit-card .cpit-sub{font-size:11.5px;color:#ffc06b;font-weight:600;margin-top:5px;white-space:nowrap}
.cpit-card.link{cursor:pointer}
.cpit-card.link:hover{transform:translateY(-3px);box-shadow:0 14px 30px -20px rgba(0,0,0,.9)}
.cpit-card.amber{border-color:rgba(255,180,84,.3)}
.cpit-card.amber::after{background:linear-gradient(90deg,transparent,rgba(255,180,84,.45),transparent)}
.cpit-card.amber .cpit-ic{color:#ffb454}
.cpit-card.amber .cpit-v{color:#ffc06b}
.cpit-card.amber.link:hover{border-color:rgba(255,180,84,.6);background:linear-gradient(180deg,rgba(255,180,84,.09),rgba(255,255,255,.012))}
.cpit-card.ok .cpit-ic{color:#4ade80}
@media(max-width:560px){.cpit-metrics{grid-template-columns:repeat(2,1fr)}}
/* ── Assistent: „Disky empfiehlt" ── */
.assist{margin:0 0 22px;padding:13px 15px;border-radius:16px;background:linear-gradient(180deg,rgba(74,158,255,.06),transparent),var(--bg2);border:1px solid var(--line);box-shadow:inset 0 1px 0 rgba(130,190,255,.12),0 0 40px -26px rgba(74,158,255,.6)}
.assist-head{display:flex;align-items:center;gap:9px;margin-bottom:8px;font-size:14px}
.assist-head .assist-ic{width:20px;height:20px;flex:0 0 auto;color:var(--acc)}.assist-head .assist-ic svg{width:100%;height:100%}
.assist-head b{font-family:var(--fdisp),-apple-system,system-ui,sans-serif}
.assist-sub{color:var(--mut);font-size:12px;font-weight:500;margin-left:auto}
.atip{display:flex;align-items:center;gap:12px;width:100%;text-align:left;font:inherit;color:var(--txt);cursor:pointer;background:transparent;border:none;border-radius:10px;padding:9px 12px 9px 14px;position:relative;overflow:hidden;transition:background .14s}
.atip::before{content:"";position:absolute;left:0;top:7px;bottom:7px;width:3px;border-radius:3px;background:var(--acc)}
.atip:hover{background:rgba(255,255,255,.035)}
.atip .atip-tx{flex:1;font-size:13.5px;color:#cdd5e0}.atip .atip-tx b{color:var(--txt);font-weight:700}
.atip .atip-arr{color:var(--mut);flex:0 0 auto;font-size:15px}
.atip.risk::before{background:#ff6b6b}.atip.warn::before{background:#ffb454}.atip.reclaim::before{background:var(--acc)}.atip.new::before{background:#4ade80}
.atip.ok{cursor:default}.atip.ok::before{background:#4ade80}.atip.ok .atip-arr{display:none}
/* ── Cockpit v2: Top-Zeile, Spotlight-Suche, Status-Strip, Platten-Karten, Aufmerksamkeit ── */
.ov-top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin:0 2px 22px;flex-wrap:wrap}
.ov-top .ov-greet{margin:0}
.ov-scan{flex:0 0 auto;font:inherit;font-weight:600;font-size:13.5px;color:#eaf2ff;cursor:pointer;
  display:inline-flex;align-items:center;gap:7px;padding:10px 17px;border-radius:12px;
  background:linear-gradient(180deg,rgba(74,158,255,.22),rgba(74,158,255,.07));
  border:1px solid rgba(74,158,255,.45);box-shadow:0 14px 32px -22px rgba(74,158,255,.95);
  transition:transform .14s,border-color .14s,box-shadow .14s}
.ov-scan:hover{transform:translateY(-2px);border-color:rgba(74,158,255,.7)}
.ov-scan .pl{font-size:17px;line-height:1;margin-top:-1px;font-weight:400}
.ov-search{position:relative;display:flex;align-items:center;gap:13px;margin:0 0 26px;
  background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.014));
  border:1px solid rgba(120,170,235,.24);border-radius:16px;padding:0 17px;
  box-shadow:inset 0 1px 0 rgba(150,200,255,.1),0 24px 58px -42px rgba(74,158,255,.9);
  transition:border-color .15s,box-shadow .15s}
.ov-search:focus-within{border-color:rgba(74,158,255,.6);box-shadow:inset 0 1px 0 rgba(150,200,255,.14),0 0 0 3px rgba(74,158,255,.13)}
.ov-search .si{width:21px;height:21px;color:#6ea8e6;flex:0 0 auto}.ov-search .si svg{width:100%;height:100%}
.ov-search input{flex:1;min-width:0;font:inherit;font-size:16px;color:var(--txt);background:none;border:none;outline:none;padding:17px 0}
.ov-search input::placeholder{color:#7e8ea2}
.ov-search kbd{flex:0 0 auto;font:inherit;font-size:12px;color:var(--mut);border:1px solid var(--line);border-radius:6px;padding:3px 8px;background:rgba(255,255,255,.03)}
.ov-stats{display:flex;flex-wrap:wrap;gap:12px 30px;align-items:center;margin:0 2px 8px}
.ov-stats .s{display:flex;align-items:baseline;gap:8px}
.ov-stats .sv{font-family:var(--fdisp),system-ui,sans-serif;font-size:clamp(19px,2vw,24px);font-weight:700;letter-spacing:-.02em;color:#eef2f7;font-variant-numeric:tabular-nums;line-height:1}
.ov-stats .sl{font-size:12.5px;color:var(--mut);font-weight:500}
.ov-stats .s.amber .sv{color:#ffc06b}
.ov-stats .sep{width:1px;height:18px;background:var(--line)}
.ov-cols{display:grid;grid-template-columns:1.55fr 1fr;gap:26px;align-items:start;margin-top:10px}
@media(max-width:900px){.ov-cols{grid-template-columns:1fr}}
.ov-drives-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(152px,1fr));gap:16px}
.ov-drive{position:relative;display:flex;flex-direction:column;align-items:flex-start;text-align:left;overflow:hidden;
  background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.012));
  border:1px solid rgba(255,255,255,.08);border-radius:15px;padding:14px 15px 13px;
  font:inherit;color:var(--txt);cursor:pointer;transition:transform .16s,border-color .16s,background .16s,box-shadow .16s}
.ov-drive:hover{transform:translateY(-3px);border-color:rgba(74,158,255,.45);background:linear-gradient(180deg,rgba(74,158,255,.07),rgba(255,255,255,.012));box-shadow:0 16px 34px -24px rgba(0,0,0,.9)}
.ovd-top{display:flex;align-items:center;justify-content:space-between;width:100%;margin-bottom:9px}
.ovd-ic{width:36px;height:28px;flex:0 0 auto}.ovd-ic svg{width:100%;height:100%}
.ovd-dot{width:8px;height:8px;border-radius:50%;flex:0 0 auto}
.ovd-dot.on{background:#4ade80;box-shadow:0 0 7px rgba(74,222,128,.85)}
.ovd-dot.off{background:#3a4252}
.ovd-name{font-size:13.5px;font-weight:600;color:#eef2f7;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.ovd-cap{font-size:11.5px;color:var(--mut);margin-top:2px;font-variant-numeric:tabular-nums}
.ovd-bar{width:100%;height:5px;border-radius:99px;background:rgba(255,255,255,.07);overflow:hidden;margin:9px 0 7px}
.ovd-bar span{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,#4a9eff,#37cfe0)}
.ov-drive.amber .ovd-bar span{background:linear-gradient(90deg,#ffb454,#ffd08a)}
.ov-drive.red .ovd-bar span{background:linear-gradient(90deg,#ff6b6b,#ff9a7a)}
.ovd-meta{font-size:11px;color:#7e8ea2;font-variant-numeric:tabular-nums}
.ov-drive.amber .ovd-meta{color:#ffc06b}.ov-drive.red .ovd-meta{color:#ff8f8f}
.att{background:linear-gradient(180deg,rgba(74,158,255,.06),transparent),var(--bg2);border:1px solid var(--line);border-radius:16px;padding:13px 14px;box-shadow:inset 0 1px 0 rgba(130,190,255,.1)}
.att-head{display:flex;align-items:center;gap:9px;margin-bottom:7px;font-size:13.5px}
.att-head .att-ic{width:18px;height:18px;flex:0 0 auto;color:var(--acc)}.att-head .att-ic svg{width:100%;height:100%}
.att-head b{font-family:var(--fdisp),system-ui,sans-serif}
/* ── Disky Assistent (Charakter + Beratung) ── */
.asst{position:relative;overflow:hidden;margin-top:8px;display:flex;gap:24px;align-items:stretch;min-height:236px;
  border:1px solid var(--line);border-radius:22px;
  background:radial-gradient(130% 150% at 2% 0%,rgba(74,158,255,.12),transparent 52%),linear-gradient(180deg,rgba(20,28,40,.72),rgba(12,16,22,.6));
  box-shadow:inset 0 1px 0 rgba(150,200,255,.1),0 30px 70px -50px rgba(0,0,0,.95)}
.asst::before{content:"";position:absolute;left:0;right:0;top:0;height:1px;pointer-events:none;background:linear-gradient(90deg,transparent,rgba(120,180,255,.5),rgba(55,207,224,.3),transparent)}
.asst-left{flex:1 1 0;min-width:0;padding:22px 30px;display:flex;flex-direction:column;justify-content:center;gap:13px;position:relative;z-index:2}
.asst-eyebrow{display:flex;align-items:center;gap:8px;font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#6ea0d8}
.asst-title{font-family:var(--fdisp),system-ui,sans-serif;font-size:clamp(20px,2.1vw,26px);font-weight:700;letter-spacing:-.02em;margin:0;color:#eef2f7;line-height:1.14;max-width:30ch}
.asst-items{display:flex;flex-direction:column;gap:4px;margin-top:3px}
.asst-right{flex:0 0 38%;position:relative;min-height:236px;
  /* helle „Bühne" hinter dem glänzend-schwarzen 3D-Roboter, sonst verschwindet er im Dunkeln */
  background:radial-gradient(54% 52% at 50% 46%, rgba(64,116,190,.4), rgba(22,44,82,.18) 56%, transparent 74%)}
.asst-robot{position:absolute;inset:0;overflow:hidden;transform-origin:50% 80%;transition:transform .8s cubic-bezier(.34,1.2,.5,1)}
/* „Auf den Hinweis zeigen": der angesprochene Hinweis pulsiert kurz auf */
.atip{transition:background .25s,transform .25s}
.atip-attn{background:rgba(120,180,255,.12);transform:translateX(4px)}
.atip-attn::before{box-shadow:0 0 10px 1px currentColor;width:4px}
.asst-glow{position:absolute;top:-25%;right:0;width:80%;height:140%;pointer-events:none;z-index:0;
  background:radial-gradient(closest-side,rgba(90,170,255,.20),transparent 72%)}
.asst-fallback{position:absolute;inset:0;display:grid;place-items:center;pointer-events:none;z-index:1}
.asst-fallback svg{width:172px;height:182px;filter:drop-shadow(0 0 34px rgba(55,207,224,.32));animation:asstFloat 5.5s ease-in-out infinite}
@keyframes asstFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-11px)}}
/* NEXBOT-Bild (vorgerendert, 100% zuverlässig) */
.nexbot-img{position:absolute;inset:8% 6%;width:auto;height:auto;max-width:88%;max-height:84%;margin:auto;
  object-fit:contain;object-position:center;transform:scaleX(-1);   /* ganzer Roboter, kleiner, gespiegelt, STILL */
  pointer-events:none;user-select:none;-webkit-user-drag:none;filter:drop-shadow(0 18px 42px rgba(0,0,0,.5))}
/* Disky-Roboter (eigenes Vektor-Maskottchen, Fallback) */
.dsky-robot{width:100%;height:100%}
.rb-float{animation:rbFloat 5s ease-in-out infinite;transform-origin:200px 230px}
@keyframes rbFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.rb-core,.rb-ant{animation:rbPulse 2.4s ease-in-out infinite}
@keyframes rbPulse{0%,100%{opacity:1}50%{opacity:.45}}
/* ───────── JARVIS-Bootup (Cockpit-Start, einmal pro Sitzung) — dicht/verzerrt/glühend ───────── */
.boot{position:fixed;inset:0;z-index:120;overflow:hidden;cursor:pointer;font-family:"SF Mono",ui-monospace,Menlo,monospace;background:radial-gradient(circle at 50% 47%,#0b1a26 0%,#07101a 45%,#04070b 78%)}
.boot.done{animation:btOut .78s cubic-bezier(.6,0,.2,1) forwards}
@keyframes btOut{0%{opacity:1;transform:scale(1);filter:brightness(1) blur(0)}14%{filter:brightness(2.6)}28%{transform:scale(1.01) translateX(-6px);filter:brightness(1.4)}100%{opacity:0;transform:scale(1.1);filter:brightness(1) blur(4px);visibility:hidden}}
.boot .bg-grid{position:absolute;inset:-40px;z-index:1;opacity:0;animation:btFade .5s .05s forwards,btGridDrift 9s linear infinite;background-image:linear-gradient(rgba(55,207,224,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(55,207,224,.05) 1px,transparent 1px);background-size:42px 42px;-webkit-mask:radial-gradient(circle at 50% 47%,#000 22%,transparent 74%);mask:radial-gradient(circle at 50% 47%,#000 22%,transparent 74%)}
@keyframes btGridDrift{to{background-position:42px 42px}}
.boot .radar{position:absolute;left:50%;top:47%;width:1100px;height:1100px;transform:translate(-50%,-50%);z-index:2;border-radius:50%;opacity:0;animation:btFade .8s .5s forwards,btSpin 3.6s linear infinite;background:conic-gradient(from 0deg,rgba(55,207,224,0) 0deg,rgba(55,207,224,0) 286deg,rgba(55,207,224,.05) 320deg,rgba(55,207,224,.22) 350deg,rgba(191,244,255,.6) 359deg,rgba(255,255,255,0) 360deg);-webkit-mask:radial-gradient(circle,#000 60%,transparent 66%);mask:radial-gradient(circle,#000 60%,transparent 66%)}
.boot .field{position:absolute;inset:0;z-index:2;opacity:0;animation:btFade .6s .7s forwards;pointer-events:none}
.boot .field i{position:absolute;width:5px;height:1px;background:#37cfe0;opacity:.35;animation:btBlink 1.6s steps(2) infinite}
.boot .sweep{position:absolute;left:0;right:0;height:2px;z-index:9;top:0;background:linear-gradient(90deg,transparent,#37cfe0,#fff,#37cfe0,transparent);box-shadow:0 0 22px 4px rgba(55,207,224,.8);animation:btSweepY 1.1s .05s cubic-bezier(.5,0,.3,1) forwards;opacity:0}
@keyframes btSweepY{0%{top:0;opacity:0}6%{opacity:1}94%{opacity:1}100%{top:100%;opacity:0}}
.boot .stage{position:absolute;inset:0;z-index:8;animation:btTear 3.1s steps(1) .8s infinite}
@keyframes btTear{0%,7%,9%,40%,42%,73%,75%,100%{transform:none;clip-path:none}8%{transform:translateX(-7px) skewX(-1.5deg);clip-path:inset(34% 0 41% 0)}41%{transform:translateX(6px);clip-path:inset(62% 0 18% 0)}74%{transform:translateX(-4px);clip-path:inset(12% 0 70% 0)}}
.boot .hud{position:absolute;left:50%;top:47%;transform:translate(-50%,-50%);width:min(640px,60vw);height:min(640px,60vw);z-index:8}
.boot .hud svg{position:absolute;inset:0;width:100%;height:100%;overflow:visible}
.boot .spin-cw{transform-origin:320px 320px;animation:btSpin 30s linear infinite}
.boot .spin-ccw{transform-origin:320px 320px;animation:btSpin 22s linear infinite reverse}
.boot .spin-cw2{transform-origin:320px 320px;animation:btSpin 15s linear infinite}
.boot .spin-ccw2{transform-origin:320px 320px;animation:btSpin 9s linear infinite reverse}
@keyframes btSpin{to{transform:rotate(360deg)}}
.boot .draw{stroke-dashoffset:var(--len);animation:btDraw 1s .25s cubic-bezier(.4,0,.2,1) forwards}
@keyframes btDraw{to{stroke-dashoffset:0}}
.boot .fadein{opacity:0;animation:btFade .5s .75s forwards}
@keyframes btFade{to{opacity:1}}
@keyframes btBlink{50%{opacity:0}}
.boot .brk{position:absolute;width:72px;height:72px;border:2px solid #37cfe0;opacity:0;z-index:11;filter:drop-shadow(0 0 7px rgba(55,207,224,.7))}
.boot .brk.tl{top:6%;left:5%;border-right:0;border-bottom:0;animation:btBrkIn .5s .5s forwards,btBrkPulse 2.4s 1.1s infinite}
.boot .brk.tr{top:6%;right:5%;border-left:0;border-bottom:0;animation:btBrkIn .5s .57s forwards,btBrkPulse 2.4s 1.15s infinite}

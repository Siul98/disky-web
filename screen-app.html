.boot .brk.bl{bottom:6%;left:5%;border-right:0;border-top:0;animation:btBrkIn .5s .64s forwards,btBrkPulse 2.4s 1.2s infinite}
.boot .brk.br{bottom:6%;right:5%;border-left:0;border-top:0;animation:btBrkIn .5s .71s forwards,btBrkPulse 2.4s 1.25s infinite}
@keyframes btBrkIn{0%{opacity:0;transform:scale(1.6)}100%{opacity:.9;transform:scale(1)}}
@keyframes btBrkPulse{0%,100%{border-color:#37cfe0}50%{border-color:#ffb24d}}
.boot .target{position:absolute;left:50%;top:47%;width:120px;height:120px;z-index:10;opacity:0;animation:btFade .4s 1.2s forwards,btTargetMove 4.2s ease-in-out 1.2s infinite}
.boot .target::before,.boot .target::after{content:"";position:absolute;width:22px;height:22px;border:2px solid #ffb24d;filter:drop-shadow(0 0 5px #ffb24d)}
.boot .target::before{top:0;left:0;border-right:0;border-bottom:0}
.boot .target::after{bottom:0;right:0;border-left:0;border-top:0}
.boot .target b{position:absolute;top:-18px;left:0;font-size:10px;letter-spacing:.2em;color:#ffb24d;text-shadow:0 0 8px #ffb24d}
@keyframes btTargetMove{0%{transform:translate(-260px,-160px)}25%{transform:translate(110px,-90px)}55%{transform:translate(60px,70px)}80%{transform:translate(-200px,30px)}100%{transform:translate(-260px,-160px)}}
.boot .chip{position:absolute;z-index:10;background:rgba(8,18,28,.55);border:1px solid rgba(55,207,224,.4);border-radius:7px;padding:7px 11px;font-size:11px;color:#bff4ff;letter-spacing:.06em;opacity:0;backdrop-filter:blur(2px);box-shadow:0 0 18px rgba(55,207,224,.18),inset 0 0 12px rgba(55,207,224,.06);animation:btChipIn .5s forwards}
.boot .chip .k{color:#6d92ad;font-size:9px;letter-spacing:.16em;display:block;margin-bottom:2px;text-transform:uppercase}
.boot .chip .v{font-size:16px;font-weight:700}
.boot .chip.amb{border-color:rgba(255,178,77,.5);color:#ffb24d;box-shadow:0 0 18px rgba(255,122,31,.2)}
.boot .chip.red{border-color:rgba(255,45,94,.5);color:#ff8aa3;box-shadow:0 0 18px rgba(255,45,94,.22)}
.boot .bar{height:4px;width:90px;background:rgba(255,255,255,.08);border-radius:2px;margin-top:6px;overflow:hidden}
.boot .bar>i{display:block;height:100%;width:0;border-radius:2px;background:linear-gradient(90deg,#37cfe0,#bff4ff);animation:btBarFill 1.1s forwards}
.boot .chip.amb .bar>i{background:linear-gradient(90deg,#ff7a1f,#ffb24d)}
.boot .chip.red .bar>i{background:linear-gradient(90deg,#b3203f,#ff2d5e)}
@keyframes btChipIn{0%{opacity:0;transform:translateY(10px) scale(.9);filter:blur(4px)}100%{opacity:1;transform:none;filter:none}}
@keyframes btBarFill{to{width:var(--w,70%)}}
.boot .col{position:absolute;top:50%;transform:translateY(-50%);z-index:11;font-size:12.5px;line-height:2;text-shadow:0 0 9px rgba(55,207,224,.3)}
.boot .col.left{left:4.5%;width:min(310px,26vw);color:#bff4ff}
.boot .col.right{right:4.5%;width:min(240px,22vw);text-align:right;color:#6f93b0;font-size:11px;letter-spacing:.1em}
.boot .col .ln{opacity:0;transform:translateX(-12px);animation:btLn .26s forwards}
.boot .col.right .ln{transform:translateX(12px)}
.boot .col .ln b{color:#37cfe0;font-weight:600}.boot .col .ln .ok{color:#ffb24d;float:right}.boot .col .ln .dots{color:#3a4f63}
.boot .col.right .v{color:#37cfe0}
@keyframes btLn{0%{opacity:0;filter:blur(3px)}100%{opacity:.96;transform:none;filter:none}}
.boot .cursor{display:inline-block;width:9px;height:14px;background:#37cfe0;margin-left:3px;vertical-align:-2px;animation:btBlink .6s steps(1) infinite;box-shadow:0 0 8px #37cfe0}
.boot .eq{display:flex;gap:3px;justify-content:flex-end;height:30px;align-items:flex-end;margin-top:8px;opacity:0;animation:btFade .5s 1.3s forwards}
.boot .eq i{width:4px;background:linear-gradient(180deg,#37cfe0,rgba(55,207,224,.2));border-radius:1px;animation:btEq 1s ease-in-out infinite}
@keyframes btEq{0%,100%{height:20%}50%{height:100%}}
.boot .center{position:absolute;inset:0;display:grid;place-items:center;z-index:13;text-align:center;pointer-events:none}
.boot .lock{position:absolute;width:170px;height:170px;border-radius:50%;border:2px solid #ffb24d;opacity:0;box-shadow:0 0 26px rgba(255,178,77,.55),inset 0 0 26px rgba(255,178,77,.28);animation:btLock .45s 1.3s cubic-bezier(.3,1.5,.5,1) forwards}
@keyframes btLock{0%{opacity:0;transform:scale(2.6) rotate(-20deg)}100%{opacity:1;transform:scale(1)}}
.boot .ping{position:absolute;width:170px;height:170px;border-radius:50%;border:2px solid #37cfe0;opacity:0;animation:btPing .9s 1.55s ease-out forwards,btPing2 .9s 2.1s ease-out forwards}
@keyframes btPing{0%{opacity:.9;transform:scale(1)}100%{opacity:0;transform:scale(2.9)}}
@keyframes btPing2{0%{opacity:.6;transform:scale(1)}100%{opacity:0;transform:scale(3.4)}}
.boot .wm{position:relative;opacity:0;animation:btWm .6s 1.55s forwards}
@keyframes btWm{0%{opacity:0;transform:translateY(8px);letter-spacing:.6em;filter:blur(8px)}100%{opacity:1;transform:none;letter-spacing:.2em;filter:none}}
.boot .wm .d{display:flex;align-items:center;justify-content:center;gap:15px}
.boot .wm svg{width:58px;height:58px;filter:drop-shadow(0 0 18px rgba(74,158,255,.8))}
.boot .wm .t{font:800 46px var(--fdisp),-apple-system,system-ui,sans-serif;color:#eef9ff;letter-spacing:.2em;position:relative;text-shadow:0 0 26px rgba(74,158,255,.6);animation:btChroma 2.4s 2.1s infinite}
@keyframes btChroma{0%,92%,100%{text-shadow:0 0 26px rgba(74,158,255,.6)}94%{text-shadow:3px 0 0 #ff2d5e,-3px 0 0 #37cfe0,0 0 26px rgba(74,158,255,.6)}96%{text-shadow:-4px 0 0 #ff2d5e,4px 0 0 #37cfe0}98%{text-shadow:2px 0 0 #ff2d5e,-2px 0 0 #37cfe0}}
.boot .tag{margin-top:11px;font-size:12px;letter-spacing:.45em;color:#37cfe0;text-transform:uppercase;opacity:0;animation:btFade .5s 2s forwards}
.boot .scan{position:absolute;inset:0;pointer-events:none;z-index:40;background:repeating-linear-gradient(0deg,rgba(0,0,0,.18) 0 1px,transparent 1px 3px);mix-blend-mode:overlay;opacity:.55;animation:btFlick 3.2s steps(50) infinite}
.boot .fringe{position:absolute;inset:0;pointer-events:none;z-index:41;mix-blend-mode:screen;opacity:.5;background:linear-gradient(90deg,rgba(255,45,94,.10),transparent 5%,transparent 95%,rgba(55,207,224,.12))}
.boot .vig{position:absolute;inset:0;pointer-events:none;z-index:42;box-shadow:inset 0 0 240px 60px rgba(0,0,0,.9)}
.boot .flux{position:absolute;inset:0;pointer-events:none;z-index:43;background:rgba(120,200,255,.05);opacity:0;animation:btFlux 2.6s steps(1) infinite}
@keyframes btFlick{0%,100%{opacity:.55}48%{opacity:.45}50%{opacity:.7}52%{opacity:.48}}
@keyframes btFlux{0%,3%,100%{opacity:0}1%{opacity:.5}2%{opacity:0}33%{opacity:0}34%{opacity:.35}35%{opacity:0}}
@media(max-width:820px){.boot .col,.boot .chip{display:none}}
@media(max-width:820px){.asst{flex-direction:column}.asst-right{flex-basis:auto;height:220px;min-height:220px}}
/* ── Deep Search: Linsen-Pills + Name-Suche ── */
/* Schöne Suchleiste auf der Deep-Search-Seite */
.deepsearch{position:relative;display:flex;align-items:center;margin:4px 0 14px}
.deepsearch .ds-ic{position:absolute;left:18px;width:19px;height:19px;color:#6f8db0;pointer-events:none}
.deepsearch .ds-ic svg{width:100%;height:100%}
.ds-inp{width:100%;font:inherit;font-size:15.5px;color:var(--txt);
  background:linear-gradient(180deg,rgba(20,28,40,.6),rgba(12,16,22,.5));
  border:1px solid var(--line);border-radius:14px;padding:15px 46px 15px 50px;outline:none;
  transition:border-color .15s,box-shadow .15s,background .15s}
.ds-inp::placeholder{color:#5d6b7e}
.ds-inp:focus{border-color:rgba(74,158,255,.55);background:linear-gradient(180deg,rgba(22,32,46,.72),rgba(12,16,22,.55));
  box-shadow:0 0 0 3px rgba(74,158,255,.13),0 16px 38px -24px rgba(74,158,255,.85)}
.ds-x{position:absolute;right:12px;width:26px;height:26px;border:none;border-radius:8px;background:rgba(255,255,255,.06);
  color:var(--mut);cursor:pointer;font-size:12px;display:grid;place-items:center;transition:background .14s,color .14s}
.ds-x:hover{background:rgba(255,255,255,.13);color:var(--txt)}
.ds-x.hide{display:none}
/* Glow-Suchleiste (Duplicate Finder) — unter dem Titel, mit CI-Glow */
.dupsearch{position:relative;display:flex;align-items:center;margin:2px 0 22px}
.dupsearch .ds-ic{position:absolute;left:18px;width:19px;height:19px;color:#7fa6d8;pointer-events:none}
.dupsearch .ds-ic svg{width:100%;height:100%}
.dupsearch input{width:100%;font:inherit;font-size:15.5px;color:var(--txt);padding:16px 46px 16px 50px;border-radius:15px;outline:none;
  background:linear-gradient(180deg,rgba(22,32,48,.72),rgba(12,16,22,.55));border:1px solid rgba(74,158,255,.28);
  box-shadow:inset 0 1px 0 rgba(150,200,255,.1),0 0 0 1px rgba(74,158,255,.06),0 10px 40px -14px rgba(74,158,255,.55);
  transition:border-color .16s,box-shadow .16s,background .16s}
.dupsearch input::placeholder{color:#5d6b7e}
.dupsearch input:focus{border-color:rgba(74,158,255,.7);background:linear-gradient(180deg,rgba(26,38,56,.8),rgba(13,18,26,.6));
  box-shadow:inset 0 1px 0 rgba(150,200,255,.16),0 0 0 3px rgba(74,158,255,.16),0 0 48px -8px rgba(74,158,255,.7)}
/* Rechtsklick-Kontextmenü — Liquid Glass mit Blue-Glow */
.ctxmenu{position:fixed;z-index:200;min-width:210px;max-width:300px;padding:6px;border-radius:14px;
  background:linear-gradient(180deg,rgba(28,38,56,.86),rgba(13,18,27,.82));
  border:1px solid rgba(120,170,240,.26);
  -webkit-backdrop-filter:blur(24px) saturate(165%);backdrop-filter:blur(24px) saturate(165%);
  box-shadow:0 20px 54px -14px rgba(0,0,0,.72),0 0 0 1px rgba(74,158,255,.08),0 0 46px -8px rgba(74,158,255,.5),inset 0 1px 0 rgba(160,205,255,.16);
  animation:ctxIn .14s cubic-bezier(.22,1,.36,1)}
@keyframes ctxIn{from{opacity:0;transform:translateY(-6px) scale(.97)}to{opacity:1;transform:none}}
.ctxmenu .cm-head{font-size:11px;color:#7f8ea3;padding:6px 10px 4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600;letter-spacing:.02em}
.ctxmenu .cm-sep{height:1px;margin:5px 8px;background:linear-gradient(90deg,transparent,rgba(120,165,225,.22),transparent)}
.ctxmenu button{display:flex;align-items:center;gap:11px;width:100%;text-align:left;font:inherit;font-size:13.5px;color:#dce6f2;
  background:none;border:none;border-radius:9px;padding:9px 11px;cursor:pointer;transition:background .12s,color .12s}
.ctxmenu button:hover{background:linear-gradient(90deg,rgba(74,158,255,.24),rgba(74,158,255,.05));color:#fff;box-shadow:inset 0 0 0 1px rgba(74,158,255,.18)}
.ctxmenu button:disabled{opacity:.42;cursor:default}
.ctxmenu button:disabled:hover{background:none;color:#dce6f2;box-shadow:none}
.ctxmenu .cm-ic{width:16px;height:16px;flex:0 0 auto;color:#8fb6e8}.ctxmenu .cm-ic svg{width:100%;height:100%}
.dsky-toast{position:fixed;left:50%;bottom:34px;transform:translate(-50%,12px);z-index:210;pointer-events:none;
  font-size:13px;font-weight:600;color:#eaf2fb;padding:10px 16px;border-radius:11px;opacity:0;
  background:linear-gradient(180deg,rgba(28,38,56,.92),rgba(13,18,27,.9));border:1px solid rgba(120,170,240,.3);
  -webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);box-shadow:0 14px 40px -12px rgba(0,0,0,.7),0 0 30px -8px rgba(74,158,255,.5);
  transition:opacity .2s,transform .2s}
.dsky-toast.show{opacity:1;transform:translate(-50%,0)}
.deep-pills{display:flex;gap:8px;margin:2px 0 16px;flex-wrap:wrap}
.deep-pill{font:inherit;font-size:13px;font-weight:600;color:var(--mut);background:var(--bg2);border:1px solid var(--line);border-radius:999px;padding:7px 15px;cursor:pointer;transition:color .14s,border-color .14s,background .14s,box-shadow .14s}
.deep-pill:hover{color:var(--txt);border-color:#3a4658}
.deep-pill.on{color:#eaf2ff;background:linear-gradient(180deg,rgba(74,158,255,.18),rgba(74,158,255,.05));border-color:rgba(74,158,255,.5);box-shadow:0 0 0 1px rgba(74,158,255,.14),0 10px 24px -18px rgba(74,158,255,.9)}
.deep-bar{display:flex;margin:0 0 14px}
.deep-bar input{flex:1;font:inherit;font-size:15px;color:var(--txt);background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:13px 16px;outline:none;transition:border-color .14s,box-shadow .14s}
.deep-bar input:focus{border-color:rgba(74,158,255,.55);box-shadow:0 0 0 3px rgba(74,158,255,.12)}
.deep-hint{color:var(--mut);font-size:13.5px;padding:16px 4px;line-height:1.5}.deep-hint b{color:#cdd5e0}
.deep-res{display:flex;flex-direction:column;gap:9px}
.deep-sum{font-size:12px;font-weight:600;letter-spacing:.01em;color:#7f8ca0;margin:0 2px -2px}
/* ── Treffer nach Platte gruppiert: jede Platte ein aufklappbarer Block ── */
.dgroup{border:1px solid var(--line);border-radius:14px;overflow:hidden;background:rgba(255,255,255,.012)}
.dg-head{display:flex;align-items:center;gap:11px;width:100%;text-align:left;font:inherit;color:var(--txt);background:linear-gradient(180deg,rgba(74,158,255,.10),rgba(74,158,255,.025));border:0;border-bottom:1px solid transparent;padding:12px 15px;cursor:pointer;transition:background .14s}
.dg-head:hover{background:linear-gradient(180deg,rgba(74,158,255,.16),rgba(74,158,255,.05))}
.dgroup.open .dg-head{border-bottom-color:var(--line)}
.dg-chev{flex:0 0 auto;width:13px;height:13px;color:#7fb0ec;transition:transform .2s ease}
.dg-chev svg{width:100%;height:100%;display:block}
.dgroup.open .dg-chev{transform:rotate(90deg)}
.dg-disk{flex:0 0 auto;width:34px;height:26px;display:grid;place-items:center}
.dg-disk svg{width:100%;height:100%;display:block}
.dg-name{font-weight:700;font-size:14.5px;color:#eaf2ff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:230px}
.dg-closet{flex:0 0 auto;font-size:10.5px;font-weight:600;letter-spacing:.02em;color:#9aa7b8;background:rgba(148,163,184,.14);border:1px solid rgba(148,163,184,.22);border-radius:6px;padding:2px 8px}
.dg-meta{margin-left:auto;flex:0 0 auto;font-size:12px;color:var(--mut);font-variant-numeric:tabular-nums;white-space:nowrap}
.dg-body{max-height:0;overflow:hidden;transition:max-height .26s ease}
.dgroup.open .dg-body{max-height:2400px;padding:5px 7px 7px}
.dhit{display:grid;grid-template-columns:24px 1fr auto;grid-template-areas:"ic name size" "ic loc size";gap:2px 11px;align-items:center;text-align:left;font:inherit;color:var(--txt);background:transparent;border:1px solid transparent;border-radius:10px;padding:8px 11px;cursor:pointer;transition:background .12s,border-color .12s}
.dhit:hover{background:rgba(255,255,255,.045);border-color:var(--line)}
.dhit .dh-ic{grid-area:ic;width:20px;height:20px;color:var(--mut);align-self:center}
.dhit .dh-ic svg{width:100%;height:100%;display:block}
.dhit.dfold .dh-ic{color:#6ea8e6}
.dhit .dh-name{grid-area:name;font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:340px}
.dhit .dh-loc{grid-area:loc;color:var(--mut);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dhit .dh-size{grid-area:size;color:var(--mut);font-size:12.5px;font-variant-numeric:tabular-nums;white-space:nowrap;align-self:center}
.deep-grp{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#6b7787;margin:18px 4px 7px}
.deep-grp:first-child{margin-top:4px}
/* Platten-Detailseite (interne, noch nicht katalogisierte Platte) */
.drvpage{max-width:680px;margin:0 auto;padding-top:6px}
.drvpage-head{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.drvpage-ic{width:54px;height:42px;flex:0 0 auto}.drvpage-ic svg{width:100%;height:100%}
.drvpage-name{font-family:var(--fdisp),system-ui,sans-serif;font-size:22px;font-weight:700;letter-spacing:-.02em;display:flex;align-items:center;gap:10px}
.drvpage-sub{color:var(--mut);font-size:13px;margin-top:3px}
.drvpage-bar{height:8px;border-radius:99px;background:var(--bg2);border:1px solid var(--line);overflow:hidden;margin-bottom:30px}
.drvpage-bar span{display:block;height:100%;background:linear-gradient(90deg,#4a9eff,#37cfe0)}
.drvpage-bar.indet span{width:38%;border-radius:99px;animation:indetbar 1.25s ease-in-out infinite}
@keyframes indetbar{0%{margin-left:-40%}100%{margin-left:102%}}
.drvpage-empty{text-align:center;padding:34px 20px;border:1px dashed var(--line);border-radius:18px;background:linear-gradient(180deg,rgba(74,158,255,.04),transparent)}
.drvpage-emic{display:inline-block;width:40px;height:40px;color:#5e87b8;opacity:.85}.drvpage-emic svg{width:100%;height:100%}
.drvpage-empty h3{margin:10px 0 6px;font-size:18px}
.drvpage-empty p{max-width:450px;margin:0 auto 18px;font-size:13.5px;line-height:1.55}
/* Festplattenvollzugriff-Hinweis */
.fda-hint{display:flex;align-items:center;gap:12px;max-width:560px;margin:22px auto 0;padding:13px 15px;border:1px solid rgba(74,158,255,.25);border-radius:13px;background:linear-gradient(180deg,rgba(74,158,255,.07),transparent);text-align:left}
.fda-ic{width:19px;height:19px;flex:0 0 auto;color:#4ade80}.fda-ic svg{width:100%;height:100%}
.fda-tx{flex:1;font-size:12.5px;color:var(--mut);line-height:1.45}.fda-tx b{color:#cdd5e0;font-weight:700}
.fda-btn{flex:0 0 auto;font:inherit;font-size:12.5px;font-weight:600;color:#eaf2ff;cursor:pointer;background:linear-gradient(180deg,rgba(74,158,255,.22),rgba(74,158,255,.07));border:1px solid rgba(74,158,255,.45);border-radius:9px;padding:8px 14px;transition:border-color .14s}
.fda-btn:hover{border-color:rgba(74,158,255,.7)}
/* KI-Index: Fortschritt + Abbrechen */
.kiprog{height:8px;border-radius:99px;background:rgba(255,255,255,.07);border:1px solid var(--line);overflow:hidden;margin:4px 0 10px}
.kiprog span{display:block;height:100%;background:linear-gradient(90deg,#4a9eff,#37cfe0);border-radius:99px;transition:width .3s ease}
.kiprow{display:flex;align-items:center;justify-content:space-between;gap:14px}
.kiprtxt{font-size:13px;color:var(--mut);font-variant-numeric:tabular-nums}.kiprtxt b{color:#eaf2ff;font-weight:700}
.kicancel{font-size:12.5px;padding:6px 13px;flex:0 0 auto}
/* Duplicate Finder: Ordner-Raster (macOS-Ordner, Platten unten am Ordner) */
.dupgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(168px,1fr));gap:30px 18px;margin-top:10px}
.dupcard{display:flex;flex-direction:column;align-items:center;gap:9px;background:none;border:none;cursor:pointer;font:inherit;color:var(--txt);padding:10px 6px 12px;border-radius:14px;transition:background .14s,transform .14s}
.dupcard:hover{background:rgba(255,255,255,.03);transform:translateY(-2px)}
.dupfolder{position:relative;width:108px;height:78px;filter:drop-shadow(0 7px 13px rgba(0,0,0,.42))}
.dupfolder .macfld{width:100%;height:100%;display:block}
/* Platten als saubere Pillen UNTER der Karte (nicht mehr auf dem Ordner) */
.dupcard-drives{display:flex;justify-content:center;gap:5px;flex-wrap:wrap;margin-top:1px}
.dchip{font-size:10px;font-weight:600;color:#aec4dd;background:rgba(255,255,255,.045);border:1px solid rgba(120,165,225,.26);border-radius:6px;padding:2px 7px;line-height:1.35;white-space:nowrap}
.dchip.more{color:#7e8ea2;border-color:rgba(120,165,225,.16)}
/* „ganzer Ordner" — dezenter cyan-Punkt oben rechts */
.dupfolder-badge{position:absolute;top:11px;right:24px;width:8px;height:8px;border-radius:50%;background:#37cfe0;box-shadow:0 0 7px rgba(55,207,224,.85);font-size:0;color:transparent;overflow:hidden}
.dupcard-name{font-size:13px;font-weight:600;text-align:center;line-height:1.25;max-width:155px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.dupcard-meta{font-size:11px;color:var(--mut)}.dupcard-meta b{color:#dbe7f5;font-weight:700}
.dupmodal{max-width:620px;width:92vw}
.dm-head{display:flex;align-items:center;gap:14px;margin:2px 30px 16px 0}
.dm-ic{width:58px;height:48px;flex:0 0 auto}.dm-ic svg{width:100%;height:100%}
.dm-name{font-family:var(--fdisp),system-ui,sans-serif;font-size:19px;font-weight:700;letter-spacing:-.02em;display:flex;align-items:center;gap:10px}
.dm-sub{color:var(--mut);font-size:12.5px;margin-top:5px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.dm-files{max-height:52vh;overflow:auto;border-top:1px solid var(--line);padding-top:10px;display:flex;flex-direction:column;gap:3px}
/* ── Constellation (Mega Mind Map) ── */
.const-stage{position:relative;width:100%;aspect-ratio:16/9;max-height:430px;margin:34px 0 30px}
.const-dots{position:absolute;inset:0;width:100%;height:100%;z-index:0;pointer-events:none}
.const-stage .csvg{position:absolute;inset:0;width:100%;height:100%;z-index:1;
  /* Linien laufen zum Kern hin weich aus (gefeathered) statt hart anzudocken */
  -webkit-mask:radial-gradient(closest-side at 50% 50%, transparent 13%, rgba(0,0,0,.25) 26%, #000 46%);
  mask:radial-gradient(closest-side at 50% 50%, transparent 13%, rgba(0,0,0,.25) 26%, #000 46%)}
/* Leiterbahnen + fließende Pulse */
.trace{fill:none;stroke:#2c333f;stroke-width:.4;stroke-linecap:round;stroke-linejoin:round}
/* Disky-Chip (Hub) */
.hub-chip{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  width:18.75%;height:16%;min-width:138px;min-height:66px;border-radius:13px;z-index:3;
  background:linear-gradient(158deg,#1b1f27,#0d0f14);border:1px solid #23282f;
  box-shadow:0 16px 44px rgba(0,0,0,.55),0 0 0 1px rgba(74,158,255,.10),0 0 40px rgba(74,158,255,.16);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px}
.hub-chip::before,.hub-chip::after{content:"";position:absolute;left:24%;right:24%;height:5px;
  background:repeating-linear-gradient(90deg,#2c313b 0 2px,transparent 2px 8px)}
.hub-chip::before{top:-5px}.hub-chip::after{bottom:-5px}
.hub-chip .pl,.hub-chip .pr{position:absolute;top:26%;bottom:26%;width:5px;
  background:repeating-linear-gradient(0deg,#2c313b 0 2px,transparent 2px 8px)}
.hub-chip .pl{left:-5px}.hub-chip .pr{right:-5px}
.hub-chip .chip-row{display:flex;align-items:center;gap:8px}
.hub-chip .chip-logo{width:22px;height:22px;flex:0 0 auto;filter:drop-shadow(0 0 6px rgba(74,158,255,.4))}
.hub-chip .cn{font-family:var(--fdisp),-apple-system,system-ui,sans-serif;font-weight:700;
  font-size:clamp(14px,1.7vw,18px);letter-spacing:.34em;padding-left:.34em;line-height:1;
  background:linear-gradient(90deg,#59636f 0%,#fff 25%,#59636f 50%,#59636f 100%);background-size:220% 100%;
  -webkit-background-clip:text;background-clip:text;color:transparent;animation:chipsheen 5s linear infinite}
@keyframes chipsheen{0%{background-position:120% 0}100%{background-position:-120% 0}}
/* ───── Nebula hinter dem Hub: weiche farbige Wolken (screen-blend) + Glow-Sterne ───── */
.hub-nebula{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:620px;height:460px;z-index:0;pointer-events:none;mix-blend-mode:screen;opacity:.85}
.hub-nebula .neb{position:absolute;border-radius:50%;filter:blur(34px)}
.hub-nebula .n1{left:24%;top:30%;width:260px;height:220px;background:radial-gradient(closest-side,rgba(74,158,255,.55),transparent 72%);animation:nebDrift1 28s ease-in-out infinite}
.hub-nebula .n2{left:46%;top:44%;width:300px;height:240px;background:radial-gradient(closest-side,rgba(55,207,224,.42),transparent 72%);animation:nebDrift2 34s ease-in-out infinite}
.hub-nebula .n3{left:40%;top:24%;width:230px;height:230px;background:radial-gradient(closest-side,rgba(132,110,255,.34),transparent 72%);animation:nebDrift3 40s ease-in-out infinite}
.hub-nebula .n4{left:58%;top:54%;width:200px;height:170px;background:radial-gradient(closest-side,rgba(74,158,255,.30),transparent 72%);animation:nebDrift1 31s ease-in-out infinite reverse}
@keyframes nebDrift1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(22px,-16px) scale(1.12)}}
@keyframes nebDrift2{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-26px,14px) scale(1.1)}}
@keyframes nebDrift3{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(16px,20px) scale(1.14)}}
/* extra Glow-Sterne im Nebel */
.hub-nebula .ns{position:absolute;border-radius:50%;background:#eaf6ff;mix-blend-mode:normal;animation:nebStar 5s ease-in-out infinite}
.hub-nebula .ns:nth-child(5){left:30%;top:38%;width:2.5px;height:2.5px;box-shadow:0 0 7px 1px rgba(190,238,255,.9);animation-delay:.4s}
.hub-nebula .ns:nth-child(6){left:66%;top:34%;width:2px;height:2px;box-shadow:0 0 6px 1px rgba(160,210,255,.85);animation-delay:1.6s}
.hub-nebula .ns:nth-child(7){left:58%;top:64%;width:3px;height:3px;box-shadow:0 0 8px 1px rgba(190,238,255,.9);animation-delay:2.7s}
.hub-nebula .ns:nth-child(8){left:38%;top:66%;width:2px;height:2px;box-shadow:0 0 6px 1px rgba(127,233,247,.85);animation-delay:3.6s}
@keyframes nebStar{0%,100%{opacity:.25;transform:scale(.7)}50%{opacity:1;transform:scale(1.2)}}
/* ───── Hub = rotierendes Universum (statt Chip): langsame Orbits, glühende Partikel, Bloom ───── */
.hub-universe{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:188px;height:188px;z-index:3;pointer-events:none}
.hu-glow{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:300px;height:300px;border-radius:50%;
  background:radial-gradient(circle,rgba(74,158,255,.30),rgba(55,207,224,.12) 36%,transparent 70%);filter:blur(8px);animation:huPulse 6.5s ease-in-out infinite}
.hu-svg{position:absolute;inset:0;width:100%;height:100%;overflow:visible}
.hu-orbit{transform-box:view-box;transform-origin:80px 80px}
.hu-orbit ellipse{fill:none;stroke:url(#huStroke);stroke-width:1.7;opacity:.9}
.hu-orbit.o1{animation:huSpin 17s linear infinite}
.hu-orbit.o2{animation:huSpin 23s linear infinite reverse}
.hu-orbit.o3{animation:huSpin 30s linear infinite}
@keyframes huSpin{to{transform:rotate(360deg)}}
@keyframes huPulse{0%,100%{opacity:.7;transform:translate(-50%,-50%) scale(.96)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.07)}}
.hu-core{animation:huCorePulse 3.4s ease-in-out infinite;transform-box:view-box;transform-origin:80px 80px}
@keyframes huCorePulse{0%,100%{opacity:.92;transform:scale(1)}50%{opacity:1;transform:scale(1.14)}}
/* frei schwebende Glow-Partikel */
.hu-particles{position:absolute;inset:0}
.hu-particles i{position:absolute;left:50%;top:50%;width:3px;height:3px;border-radius:50%;background:#bff4ff;
  box-shadow:0 0 6px 1px rgba(127,233,247,.9);opacity:0;animation:huFloat 7s ease-in-out infinite}
.hu-particles i:nth-child(1){animation-delay:0s;--dx:64px;--dy:-30px}
.hu-particles i:nth-child(2){animation-delay:1.1s;--dx:-72px;--dy:-14px;background:#9ad8ff}
.hu-particles i:nth-child(3){animation-delay:2.3s;--dx:50px;--dy:40px}
.hu-particles i:nth-child(4){animation-delay:3.4s;--dx:-46px;--dy:44px;background:#9ad8ff}
.hu-particles i:nth-child(5){animation-delay:4.6s;--dx:18px;--dy:-58px}
.hu-particles i:nth-child(6){animation-delay:5.6s;--dx:-22px;--dy:-52px;background:#bff4ff}
@keyframes huFloat{0%{opacity:0;transform:translate(-50%,-50%) translate(0,0) scale(.4)}
  35%{opacity:1}65%{opacity:.85}100%{opacity:0;transform:translate(-50%,-50%) translate(var(--dx),var(--dy)) scale(1)}}
.hu-label{position:absolute;left:50%;top:calc(100% - 8px);transform:translateX(-50%);white-space:nowrap;text-align:center;pointer-events:none}
.hu-label .cn{font-family:var(--fdisp),-apple-system,system-ui,sans-serif;font-weight:700;font-size:14px;letter-spacing:.34em;padding-left:.34em;
  background:linear-gradient(90deg,#59636f,#fff 25%,#9fb6cf 50%,#59636f);background-size:220% 100%;-webkit-background-clip:text;background-clip:text;color:transparent;animation:chipsheen 5s linear infinite}
.hu-label .cs{display:block;font-size:10.5px;color:#6b7686;letter-spacing:.02em;margin-top:2px}
/* Hub-Sonar + Aura — das Zentrum sendet/atmet (JARVIS), rein dekorativ, hinter dem Chip */
.hub-sonar{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:0;height:0;z-index:2;pointer-events:none}
.hub-sonar span{position:absolute;left:0;top:0;width:150px;height:150px;margin:-75px 0 0 -75px;border-radius:50%;
  border:1px solid rgba(74,158,255,.45);opacity:0;animation:hubSonar 4.8s cubic-bezier(.2,.6,.3,1) infinite}
.hub-sonar span:nth-child(2){animation-delay:1.6s}
.hub-sonar span:nth-child(3){animation-delay:3.2s}
@keyframes hubSonar{0%{transform:scale(.42);opacity:.5}60%{opacity:.14}100%{transform:scale(2.2);opacity:0}}
.hub-aura{position:absolute;left:0;top:0;width:330px;height:330px;margin:-165px 0 0 -165px;border-radius:50%;
  background:radial-gradient(closest-side,rgba(74,158,255,.15),rgba(55,207,224,.05) 55%,transparent 72%);
  animation:hubAura 5.2s ease-in-out infinite}
@keyframes hubAura{0%,100%{opacity:.55;transform:scale(.95)}50%{opacity:1;transform:scale(1.07)}}
/* HUD-Eckklammern um die Mindmap (rahmen den Viewport wie ein Stark-HUD) */
.const-stage .cbrk{position:absolute;width:30px;height:30px;border:1.5px solid rgba(74,158,255,.34);z-index:4;pointer-events:none;animation:cbrkPulse 4s ease-in-out infinite}
.const-stage .cbrk.tl{top:1%;left:1.5%;border-right:0;border-bottom:0;border-radius:5px 0 0 0}
.const-stage .cbrk.tr{top:1%;right:1.5%;border-left:0;border-bottom:0;border-radius:0 5px 0 0}
.const-stage .cbrk.bl{bottom:1%;left:1.5%;border-right:0;border-top:0;border-radius:0 0 0 5px}
.const-stage .cbrk.br{bottom:1%;right:1.5%;border-left:0;border-top:0;border-radius:0 0 5px 0}
@keyframes cbrkPulse{0%,100%{opacity:.45}50%{opacity:.85}}
.hub-chip .cs{font-size:10.5px;color:#5b6675;letter-spacing:0}
/* Drive node */
.const-stage{--ns:1}
.cnode{position:absolute;transform:translate(-50%,-50%) scale(var(--ns,1));display:flex;flex-direction:column;align-items:center;gap:6px;
  z-index:2;cursor:pointer;width:124px;transition:transform .18s ease;
  background:none;border:none;padding:0;font:inherit;color:var(--txt)}
.cnode:hover{transform:translate(-50%,-50%) scale(calc(var(--ns,1)*1.07));z-index:6}
/* interne Mac-Platte — fix oben, dezent hervorgehoben */
.cnode.cint .disc{box-shadow:0 0 0 1px rgba(74,158,255,.35),0 0 16px rgba(74,158,255,.22)}
.cnode .cbadge{position:absolute;top:-7px;left:50%;transform:translateX(-50%);font-size:8.5px;font-weight:700;
  letter-spacing:.04em;text-transform:uppercase;color:#9bd0ff;background:rgba(20,32,48,.92);
  border:1px solid rgba(74,158,255,.4);border-radius:6px;padding:1px 6px;z-index:3;white-space:nowrap}
.cnode .disc{position:relative;width:72px;height:72px;border-radius:50%;display:grid;place-items:center;
  background:conic-gradient(var(--rc) calc(var(--ring)*1%),rgba(255,255,255,.07) 0);
  transition:filter .18s;animation:ringIn 1s cubic-bezier(.22,1,.36,1) both}
.cnode:hover .disc{filter:drop-shadow(0 0 10px rgba(74,158,255,.5))}
.cnode .disc::before{content:"";position:absolute;inset:5px;border-radius:50%;background:#0e1218;border:1px solid var(--line)}
.cnode .disc .di{position:relative;width:42px;height:33px}.cnode .disc .di svg{width:100%;height:100%}
.cnode .cn{font-size:12.5px;font-weight:700;max-width:124px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:center}
.cnode .cs{font-size:10.5px;color:var(--mut);margin-top:-4px}
.cnode.off .disc{filter:grayscale(.5);opacity:.85}
.cnode .pin{position:absolute;top:-3px;right:14px;width:9px;height:9px;border-radius:50%;background:#4ade80;
  box-shadow:0 0 7px #4ade80;border:1.5px solid #0c0f15}
/* ── Duplikate: nach Ordner zusammengefasst (aufklappbar) ── */
.dupf{background:var(--bg2);border:1px solid var(--line);border-radius:14px;margin-bottom:10px;overflow:hidden;transition:border-color .15s}
.dupf[open]{border-color:#2c3a4f}
.dupf>summary{list-style:none;cursor:pointer;display:flex;align-items:center;gap:11px;padding:14px 16px}
.dupf>summary::-webkit-details-marker{display:none}
.dupf>summary::before{content:"";width:7px;height:7px;border-right:2px solid var(--mut);border-bottom:2px solid var(--mut);transform:rotate(-45deg);transition:transform .15s;flex:0 0 auto;margin-right:1px}
.dupf[open]>summary::before{transform:rotate(45deg)}
.dupf>summary:hover{background:rgba(255,255,255,.02)}
.df-ic{width:24px;height:19px;flex:0 0 auto;color:var(--mut)}.df-ic svg{width:100%;height:100%}
.df-name{font-weight:700;font-size:14.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:260px}
.df-badge{font-size:10.5px;font-weight:700;color:var(--warn);background:rgba(255,180,84,.13);border:1px solid rgba(255,180,84,.4);border-radius:20px;padding:2px 9px;flex:0 0 auto}
.df-pills{display:flex;gap:5px;flex-wrap:wrap}
/* Duplikate: kompaktere Zeilen + prominentes „Wo" (Platten-Set) */
.dup-stats{display:flex;align-items:center;gap:15px;flex-wrap:wrap;margin:2px 2px 16px;font-size:13px;color:var(--mut)}
.dup-stats b{font-family:var(--fdisp),system-ui,sans-serif;font-size:19px;color:#eef2f7;font-weight:700;margin-right:5px;letter-spacing:-.01em}
.dup-stats b.amber{color:#ffb454}
.dup-stats i{width:1px;height:16px;background:var(--line);display:inline-block}
.df-where{display:inline-flex;align-items:center;gap:5px;flex-wrap:wrap;flex:0 0 auto}
.df-where .tag{color:#9fd0ff;border-color:rgba(74,158,255,.42);background:rgba(74,158,255,.10);font-weight:700}
.df-x{color:#5b6675;font-size:11px;font-weight:800;margin:0 1px}
.dupf{margin-bottom:7px}
.dupf>summary{padding:11px 15px;gap:10px}
.df-spacer{flex:1;min-width:10px}
.df-meta{font-size:12.5px;color:var(--mut);white-space:nowrap;flex:0 0 auto}
.df-meta b{color:var(--warn);font-weight:800}
.df-files{border-top:1px solid var(--line);padding:8px 16px 12px;max-height:300px;overflow:auto}
.df-file{display:flex;gap:10px;align-items:center;padding:4px 0;font-size:12px}
.df-file .path{color:var(--mut);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.df-file .fsz{color:#6b7686;flex:0 0 auto}
@media(max-width:640px){.df-pills,.df-name{max-width:none}.dupf>summary{flex-wrap:wrap}}
/* ── Sammeln & Übertragen ── */
.nav-badge{margin-left:auto;min-width:18px;height:18px;padding:0 5px;border-radius:9px;background:var(--acc);color:#06203f;font-size:11px;font-weight:800;display:none;align-items:center;justify-content:center;line-height:1}
.nav-badge.show{display:inline-flex}
.pr-gather{flex:0 0 auto;width:24px;height:24px;border-radius:7px;border:1px solid var(--line);background:transparent;color:var(--mut);font-size:15px;font-weight:700;cursor:pointer;line-height:1;transition:.14s}
.pr-gather:hover{color:var(--txt);border-color:#2c3a4f;background:rgba(255,255,255,.05)}
.pr-gather.on{color:#4ade80;border-color:rgba(74,222,128,.45);background:rgba(74,222,128,.13)}
.tag.on{color:#4ade80;border-color:rgba(74,222,128,.45);background:rgba(74,222,128,.12)}
.gx{flex:0 0 auto;width:22px;height:22px;border-radius:6px;border:none;background:transparent;color:#6b7686;font-size:12px;cursor:pointer;transition:.14s}
.gx:hover{color:#ff6b6b;background:rgba(255,107,107,.12)}
.gather-bar{margin:20px 0 8px;padding:16px 18px;background:var(--bg2);border:1px solid var(--line);border-radius:16px}
.gb-target{font-size:13px;color:var(--mut);margin-bottom:13px;word-break:break-all}.gb-target b{color:var(--txt);font-weight:600}
.gb-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.gb-actions .big{margin-left:auto}
.gprog{margin-top:15px}
.gpbar{height:8px;border-radius:5px;background:var(--line);overflow:hidden}
.gpbar>i{display:block;height:100%;width:0;background:linear-gradient(90deg,#5aa8ff,#2f7ff0);transition:width .2s ease}
.gpmsg{font-size:12.5px;color:var(--mut);margin-top:8px}
/* ── Backup-Assistent ── */
.dupf.risk{box-shadow:inset 3px 0 0 #ff6b6b}
.dupf.safe{box-shadow:inset 3px 0 0 #4ade80}
.dupf.warn{box-shadow:inset 3px 0 0 var(--warn)}
.df-badge.risk{color:#ff6b6b;background:rgba(255,107,107,.13);border-color:rgba(255,107,107,.42)}
.df-badge.ok{color:#4ade80;background:rgba(74,222,128,.13);border-color:rgba(74,222,128,.42)}
.df-meta b.risk{color:#ff6b6b}.df-meta b.ok{color:#4ade80}
.bk-sec{display:flex;align-items:center;gap:9px;font-weight:700;font-size:15px;margin:26px 0 2px}
.bk-sec .dot{width:9px;height:9px;border-radius:50%;flex:0 0 auto}
.bk-sub{color:var(--mut);font-size:12.5px;margin:0 0 10px}
/* Kompakte Backup-Zeilen */
.bk-list{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.bkrow{position:relative;display:flex;align-items:center;gap:12px;padding:10px 14px 10px 16px;border-radius:11px;cursor:pointer;overflow:hidden;background:var(--bg2);border:1px solid var(--line);transition:border-color .14s,background .14s}
.bkrow::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--kc)}
.bkrow:hover{border-color:#2c3a4f;background:var(--card2)}
.bk-ic{width:16px;height:16px;flex:0 0 auto;color:var(--mut)}.bk-ic svg{width:100%;height:100%}
.bk-nm{font-weight:600;font-size:14px;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bk-drv{display:flex;gap:5px;flex:0 0 auto}
.bk-amtwrap{display:flex;align-items:baseline;gap:6px;flex:0 0 auto}
.bk-amt{font-weight:700;font-size:14px;font-variant-numeric:tabular-nums}
.bk-q{color:#6b7686;font-size:12px}
@media(max-width:640px){.bk-q{display:none}.bk-nm{flex:1 1 auto}}
.bk-tip{font-size:12px;color:var(--mut);padding:9px 2px 2px;line-height:1.5}
/* Backup: Platten-Karten (aufklappbar, 3D-Tilt, Grid — 21st.dev-Stil) */
.bk-drives{display:flex;flex-direction:column;gap:12px;margin:4px 0 24px;perspective:1300px}
.bkdrive{position:relative;border-radius:15px;border:1px solid var(--line);overflow:hidden;
  background:linear-gradient(180deg,rgba(255,255,255,.025),transparent),var(--bg2);
  transform-style:preserve-3d;transition:transform .25s ease,border-color .15s,box-shadow .2s;will-change:transform}
.bkdrive::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--kc);z-index:2}
.bkdrive::after{content:"";position:absolute;inset:0;pointer-events:none;z-index:0;opacity:.045;
  background-image:linear-gradient(#9bc2ff 1px,transparent 1px),linear-gradient(90deg,#9bc2ff 1px,transparent 1px);background-size:24px 24px}
.bkdrive:hover{border-color:rgba(74,158,255,.34);box-shadow:0 20px 44px -30px rgba(0,0,0,.95)}
.bkdrive.open{border-color:rgba(74,158,255,.42)}
.bkd-head{position:relative;z-index:1;display:flex;align-items:center;gap:14px;width:100%;text-align:left;font:inherit;color:var(--txt);background:none;border:none;cursor:pointer;padding:15px 18px 15px 20px}
.bkd-ic{width:34px;height:27px;flex:0 0 auto}.bkd-ic svg{width:100%;height:100%}
.bkd-main{flex:1 1 auto;min-width:0}

<script type="module">
// KI-Bibliothek wird LAZY geladen — erst wenn KI-Suche/KI-Index wirklich genutzt wird.
// Dadurch startet die App sofort (kein MB-Download beim Start).
const MODEL="Xenova/clip-vit-base-patch32";
const LIB="https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.3.3";
let vision,text,processor,tokenizer,RawImage,loading=null;
function norm(a){let s=0;for(const x of a)s+=x*x;s=Math.sqrt(s)||1;const o=new Float32Array(a.length);for(let i=0;i<a.length;i++)o[i]=a[i]/s;return o;}
async function load(onlog){
  if(window.DiskyAI.ready) return;
  if(loading) return loading;
  loading=(async()=>{
    onlog&&onlog("Lade KI-Bibliothek…");
    const T = await import(LIB);
    const { AutoTokenizer, CLIPTextModelWithProjection, AutoProcessor, CLIPVisionModelWithProjection, env } = T;
    RawImage = T.RawImage; env.allowLocalModels=false;
    try{ onlog&&onlog("Lade KI-Modell (WebGPU)…");
      vision=await CLIPVisionModelWithProjection.from_pretrained(MODEL,{device:"webgpu",dtype:"fp16"}); window.DiskyAI.device="WebGPU"; }
    catch(e){ onlog&&onlog("WebGPU n/a → WASM…");
      vision=await CLIPVisionModelWithProjection.from_pretrained(MODEL,{device:"wasm",dtype:"q8"}); window.DiskyAI.device="WASM"; }
    text=await CLIPTextModelWithProjection.from_pretrained(MODEL,{device:window.DiskyAI.device==="WebGPU"?"webgpu":"wasm",dtype:window.DiskyAI.device==="WebGPU"?"fp16":"q8"});
    processor=await AutoProcessor.from_pretrained(MODEL);
    tokenizer=await AutoTokenizer.from_pretrained(MODEL);
    window.DiskyAI.ready=true; onlog&&onlog("KI bereit ("+window.DiskyAI.device+")");
  })();
  return loading;
}
async function embedImageSrc(src){ const img=await RawImage.read(src); const inp=await processor(img); const out=await vision(inp); return norm(out.image_embeds.data); }
async function embedText(q){ const inp=tokenizer([q],{padding:true,truncation:true}); const out=await text(inp); return norm(out.text_embeds.data); }
window.DiskyAI={ready:false,device:"",load,embedImageSrc,embedText};
</script>

// Aus Modellname (+ SSD-Flag) das passendste Icon raten
function matchDriveType(model, ssd, removable){
  const m=(model||"").toLowerCase();
  if(/apple|interne ssd|macintosh/.test(m)) return "mac";
  if(/cfexpress|cfe\b|xqd/.test(m)) return "cfexpress";
  if(/micro ?sd/.test(m)) return "microsd";
  if(/\bsd(xc|hc)?\b|sd[- ]?karte|memory ?card|card ?reader|\breader\b|card$/.test(m)) return "card";
  if(/rugged|lacie/.test(m)) return "rugged";
  if(/my ?passport/.test(m)) return "passport";
  if(/my ?book/.test(m)) return "mybook";
  if(/one ?touch|backup ?plus|expansion/.test(m)) return "onetouch";
  if(/sandisk|extreme/.test(m)) return "sandisk";
  if(/g-?raid|thunderbay|owc|pegasus|2big|6big/.test(m)) return "raidsilver";
  if(/synology|qnap|diskstation|\bnas\b/.test(m)) return "nas";
  if(/my ?book|desktop|d2 /.test(m)) return "desktop";
  if(removable) return "card";   // entfernbare, unbenannte Karte/Reader → Speicherkarte
  return ssd ? "ssd" : "hdd";
}

async function validateLicense(key){
  const res = await fetch("https://api.lemonsqueezy.com/v1/licenses/validate",{
    method:"POST",
    headers:{"Accept":"application/json","Content-Type":"application/x-www-form-urlencoded"},
    body:new URLSearchParams({license_key:key}),
  });
  const data = await res.json().catch(()=>({}));
  if(data && data.valid){
    const exp = data.license_key && data.license_key.expires_at; // null = Lifetime
    setLicense({key, valid:true, expires:exp||null, ts:Date.now()});

let DB;
function openDB(){
  return new Promise((res,rej)=>{
    const r = indexedDB.open("drivecat", 1);
    r.onupgradeneeded = e=>{
      const d = e.target.result;
      d.createObjectStore("drives",{keyPath:"id",autoIncrement:true});
      const f = d.createObjectStore("files",{keyPath:"id",autoIncrement:true});
      f.createIndex("driveId","driveId");
      f.createIndex("hash","hash");
    };
    r.onsuccess=()=>res(r.result);
    r.onerror=()=>rej(r.error);
  });
}
function tx(stores,mode){ return DB.transaction(stores,mode); }
function reqP(req){ return new Promise((res,rej)=>{req.onsuccess=()=>res(req.result);req.onerror=()=>rej(req.error);}); }
function getAll(store,index,key){
  const s = tx([store],"readonly").objectStore(store);
  const src = index ? s.index(index) : s;
  return reqP(key!==undefined ? src.getAll(key) : src.getAll());
}
// In-Memory-Cache der kompletten Datei-Liste (sonst würde jede Ansicht den
// ganzen Store inkl. Embeddings/Thumbnails neu deserialisieren → Ruckeln).
let _filesCache=null;
async function allFiles(){ if(!_filesCache) _filesCache=await getAll("files"); return _filesCache; }
function invalidateFiles(){ _filesCache=null; }
// listVolumes() ruft nativ `diskutil` auf (teuer). Renderer-seitig cachen, damit die vielen Aufrufe
// pro Render (Sidebar + Übersicht + Constellation + Connected) NICHT je einzeln diskutil starten.
// Der 6-Sek-Poll (onVolumes) hält den Cache frisch → diskutil läuft praktisch nur noch dort.
let _volCache=null, _volTs=-1e9;
function _now(){ return (typeof performance!=="undefined"&&performance.now)?performance.now():Date.now(); }
async function getVolumes(){
  if(!window.diskyNative?.listVolumes) return [];
  if(_volCache && (_now()-_volTs)<5000) return _volCache;
  try{ _volCache=await getVolumes(); _volTs=_now(); }catch(e){ if(!_volCache) _volCache=[]; }
  return _volCache;
}
// Duplikat-Identität = Inhalts-Prüfsumme UND exakte Byte-Größe (doppelter Schutz,
// nie nach Dateiname). Verschiedene Clips mit gleichem Namen matchen NICHT.
const fkey=f=>f.hash+"|"+(f.size||0);
async function addDrive(d){
  const t = tx(["drives"],"readwrite");
  const id = await reqP(t.objectStore("drives").add(d));
  return id;
}
async function updateDrive(id, patch){
  const t = tx(["drives"],"readwrite"); const s=t.objectStore("drives");
  const d = await reqP(s.get(id)); if(!d) return;
  Object.assign(d, patch); s.put(d);
  await new Promise(r=>{t.oncomplete=r;t.onerror=r;});
}
async function deleteDriveByLabel(label){
  const drives = await getAll("drives");
  const hit = drives.find(d=>d.label===label);
  if(!hit) return;
  // Dateien löschen
  await new Promise((res)=>{
    const t = tx(["files"],"readwrite");
    const idx = t.objectStore("files").index("driveId");
    const cur = idx.openCursor(IDBKeyRange.only(hit.id));
    cur.onsuccess = e=>{ const c=e.target.result; if(c){c.delete();c.continue();} };
    t.oncomplete = res;
  });
  await reqP(tx(["drives"],"readwrite").objectStore("drives").delete(hit.id));
  invalidateFiles();
}

/* ───────────────────────── Helfer ───────────────────────── */
function human(n){
  if(n==null) return "?";
  n=+n; const u=["B","KB","MB","GB","TB","PB"]; let i=0;
  while(Math.abs(n)>=1024 && i<u.length-1){n/=1024;i++;}
  return (i? n.toFixed(1):n)+" "+u[i];
}
// Byte-Wert in Animations-Teile zerlegen (passend zu human(): Mantisse + Einheit)
function byteAnim(bytes){ const s=human(bytes); const m=(""+s).match(/^([\d.]+)\s*(\w+)$/);
  return m ? {to:parseFloat(m[1]), dec:(m[2]==="B"?0:1), suf:" "+m[2], final:s} : {to:0,dec:0,suf:"",final:s}; }
// Zahlen im Cockpit beim (Wieder-)Laden hochzählen — Ease-out, Endwert exakt gesnappt.
function animateCounts(root){
  root.querySelectorAll(".cnum[data-to]").forEach(el=>{
    const to=parseFloat(el.dataset.to)||0, dec=+el.dataset.dec||0, sep=el.dataset.sep==="1";
    const pre=el.dataset.pre||"", suf=el.dataset.suf||"", finalTxt=el.textContent;
    if(to<=0) return;                                 // 0 → Endwert stehen lassen (bewusst auch bei „Bewegung reduzieren": Effekt ist explizit gewünscht)
    // Endbreite reservieren + linksbündig → die erste Ziffer bleibt fix, die Zeile wackelt nicht beim Hochzählen
    el.style.display="inline-block"; el.style.textAlign="left";
    el.style.minWidth=Math.ceil(el.getBoundingClientRect().width)+"px";
    const fmt=v=> pre + (sep ? Math.round(v).toLocaleString("de") : v.toFixed(dec)) + suf;
    const start=to*0.9;                               // nicht von 0 — nur das letzte Stück sanft hochzählen (smoother/easier)
    const DUR=850, t0=performance.now();
    el.textContent=fmt(start);
    let done=false;
    const step=now=>{ if(done) return; const p=Math.min(1,(now-t0)/DUR); const e=1-Math.pow(1-p,3);
      if(p>=1){ done=true; el.textContent=finalTxt; return; }
      el.textContent=fmt(start+(to-start)*e); requestAnimationFrame(step); };
    requestAnimationFrame(step);
    setTimeout(()=>{ if(!done){ done=true; el.textContent=finalTxt; } }, DUR+400); // Sicherheitsnetz, falls rAF nicht tickt
  });
}
function esc(s){return(s==null?"":""+s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

function t(k,...a){ const L=I18N[lang]||I18N.de; let v=(k in L)?L[k]:I18N.de[k]; if(v==null) return k; return typeof v==="function"?v(...a):v; }
function nloc(n){ try{ return (n==null?0:n).toLocaleString(lang==="en"?"en-US":"de-DE"); }catch(e){ return ""+n; } }
function applyStaticI18n(){
  try{ document.documentElement.lang=lang; }catch(e){}
  document.querySelectorAll("[data-i18n]").forEach(el=>{ el.textContent=t(el.getAttribute("data-i18n")); });
  document.querySelectorAll("[data-i18n-ph]").forEach(el=>{ el.setAttribute("placeholder",t(el.getAttribute("data-i18n-ph"))); });
  document.querySelectorAll(".sb-lang button").forEach(b=>b.classList.toggle("on", b.dataset.lang===lang));
}
function setLang(l){ if((l!=="de"&&l!=="en")||l===lang) return; lang=l; localStorage.setItem("disky_lang",l);
  applyStaticI18n();
  try{ render(); }catch(e){}
  try{ renderSidebarDrives(); }catch(e){}

/* SHA-256 Quick-Hash: Größe + Anfang/Mitte/Ende (je 1 MB) */
async function quickHash(file){
  const size = file.size;
  let parts;
  if(size <= 3*CHUNK) parts=[file];
  else parts=[file.slice(0,CHUNK),
              file.slice(Math.floor(size/2),Math.floor(size/2)+CHUNK),
              file.slice(size-CHUNK,size)];
  const head = new TextEncoder().encode(String(size));
  const bufs = [head.buffer];
  for(const p of parts) bufs.push(await p.arrayBuffer());
  let total=0; for(const b of bufs) total+=b.byteLength;
  const all=new Uint8Array(total); let off=0;
  for(const b of bufs){ all.set(new Uint8Array(b),off); off+=b.byteLength; }
  const dig = await crypto.subtle.digest("SHA-256", all);
  return [...new Uint8Array(dig)].map(x=>x.toString(16).padStart(2,"0")).join("");
}

/* Verzeichnis rekursiv durchlaufen */
async function* walk(dirHandle, rel){
  for await (const e of dirHandle.values()){
    if(IGNORE_NAMES.has(e.name) || e.name.startsWith("._")) continue;
    const childRel = rel ? rel+"/"+e.name : e.name;
    if(e.kind==="directory"){
      if(IGNORE_DIRS.has(e.name) || e.name.startsWith(".Spotlight")) continue;
      yield* walk(e, childRel);
    } else {
      yield {handle:e, rel:childRel};
    }
  }
}

/* Mega Mind Map — alle Platten als ein Bild. Hub mittig, Platten als leuchtende Knoten. */
async function renderConstellation(drives){
  const stage=document.getElementById("constStage"); if(!stage) return;
  // angeschlossene Volumes (nativ) → online-Status + interne Platte
  let online=new Set(), internalVol=null;
  if(window.diskyNative?.listVolumes){ try{ const vols=await getVolumes();
    vols.forEach(v=>{ online.add(v.volumeName); online.add(v.name); });
    internalVol=vols.find(v=>v.internal)||null; }catch(e){} }
  // interne Platte: entweder katalogisiert (Typ mac / passt zum internen Volume) ODER live (noch nicht katalogisiert)
  const catInternal = drives.find(d=>d.driveType==="mac" || (internalVol && (d.volumeName===internalVol.volumeName||d.label===internalVol.volumeName||d.label===internalVol.name))) || null;
  const externals = drives.filter(d=>d!==catInternal);
  const intNode = catInternal
      ? {id:catInternal.id, label:catInternal.label, driveType:catInternal.driveType||"mac", cap:catInternal.capacityBytes||0, used:catInternal.bytes||0, online:true, internal:true}
    : internalVol
      ? {label:internalVol.volumeName||"Macintosh HD", driveType:"mac", cap:internalVol.totalBytes||0, used:internalVol.usedBytes||0, online:true, internal:true, scan:true}
      : null;
  const extNodes = externals.map(d=>({id:d.id, label:d.label, driveType:d.driveType, cap:d.capacityBytes||0, used:d.bytes||0, online:(online.has(d.volumeName)||online.has(d.label)), internal:false}));

  // Koordinatensystem 160×100 (Seitenverhältnis der Bühne 16:10 → kein Verzerren)
  const VW=160, VH=100, CX=80, CY=50, HW=15, HH=8, F=v=>v.toFixed(2);
  const m=extNodes.length, total=(intNode?1:0)+m;
  // Radius + Knotengröße skalieren — theoretisch 20–30 Platten finden Platz
  const rx=46+Math.min(28, m*1.5), ry=34+Math.min(11, m*0.8);
  const ns = total<=8 ? 1 : total<=16 ? 0.78 : total<=24 ? 0.62 : 0.5;
  // Positionen: interne Platte FIX oben über dem Hub, externe gleichmäßig um den Rest (Top-Slot bleibt frei)
  const place=[];
  if(intNode) place.push({node:intNode, x:CX, y:CY-ry});
  // SKEW: externe Knoten bewusst NEBEN die Chip-Achsen setzen → jede Bahn bekommt einen Knick
  // (Leiterbahn-Look wie die Inspiration). Mac bleibt exakt oben (saubere gerade Bahn).
  const SKEW=20;
  extNodes.forEach((node,i)=>{ const a=(-90 + SKEW + 360*(intNode ? (i+1)/(m+1) : (i+0.5)/Math.max(1,m)))*Math.PI/180;
    place.push({node, x:CX+rx*Math.cos(a), y:CY+ry*Math.sin(a)}); });
  // Verwinkelte Leiterbahn-Routing (wie die CPU-Inspiration): Knoten → raus in einen Kanal →
  // parallel zur Chip-Kante → in den Pin. Abgerundete 90°-Ecken. Skaliert auf beliebig viele Platten.
  const grads=["gb","gc","gw","gg"];
  const L=CX-HW, R=CX+HW, T=CY-HH, B=CY+HH;
  // jeden Knoten der nächstgelegenen Chip-Kante zuordnen, Pins gleichmäßig über die Kante verteilen
  const sides={left:[],right:[],top:[],bottom:[]};
  place.forEach((p,i)=>{ const dx=p.x-CX, dy=p.y-CY;
    sides[(Math.abs(dx)>=Math.abs(dy))?(dx<0?"left":"right"):(dy<0?"top":"bottom")].push(i); });
  const pin={};
  for(const edge of ["left","right","top","bottom"]){ const arr=sides[edge], k=arr.length;
    arr.sort((a,b)=> (edge==="left"||edge==="right") ? place[a].y-place[b].y : place[a].x-place[b].x);
    arr.forEach((i,j)=>{ const f=(j+1)/(k+1);
      pin[i] = edge==="left"  ? {x:L, y:T+(B-T)*f, edge}
             : edge==="right" ? {x:R, y:T+(B-T)*f, edge}
             : edge==="top"   ? {x:L+(R-L)*f, y:T, edge}
             :                  {x:L+(R-L)*f, y:B, edge}; }); }
  // abgerundeter orthogonaler Pfad durch eine Punktreihe
  const rp=(pts)=>{ const P=[]; for(const q of pts){ const o=P[P.length-1]; if(!o||Math.hypot(q[0]-o[0],q[1]-o[1])>0.4) P.push(q); }
    if(P.length<2) return `M ${F(pts[0][0])} ${F(pts[0][1])}`;
    const RR=3.2; let d=`M ${F(P[0][0])} ${F(P[0][1])}`;
    for(let i=1;i<P.length-1;i++){ const a=P[i-1],c=P[i],b=P[i+1];
      const l1=Math.hypot(c[0]-a[0],c[1]-a[1])||1, l2=Math.hypot(b[0]-c[0],b[1]-c[1])||1;
      const r1=Math.min(RR,l1/2), r2=Math.min(RR,l2/2);
      const p1=[c[0]-(c[0]-a[0])/l1*r1, c[1]-(c[1]-a[1])/l1*r1];
      const p2=[c[0]+(b[0]-c[0])/l2*r2, c[1]+(b[1]-c[1])/l2*r2];
      d+=` L ${F(p1[0])} ${F(p1[1])} Q ${F(c[0])} ${F(c[1])} ${F(p2[0])} ${F(p2[1])}`; }
    const e=P[P.length-1]; return d+` L ${F(e[0])} ${F(e[1])}`; };
  // Z-Treppe wie eine Leiterbahn: Knick in der Bahnmitte, Position pro Bahn leicht versetzt (jitter)
  // → unterschiedlich verwinkelte Wege statt gerader Speichen. Achsen-gerade Bahnen (Mac) bleiben gerade.
  const route=(p,pn,i)=>{ const j=((i%3)-1)*5; const pts=[[p.x,p.y]];
    if(pn.edge==="left"||pn.edge==="right"){ const midX=(p.x+pn.x)/2 + j;
      pts.push([midX,p.y],[midX,pn.y],[pn.x,pn.y]); }
    else { const midY=(p.y+pn.y)/2 + j;
      pts.push([p.x,midY],[pn.x,midY],[pn.x,pn.y]); }
    return rp(pts); };
  const routes=place.map((p,i)=>route(p,pin[i],i));
  const baseTraces=routes.map((d,i)=>
    `<path class="trace" id="tr${i}" d="${d}" pathLength="100" stroke-dasharray="100 100" stroke-dashoffset="100">
        <animate attributeName="stroke-dashoffset" from="100" to="0" dur="1.1s" begin="${(0.15*i).toFixed(2)}s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.25 0.1 0.4 1"/></path>`).join("");
  // LICHT EXAKT WIE CPU-ARCHITECTURE (svg-ui): pro Leiterbahn ein radial-gradient-Glühkreis, der DURCH
  // die Bahn maskiert ist (Maske = die Bahn als weißer Stroke) und via animateMotion/mpath die Bahn
  // entlangfließt. Ergebnis: weiches, glühendes Licht, das in den DISKY-Chip strömt. Folgt jeder Ecke,
  // konstantes Tempo (calcMode="paced"), gestaffelt. GPU-günstig (Transform + Maske, kein Per-Frame-Blur).
  const CMAX=Math.min(routes.length, 14);
  // Glüh-Verläufe (heller Kern → CI-Farbe → transparent), 4 Töne durchgewechselt
  // Verläufe wie im Original: heller Kern → Farbe → transparent, fx="1" (heller Kopf, leichter Kometen-Effekt)
  const flowGrads=
     `<radialGradient id="cg0" fx="1"><stop offset="0%" stop-color="#d8f7ff"/><stop offset="50%" stop-color="#37cfe0"/><stop offset="100%" stop-color="#37cfe0" stop-opacity="0"/></radialGradient>`
    +`<radialGradient id="cg1" fx="1"><stop offset="0%" stop-color="#dcefff"/><stop offset="50%" stop-color="#54a6ff"/><stop offset="100%" stop-color="#54a6ff" stop-opacity="0"/></radialGradient>`
    +`<radialGradient id="cg2" fx="1"><stop offset="0%" stop-color="#eaf6ff"/><stop offset="50%" stop-color="#9fd6ff"/><stop offset="100%" stop-color="#9fd6ff" stop-opacity="0"/></radialGradient>`
    +`<radialGradient id="cg3" fx="1"><stop offset="0%" stop-color="#cafff4"/><stop offset="50%" stop-color="#37d7e0"/><stop offset="100%" stop-color="#37d7e0" stop-opacity="0"/></radialGradient>`;
  // Maske pro Bahn = die DÜNNE Bahn (stroke 0.6 wie das Original 0.5) → das Licht ist eine haardünne Linie, kein Schlauch
  const masks=routes.slice(0,CMAX).map((d,i)=>
    `<mask id="cm${i}" maskUnits="userSpaceOnUse" x="0" y="0" width="${VW}" height="${VH}"><path d="${d}" fill="none" stroke="#fff" stroke-width="0.6" stroke-linecap="round" stroke-linejoin="round"/></mask>`).join("");
  // bewegter Glühkreis r=8 (wie Original) je Bahn, maskiert auf die dünne Linie, fließt vom Knoten in den Chip
  const flows=routes.slice(0,CMAX).map((d,i)=>{
    const dur=(2.6+(i%5)*0.5).toFixed(2), delay=((i*0.55)%2.6).toFixed(2);
    // Opacity synchron zur Bewegung: smooth einblenden am Start, voll durchlaufen, smooth ausblenden am Ende.
    // → kein ruckartiges Ende, der Loop-Neustart passiert bei opacity 0 (unsichtbar).
    return `<g mask="url(#cm${i})"><circle r="8" cx="0" cy="0" fill="url(#cg${i%4})" opacity="0">`
      +`<animate attributeName="opacity" dur="${dur}s" begin="${delay}s" repeatCount="indefinite" values="0;1;1;0" keyTimes="0;0.16;0.78;1" calcMode="spline" keySplines="0.4 0 0.2 1;0 0 1 1;0.4 0 0.2 1"/>`
      +`<animateMotion dur="${dur}s" begin="${delay}s" repeatCount="indefinite" calcMode="paced" rotate="0"><mpath href="#tr${i}"/></animateMotion></circle></g>`;
  }).join("");
  const svg=`<svg class="csvg" viewBox="0 0 ${VW} ${VH}" preserveAspectRatio="none"><defs>${flowGrads}${masks}</defs>${baseTraces}${flows}</svg>`;
  // Hub = rotierendes Universum (statt Chip): glühender Kern, langsame Orbits, schwebende Partikel
  const chip=`<div class="hub-universe">
    <span class="hu-glow"></span>
    <svg class="hu-svg" viewBox="0 0 160 160" fill="none"><defs>
      <radialGradient id="huCoreG" cx="50%" cy="45%" r="60%"><stop offset="0" stop-color="#f2fdff"/><stop offset="38%" stop-color="#8fdcff"/><stop offset="100%" stop-color="#2f7fe0"/></radialGradient>
      <linearGradient id="huStroke" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#4a9eff"/><stop offset="100%" stop-color="#37cfe0"/></linearGradient>
      <filter id="huGlow" x="-150%" y="-150%" width="400%" height="400%"><feGaussianBlur stdDeviation="2.4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
      <g class="hu-orbit o1"><ellipse cx="80" cy="80" rx="66" ry="24"/><circle class="hu-e" cx="146" cy="80" r="3.6" fill="#7fe9f7" filter="url(#huGlow)"/></g>
      <g class="hu-orbit o2"><ellipse cx="80" cy="80" rx="66" ry="24"/><circle class="hu-e" cx="14" cy="80" r="3" fill="#9ad8ff" filter="url(#huGlow)"/></g>
      <g class="hu-orbit o3"><ellipse cx="80" cy="80" rx="66" ry="24"/><circle class="hu-e" cx="146" cy="80" r="2.6" fill="#bff4ff" filter="url(#huGlow)"/></g>
      <circle class="hu-core" cx="80" cy="80" r="9.5" fill="url(#huCoreG)" filter="url(#huGlow)"/></svg>
    <span class="hu-particles"><i></i><i></i><i></i><i></i><i></i><i></i></span>
  </div>`;
  // Knoten (Platten) — Position in % (x/1.6 wegen 160er-Breite)
  const nodes=place.map(p=>{
    const node=p.node;
    const pct=node.cap?Math.min(100,Math.round(100*node.used/node.cap)):60;
    const rc=pct>=90?"#ff6b6b":pct>=75?"#ffb454":"#4a9eff";
    const sub=node.cap?`${human(node.used)} / ${human(node.cap)}`:human(node.used);
    const attr = node.id!=null ? `data-id="${node.id}"` : (node.scan ? `data-scan="1"` : `data-internal="1"`);
    return `<button class="cnode ${node.online?"":"off"}${node.internal?" cint":""}" ${attr} style="left:${F(p.x/1.6)}%;top:${F(p.y)}%;--ring:${pct};--rc:${rc}">
      ${node.online?'<span class="pin" title="angeschlossen"></span>':""}
      ${node.internal?`<span class="cbadge">${t("iv_intern_tag")}</span>`:""}
      <span class="disc"><span class="di">${driveImg(node.driveType)}</span></span>
      <span class="cn">${esc(node.label)}</span><span class="cs">${sub}</span></button>`;
  }).join("");
  stage.style.setProperty("--ns", ns);
  // Sonar-Puls + Aura am Hub → das Zentrum „atmet"/sendet (JARVIS-Feeling), rein dekorativ
  const sonar=`<div class="hub-sonar"><b class="hub-aura"></b></div>`;   // nur sanfte Aura (Sonar-Ringe entfernt → ruhiger)
  const nebula=`<div class="hub-nebula"><span class="neb n1"></span><span class="neb n2"></span><span class="neb n3"></span><span class="neb n4"></span><i class="ns"></i><i class="ns"></i><i class="ns"></i><i class="ns"></i></div>`;
  stage.innerHTML=nebula+svg+sonar+chip+nodes;
  stage.querySelectorAll(".cnode[data-id]").forEach(b=>b.onclick=()=>{ mapDriveId=+b.dataset.id; mapStack=[]; mapTree=null; setView("map"); });
  stage.querySelectorAll(".cnode[data-scan],.cnode[data-internal]").forEach(b=>b.onclick=()=>{ mapDriveId="internal"; mapStack=[]; mapTree=null; setView("map"); });
}

// Hintergrund-Punktraster (deckt von der Mitte auf + flackert sanft) — wie der Sign-in-Dot-Effekt, nativ
let _dotsStop=null;
/* Starfield-Hintergrund (Vanilla-Port der React-Komponente): Sterne strömen sanft aus der Mitte nach außen.
   Läuft nur auf der Übersicht — render() stoppt _dotsStop beim Verlassen, renderOverview startet neu. */
function startStarfield(host){
  if(!host || host.querySelector("canvas")) return;   // idempotent: läuft persistent über alle Seiten
  host.innerHTML="";
  const cv=document.createElement("canvas"); host.appendChild(cv);
  const ctx=cv.getContext("2d"); if(!ctx) return;
  const dpr=Math.min(2,window.devicePixelRatio||1);
  const QTY=460, ratio=QTY/2;                   // Anzahl + Projektions-Verhältnis
  const STAR="rgba(255,255,255,1)", BG="#0a0c10";
  let w=0,h=0,cx=0,cy=0,z=0,colorRatio=0,arr=[],raf=0,tk=0;
  const reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  // Bei „Bewegung reduzieren": KEIN Vorwärts-Flug (störende Bewegung) — aber das Funkeln läuft weiter.
  let SPEED = reduce ? 0 : 0.65;
  function measure(){ w=host.clientWidth||0; h=host.clientHeight||0; if(!w||!h) return;
    cx=Math.round(w/2); cy=Math.round(h/2); z=(w+h)/2; colorRatio=1/z;
    cv.width=Math.round(w*dpr); cv.height=Math.round(h*dpr); ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.fillStyle=BG; ctx.strokeStyle=STAR; }
  function spawn(){ arr=new Array(QTY).fill().map(()=>[ Math.random()*w*2-cx*2, Math.random()*h*2-cy*2, Math.round(Math.random()*z),0,0,0,0,true, Math.random()*6.283, 0.9+Math.random()*0.5 ]); }   // [8]=Schimmer-Phase [9]=leichte Größenvariation (klein)
  function project(s){ s[3]=cx+(s[0]/s[2])*ratio; s[4]=cy+(s[1]/s[2])*ratio; }
  function update(){ for(const s of arr){ s[7]=true; s[5]=s[3]; s[6]=s[4];
    s[2]-=SPEED; if(s[2]>z){ s[2]-=z; s[7]=false; } if(s[2]<0){ s[2]+=z; s[7]=false; }
    project(s); } }
  function draw(){ tk++; ctx.globalAlpha=1; ctx.fillStyle=BG; ctx.fillRect(0,0,w,h);
    for(const s of arr){ if(!(s[3]>0&&s[3]<w&&s[4]>0&&s[4]<h)) continue;
      const depth=Math.max(.12,1-colorRatio*s[2]);                // näher = heller/größer
      const big=s[9];                                              // leichte Größenvariation je Stern
      const tw=0.5+0.5*Math.sin(tk*0.05+s[8]);                    // 0..1 langsames, LEICHTES Schimmern
      // feine Bewegungsspur (Drift durchs All)
      if(s[7]&&s[5]>0&&s[5]<w&&s[6]>0&&s[6]<h){ ctx.globalAlpha=depth*0.5; ctx.strokeStyle=STAR; ctx.lineWidth=depth*1.4;
        ctx.beginPath(); ctx.moveTo(s[5],s[6]); ctx.lineTo(s[3],s[4]); ctx.stroke(); }
      // kleiner Punkt mit dezentem Schimmern (Helligkeit leicht, Größe fast konstant)
      ctx.globalAlpha=Math.min(1,depth*(0.55+0.45*tw));
      ctx.fillStyle=STAR; const r=depth*big*(0.85+0.3*tw);
      ctx.beginPath(); ctx.arc(s[3],s[4],r,0,6.283); ctx.fill(); }
    ctx.globalAlpha=1; }
  function drawStatic(){ ctx.fillStyle=BG; ctx.fillRect(0,0,w,h); ctx.fillStyle=STAR;
    for(const s of arr){ project(s); if(s[3]>0&&s[3]<w&&s[4]>0&&s[4]<h){ const r=(1-colorRatio*s[2])*1.4; ctx.globalAlpha=Math.max(.15,1-colorRatio*s[2]); ctx.fillRect(s[3],s[4],r,r); } } ctx.globalAlpha=1; }
  function frame(){ if(window.__diskyPaused){ raf=requestAnimationFrame(frame); return; }   // off-screen: rAF am Leben halten, aber Canvas-Arbeit überspringen → ~0 CPU
    if(!w){ measure(); if(!w){ raf=requestAnimationFrame(frame); return; } spawn(); }
    if(host.clientWidth!==w||host.clientHeight!==h){ const ow=w,oh=h; measure(); if(arr.length&&ow&&oh){ const rw=w/ow,rh=h/oh; for(const s of arr){ s[0]*=rw; s[1]*=rh; } } }
    update(); draw(); raf=requestAnimationFrame(frame); }
  measure(); if(w) spawn();
  raf=requestAnimationFrame(frame);   // Loop läuft IMMER → Sterne funkeln auch bei „Bewegung reduzieren" (nur ohne Flug)
  const onR=()=>measure(); window.addEventListener("resize",onR);
  _dotsStop=()=>{ cancelAnimationFrame(raf); window.removeEventListener("resize",onR); host.innerHTML=""; };
}

// Sidebar: katalogisierte Platten
let _sbSig="";
async function renderSidebarDrives(){
  const el=document.getElementById("sbDrives"); if(!el) return;
  const drives=await getAll("drives");
  // angeschlossene Volumes ermitteln (Online-Status) + interne Mac-Platte
  let online=new Set(), internal=null;
  if(window.diskyNative?.listVolumes){ try{ const vols=await getVolumes();
    vols.forEach(v=>{ online.add(v.volumeName); online.add(v.name); });
    const iv=vols.find(v=>v.internal);
    if(iv){ const cataloged=drives.some(d=>d.driveType==="mac"||d.volumeName===iv.volumeName||d.label===iv.volumeName||d.label===iv.name);
      if(!cataloged) internal=iv; } }catch(e){} }
  const isOnline=d=> d.driveType==="mac" || online.has(d.volumeName) || online.has(d.label);
  const intSig=internal?`INT:${internal.usedBytes}:${internal.totalBytes}|`:"";
  const sig=intSig+drives.map(d=>d.id+":"+d.label+":"+d.bytes+":"+d.capacityBytes+":"+d.driveType+":"+(isOnline(d)?1:0)).join("|");
  if(sig===_sbSig && el.childElementCount) return;
  _sbSig=sig;
  const dot=on=>`<span class="sb-stat ${on?"on":"off"}" title="${on?t("dc_connected"):t("dc_closet")}"></span>`;
  let rows="";
  if(internal){ const cap=internal.totalBytes||0, used=internal.usedBytes||0;
    const pct=cap?Math.min(100,Math.round(100*used/cap)):0;
    const ds=cap?`${human(used)} / ${human(cap)}`:human(used);
    rows+=`<button class="sb-drive" data-internal="1" style="--p:${pct}%" title="${t("sb_int_connect")}">
      <span class="sbfill"></span><span class="di">${driveImg("mac")}</span>
      <span class="dn">${esc(internal.volumeName||"Macintosh HD")}</span><span class="ds">${ds}</span>${dot(true)}</button>`; }
  // interner Mac-Speicher immer ganz oben
  const ordered=[...drives].sort((a,b)=>(b.driveType==="mac"?1:0)-(a.driveType==="mac"?1:0));
  rows+=ordered.map(d=>{
    const cap=d.capacityBytes||0, used=d.bytes||0;
    const pct=cap?Math.min(100,Math.round(100*used/cap)):0;
    const ds=cap?`${human(used)} / ${human(cap)}`:human(used);
    const isMac=d.driveType==="mac", on=isOnline(d);
    return `<button class="sb-drive${isMac?" sb-mac":""}${on?"":" sb-off"}" data-id="${d.id}" style="--p:${pct}%" title="${isMac?t("sb_int_storage"):esc(d.label)} · ${on?t("dc_connected"):t("sb_not_connected")}${pct?` · ${pct}% ${t("sb_used")}`:''}">
      <span class="sbfill"></span>
      <span class="di">${driveImg(d.driveType)}</span>
      <span class="dn">${esc(d.label)}</span><span class="ds">${ds}</span>${dot(on)}</button>`;}).join("");
  el.innerHTML = rows ? `<div class="sb-sec"><span class="sb-sec-row"><span>${t("sb_my_drives")}</span><button class="sb-manage" data-manage="1" title="${t("sb_manage_t")}">${t("sb_manage")}</button></span><span class="sb-sec-hint"><svg class="sbh-ic" viewBox="0 0 16 16" fill="currentColor"><rect x="1.5" y="8.5" width="3" height="6" rx="1"/><rect x="6.5" y="4" width="3" height="10.5" rx="1"/><rect x="11.5" y="6.5" width="3" height="8" rx="1"/></svg>${t("sb_click_map")}</span></div>`+rows : "";
  el.querySelectorAll(".sb-drive[data-id]").forEach(b=>b.onclick=()=>{ mapDriveId=+b.dataset.id; mapStack=[]; mapTree=null; setView("map"); });
  const intBtn=el.querySelector(".sb-drive[data-internal]"); if(intBtn) intBtn.onclick=()=>{ mapDriveId="internal"; mapStack=[]; mapTree=null; setView("map"); };
  const mng=el.querySelector(".sb-manage"); if(mng) mng.onclick=()=>setView("drives");
}

// Native (App): angeschlossene Laufwerke automatisch anzeigen
async function renderConnected(){
  const el=document.getElementById("connected"); if(!el||!window.diskyNative) return;
  let vols=[]; try{ vols=await getVolumes(); }catch(e){}
  if(!vols.length){ el.innerHTML=""; return; }
  const drives=await getAll("drives");
  const known=new Set(); drives.forEach(d=>{ if(d.volumeName)known.add(d.volumeName); });
  const auto = autoScanEnabled();
  el.innerHTML=`<div class="connhead-row">
      <div class="connhead">${t("conn_head")}</div>
      <label class="asw" title="${t("conn_auto_t")}">
        <input type="checkbox" id="autoScanToggle" ${auto?"checked":""}><span class="asw-track"></span>
        <span class="asw-lbl">${t("conn_auto")}</span></label>
    </div>
    ${bgStatus?`<div class="bgstatus"><span class="bgspin"></span>${esc(bgStatus)}</div>`:""}
    <div class="conngrid">`+
    vols.map(v=>{
      const type=v.internal?"mac":matchDriveType(v.model, v.ssd, v.removable);
      const pct=v.totalBytes?Math.min(100,Math.round(100*v.usedBytes/v.totalBytes)):0;
      const col=pct>=90?"#ff6b6b":pct>=75?"#ffb454":"var(--acc)";
      const scanned=known.has(v.volumeName)||known.has(v.name);
      const busy=scanningVols.has(v.mount);
      return `<div class="conncard">
        <span class="driveimg" style="width:56px;height:44px">${driveImg(type)}</span>
        <div style="flex:1;min-width:0">
          <div class="connname">${esc(v.model||v.name)} <span class="connmeta">${v.ssd?"SSD":"HDD"}${v.protocol?(" · "+esc(v.protocol)):""}</span></div>
          <div class="connsub">${esc(v.name)} · ${t("conn_usage",human(v.usedBytes),human(v.totalBytes))} · ${pct}%</div>
          <div class="bar" style="margin-top:7px"><i style="width:${pct}%;background:${col}"></i></div>
        </div>
        ${busy?`<span class="connchip busy"><span class="bgspin"></span>${t("conn_updating")}</span>`
          :scanned?`<span class="connchip">${t("conn_incat")}</span>`
          :`<button class="connscan">${t("conn_scan")}</button>`}
      </div>`;}).join("")+`</div>`;
  el.querySelectorAll(".connscan").forEach(b=>b.onclick=startScan);
  const tg=document.getElementById("autoScanToggle");
  if(tg) tg.onchange=()=>{ setAutoScan(tg.checked); if(tg.checked) triggerAutoScanAll(); };
}

/* ───────────────────────── Auto-Scan (nativ, Hintergrund) ───────────────────────── */
const scanningVols = new Set();
let bgStatus = "";
function isOnboarded(){ return localStorage.getItem("disky_onboarded")==="1"; }
// Auto-Scan erst NACH dem Onboarding (vorher hat der User die Auto/Manuell-Frage noch nicht beantwortet)
function autoScanEnabled(){ return window.diskyNative && isOnboarded() && localStorage.getItem("disky_autoscan")!=="0"; }
function setAutoScan(on){ localStorage.setItem("disky_autoscan", on?"1":"0"); }

async function replaceFiles(driveId, recs){
  await new Promise(res=>{ const t=tx(["files"],"readwrite"); const idx=t.objectStore("files").index("driveId");
    const cur=idx.openCursor(IDBKeyRange.only(driveId));
    cur.onsuccess=e=>{ const c=e.target.result; if(c){c.delete();c.continue();} }; t.oncomplete=res; t.onerror=res; });
  for(let i=0;i<recs.length;i+=500){
    await new Promise(res=>{ const t=tx(["files"],"readwrite"); const s=t.objectStore("files");
      for(const r of recs.slice(i,i+500)){ r.driveId=driveId; s.put(r); } t.oncomplete=res; t.onerror=res; });
  }
  invalidateFiles();
}

async function autoScanVolume(vol){
  if(!window.diskyNative?.scanList || scanning) return;
  if(vol.internal) return;                 // interne Mac-Platte NICHT hier scannen — eigener kontrollierter Scan (maybeAutoScanInternal), sonst läuft sie dauernd
  if(scanningVols.has(vol.mount)) return;
  const drives = await getAll("drives");
  let drive = drives.find(d=>d.volumeName===vol.volumeName || d.volumeName===vol.name || d.label===(vol.volumeName||vol.name));
  const isNew = !drive;
  // Neue Platte nicht ungefragt anlegen, wenn das Gratis-Limit erreicht ist
  if(isNew && !isPro() && drives.length >= DISKY.FREE_LIMIT) return;

  scanningVols.add(vol.mount);
  bgStatus = t("bg_updating", esc(vol.volumeName||vol.name));
  dockProgress("indeterminate");
  if(view==="overview") renderConnected();
  try{
    const list = await window.diskyNative.scanList(vol.mount);
    const prev = new Map();
    if(drive){ const ex = await getAll("files","driveId",drive.id); for(const f of ex) prev.set(f.relPath,f); }
    const recs=[], toHash=[], byRel=new Map();
    for(const it of list){
      const old = prev.get(it.relPath);
      const project = it.relPath.includes("/") ? it.relPath.split("/")[0] : "(Stammverzeichnis)";
      const rec = {driveId:drive?drive.id:0, project, relPath:it.relPath, name:it.name, ext:it.ext, size:it.size, mtime:it.mtime, hash:null};
      if(old && old.size===it.size && Math.abs((old.mtime||0)-it.mtime)<2000){
        rec.hash=old.hash; if(old.thumb)rec.thumb=old.thumb; if(old.embed)rec.embed=old.embed;
      } else if(it.size>0){ toHash.push(it.relPath); }
      recs.push(rec); byRel.set(it.relPath, rec);
    }
    if(toHash.length){
      const hashes = await window.diskyNative.hashFiles(vol.mount, toHash);
      for(const rel in hashes){ const r=byRel.get(rel); if(r) r.hash=hashes[rel]; }
    }
    let bytes=0; for(const r of recs) bytes+=r.size||0;
    if(isNew){
      const id = await addDrive({label:vol.volumeName||vol.name, volumeName:vol.volumeName||vol.name,
        model:vol.model||null, capacityBytes:vol.totalBytes||null,
        driveType:matchDriveType(vol.model, vol.ssd, vol.removable), fileCount:recs.length, bytes, scannedAt:Date.now()});
      drive={id}; recs.forEach(r=>r.driveId=id);
    }
    await replaceFiles(drive.id, recs);
    await updateDrive(drive.id, {fileCount:recs.length, bytes, scannedAt:Date.now()});
  }catch(e){ /* leise weiter */ }
  finally{
    scanningVols.delete(vol.mount);
    bgStatus="";
    if(!scanningVols.size) dockProgress(null);
    renderSidebarDrives();
    if(view==="overview") render(); else renderConnected();
  }
}

async function runScan(dir, opts, area){
  const {label, model, capacityBytes, driveType, aiIndex} = opts;
  // Lizenz-Gate: in der Gratis-Version max. DISKY.FREE_LIMIT Platten.
  const existingDrives = await getAll("drives");
  const alreadyKnown = existingDrives.some(d=>d.label===label);
  if(!isPro() && !alreadyKnown && existingDrives.length >= DISKY.FREE_LIMIT){
    area.classList.add("hide");
    showUpgrade();
    return;
  }
  scanning = true;
  document.getElementById("pick").disabled = true;
  await deleteDriveByLabel(label); // Re-Scan ersetzt alten Stand

  const driveId = await addDrive({label, volumeName:dir.name, model:model||null,
    capacityBytes:capacityBytes||null, driveType:driveType||"ssd", fileCount:0, bytes:0, scannedAt:Date.now()});

  area.innerHTML = `
    <div class="row"><span class="dot"></span><b>${t("scan_running",esc(label))}</b>
      <span class="spacer"></span><button class="ghost" id="stop">${t("scan_stop")}</button></div>
    <div class="bar"><i id="pbar" style="width:0%"></i></div>
    <div class="nums" id="pnums">${t("scan_starting")}</div>
    <div class="nums muted" id="pcur"></div>`;
  let stopped=false;
  document.getElementById("stop").onclick=()=>{stopped=true;};

  let count=0, bytes=0, batch=[];
  const t0 = performance.now();
  const pbar=document.getElementById("pbar"), pnums=document.getElementById("pnums"), pcur=document.getElementById("pcur");
  let aiCount=0;
  if(aiIndex){ pcur.textContent=t("scan_ai_loading");
    try{ await window.DiskyAI?.load(m=>pcur.textContent=m); }catch(e){ pcur.textContent=t("scan_ai_err",e.message); } }

  async function flush(){
    if(!batch.length) return;
    const t = tx(["files"],"readwrite"); const s=t.objectStore("files");
    for(const f of batch) s.put(f);
    batch=[]; await new Promise(r=>{t.oncomplete=r;t.onerror=r;}); invalidateFiles();
  }

  try{
    for await (const {handle, rel} of walk(dir, "")){
      if(stopped) break;
      let file;
      try{ file = await handle.getFile(); }catch(e){ continue; }
      const project = rel.includes("/") ? rel.split("/")[0] : "(Stammverzeichnis)";
      const ext=(handle.name.match(/\.[^.]+$/)||[""])[0].toLowerCase();
      let hash=null;
      try{ if(file.size>0) hash = await quickHash(file); }catch(e){}
      const rec={driveId, project, relPath:rel, name:handle.name, ext, size:file.size, mtime:file.lastModified, hash};
      if(aiIndex && window.DiskyAI?.ready && isMediaExt(ext)){
        try{ const thumb = IMG_EXTS.has(ext) ? await thumbFromImage(file) : await thumbFromVideo(file);
          if(thumb){ rec.thumb=thumb; rec.embed=await window.DiskyAI.embedImageSrc(thumb); aiCount++;
            if(aiCount%5===0) pcur.textContent="KI: "+rel; } }catch(e){}
      }
      batch.push(rec);
      count++; bytes+=file.size;
      if(batch.length>=(aiIndex?40:400)){
        await flush();
        const el=(performance.now()-t0)/1000;
        pnums.textContent = t("scan_progress", nloc(count), human(bytes), aiIndex?t("scan_indexed",aiCount):` · ${human(bytes/el)}/s`);
        if(!aiIndex) pcur.textContent = rel;
        pbar.style.width = Math.min(99,(count/ (count+800))*100).toFixed(0)+"%"; // grobe Anzeige
        dockProgress(Math.min(0.99, count/(count+800)));
      }
    }
    await flush();
  }catch(err){
    pcur.textContent = t("scan_err", err.message);
  }

  // Drive-Summe aktualisieren
  const dt = tx(["drives"],"readwrite"); const ds=dt.objectStore("drives");
  const drv = await reqP(ds.get(driveId));
  drv.fileCount=count; drv.bytes=bytes; ds.put(drv);
  await new Promise(r=>dt.oncomplete=r);

  pbar.style.width="100%";
  dockProgress(null);
  pnums.innerHTML = t("scan_finished", nloc(count), human(bytes));
  pcur.textContent = stopped ? t("scan_stopped") : "";
  scanning=false;
  const pickBtn=document.getElementById("pick"); if(pickBtn) pickBtn.disabled=false;
  renderSidebarDrives();
  // Nach dem Scan automatisch die Sunburst-Karte dieser Platte zeigen
  if(!stopped){
    setTimeout(()=>{ mapDriveId=driveId; mapStack=[]; mapTree=null; setView("map"); }, 800);
  }
}

.bk-tip{font-size:12px;color:var(--mut);padding:9px 2px 2px;line-height:1.5}
/* Backup: Platten-Karten (aufklappbar, 3D-Tilt, Grid — 21st.dev-Stil) */
.bk-drives{display:flex;flex-direction:column;gap:12px;margin:4px 0 24px;perspective:1300px}
.bkdrive{position:relative;border-radius:15px;border:1px solid var(--line);overflow:hidden;
  background:linear-gradient(180deg,rgba(255,255,255,.025),transparent),var(--bg2);
  transform-style:preserve-3d;transition:transform .25s ease,border-color .15s,box-shadow .2s;will-change:transform}
.bkdrive::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--kc);z-index:2}
.bkdrive::after{content:"";position:absolute;inset:0;pointer-events:none;z-index:0;opacity:.045;
  background-image:linear-gradient(#9bc2ff 1px,transparent 1px),linear-gradient(90deg,#9bc2ff 1px,transparent 1px);background-size:24px 24px}
.bkdrive:hover{border-color:rgba(74,158,255,.34);box-shadow:0 20px 44px -30px rgba(0,0,0,.95)}
.bkdrive.open{border-color:rgba(74,158,255,.42)}
.bkd-head{position:relative;z-index:1;display:flex;align-items:center;gap:14px;width:100%;text-align:left;font:inherit;color:var(--txt);background:none;border:none;cursor:pointer;padding:15px 18px 15px 20px}
.bkd-ic{width:34px;height:27px;flex:0 0 auto}.bkd-ic svg{width:100%;height:100%}
.bkd-main{flex:1 1 auto;min-width:0}
.bkd-name{display:block;font-size:15px;font-weight:700;color:#eef2f7}
.bkd-sub{display:block;font-size:12.5px;color:var(--mut);margin-top:1px}
.bkd-amt{flex:0 0 auto;font-size:15px;font-weight:700;font-variant-numeric:tabular-nums}
.bkd-q{font-size:11.5px;font-weight:500;color:#6b7686}
.bkd-arrow{flex:0 0 auto;width:18px;height:18px;color:var(--mut);transition:transform .3s ease}.bkd-arrow svg{width:100%;height:100%}
.bkdrive.open .bkd-arrow{transform:rotate(90deg)}
.bkd-body{position:relative;z-index:1;display:grid;grid-template-rows:0fr;transition:grid-template-rows .35s ease}
.bkdrive.open .bkd-body{grid-template-rows:1fr}
.bkd-inner{overflow:hidden;display:flex;flex-direction:column;gap:2px;padding:0 12px 12px 20px}
.bkp{display:flex;align-items:center;gap:11px;width:100%;text-align:left;font:inherit;color:var(--txt);background:none;border:none;border-radius:9px;cursor:pointer;padding:8px 12px;transition:background .12s}
.bkp:hover{background:rgba(255,255,255,.045)}
.bkp-ic{width:17px;height:17px;flex:0 0 auto;color:var(--mut)}.bkp-ic svg{width:100%;height:100%}
.bkp-main{flex:1 1 auto;min-width:0}
.bkp-nm{display:block;font-size:13.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#eef2f7}
.bkp-sub{display:block;font-size:11.5px;color:var(--mut);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bkp-amt{flex:0 0 auto;font-size:12.5px;font-weight:600;font-variant-numeric:tabular-nums}
.bkp-orig{font-weight:500;font-size:11px;color:var(--mut)}
.bkp-edit{flex:0 0 auto;opacity:0;color:var(--mut);font-size:14px;cursor:pointer;padding:0 3px;transition:opacity .12s,color .12s}
.bkp:hover .bkp-edit{opacity:.65}
.bkp-edit:hover{opacity:1;color:#cfe0f5}
.pr-name .pr-orig{font-weight:500;font-size:11px;color:var(--mut);margin-left:6px}
.pr-edit{flex:0 0 auto;opacity:0;color:var(--mut);font-size:13px;cursor:pointer;padding:0 4px;transition:opacity .12s,color .12s}
.prow:hover .pr-edit{opacity:.6}.pr-edit:hover{opacity:1;color:#cfe0f5}
/* Backup-Statustafel: 3 Spalten (rot/gelb/grün), flache Zeilen statt Kacheln */
.bk-board{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;align-items:start;margin-top:4px}
@media(max-width:820px){.bk-board{grid-template-columns:1fr}}
.bk-colhead{display:flex;align-items:center;gap:9px;padding:0 2px 3px}
.bk-coldot{width:9px;height:9px;border-radius:50%;background:var(--c);box-shadow:0 0 9px var(--c);flex:0 0 auto}
.bk-coltitle{font-weight:700;font-size:14px;color:#eef2f7}
.bk-colcount{margin-left:auto;font-weight:700;font-size:13px;color:var(--c);font-variant-numeric:tabular-nums}
.bk-colsub{font-size:11.5px;color:var(--mut);padding:0 2px 9px;border-bottom:1px solid var(--line);margin-bottom:6px}
.bk-colsub b{color:#cdd6e2;font-weight:600}
.bk-rows{display:flex;flex-direction:column;gap:1px}
.bk-row{display:flex;align-items:center;gap:10px;width:100%;text-align:left;font:inherit;cursor:pointer;
  background:none;border:none;border-left:2px solid var(--c);padding:8px 8px 8px 11px;border-radius:0 7px 7px 0;transition:background .12s}
.bk-row:hover{background:rgba(255,255,255,.05)}
.bk-row-main{flex:1 1 auto;min-width:0}
.bk-row-nm{display:block;font-size:13px;font-weight:600;color:#e7ecf3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bk-row-meta{display:block;font-size:11px;color:var(--mut);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.bk-row-edit{flex:0 0 auto;opacity:0;color:var(--mut);font-size:12px;cursor:pointer;padding:0 3px;transition:opacity .12s,color .12s}
.bk-row:hover .bk-row-edit{opacity:.6}.bk-row-edit:hover{opacity:1;color:#cfe0f5}
.bk-row-arch{flex:0 0 auto;opacity:0;width:18px;height:18px;border-radius:50%;display:grid;place-items:center;font-size:11px;color:#9fb6cf;background:rgba(255,255,255,.06);cursor:pointer;transition:opacity .12s,background .12s,color .12s}
.bk-row:hover .bk-row-arch{opacity:.7}.bk-row-arch:hover{opacity:1;background:rgba(74,222,128,.2);color:#4ade80}
.bk-tag{flex:0 0 auto;font-size:9px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:2px 6px;border-radius:5px;white-space:nowrap}
.bk-tag.active{color:#9cd2ff;background:rgba(74,158,255,.16);border:1px solid rgba(74,158,255,.3)}
.bk-tag.notstarted{color:#cbb9ff;background:rgba(132,110,255,.16);border:1px solid rgba(132,110,255,.32)}
/* „Wirklich fertig?"-Sektion */
.bk-review{margin:4px 0 18px;border:1px solid rgba(110,160,216,.22);border-radius:16px;overflow:hidden;
  background:radial-gradient(120% 140% at 0 0,rgba(74,158,255,.1),transparent 55%),linear-gradient(180deg,rgba(20,28,40,.6),rgba(12,16,22,.5))}
.bk-rv-head{display:flex;align-items:flex-start;gap:11px;padding:15px 18px 4px}
.bk-rv-head svg{width:22px;height:22px;flex:0 0 auto;color:#6ea0d8;margin-top:1px}
.bk-rv-head b{font-family:var(--fdisp),system-ui;font-size:15px;color:#eef2f7}
.bk-rv-sub{font-size:12.5px;color:var(--mut);margin-top:2px;max-width:62ch}
.bk-rv-list{padding:8px 12px 14px;display:flex;flex-direction:column;gap:4px}
.bk-rv-row{display:flex;align-items:center;gap:12px;padding:7px 8px;border-radius:10px}
.bk-rv-row:hover{background:rgba(255,255,255,.03)}
.bk-rv-main{flex:1 1 auto;min-width:0}
.bk-rv-nm{display:block;font-size:13.5px;font-weight:600;color:#e7ecf3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bk-rv-meta{display:block;font-size:11.5px;color:var(--mut);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bk-rv-act{flex:0 0 auto;display:flex;gap:7px}
.bk-btn{font:inherit;font-size:12px;font-weight:600;border-radius:8px;padding:6px 11px;cursor:pointer;border:1px solid var(--line);background:rgba(255,255,255,.05);color:var(--mut);transition:background .14s,color .14s,border-color .14s}
.bk-btn:hover{color:var(--txt)}
.bk-btn.done{border-color:rgba(74,222,128,.4);color:#9be6b4;background:rgba(74,222,128,.1)}.bk-btn.done:hover{background:rgba(74,222,128,.2);color:#bff3d0}
.bk-btn.keep:hover{background:rgba(255,255,255,.1)}
/* Archiv (eingeklappt) */
.bk-arch{margin:16px 2px 0}
.bk-arch>summary{list-style:none;cursor:pointer;font-size:12.5px;font-weight:600;color:#8fa0b4;padding:7px 0;user-select:none}
.bk-arch>summary::-webkit-details-marker{display:none}
.bk-arch>summary:hover{color:#cfe0f5}
.bk-arch-list{display:flex;flex-direction:column;gap:3px;padding:6px 0 4px}
.bk-arch-row{display:flex;align-items:center;gap:12px;padding:7px 9px;border-radius:9px;background:rgba(255,255,255,.02)}
.bk-arch-nm{flex:1 1 auto;min-width:0;font-size:13px;color:#c4cdda;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bk-arch-meta{flex:0 0 auto;font-size:11.5px;color:var(--mut)}
.bk-row-val{flex:0 0 auto;font-size:12px;font-weight:700;color:var(--c);font-variant-numeric:tabular-nums}
.bk-more{font-size:11.5px;color:var(--mut);padding:7px 11px}
.bk-tag.fresh{color:#ffd9a8;background:rgba(255,180,84,.15);border:1px solid rgba(255,180,84,.3)}
/* Auslager-Hinweis: Archiv-Projekte liegen noch auf SSD → auf HDD/RAID verschieben */
/* ── SSD-Auslager-Hinweis: „Liquid Glass" im CI (Blau→Cyan, holografischer Rand) ── */
.bk-tip{position:relative;margin:20px 2px 6px;border-radius:18px;overflow:hidden;isolation:isolate;
  /* Solid-BG statt backdrop-filter → kein GPU-Overhead in Electron */
  background:linear-gradient(180deg,rgba(28,48,82,.92),rgba(18,28,46,.96) 58%,rgba(10,14,20,.98));
  box-shadow:0 22px 60px -30px rgba(74,158,255,.6),inset 0 1px 0 rgba(255,255,255,.07)}
.bk-tip::before{content:"";position:absolute;inset:0;border-radius:inherit;padding:1px;pointer-events:none;z-index:1;
  background:linear-gradient(135deg,rgba(132,200,255,.9),rgba(55,207,224,.35) 34%,rgba(74,158,255,0) 58%,rgba(126,116,255,.55));
  -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude}
.bk-tip::after{content:"";position:absolute;top:-45%;left:-12%;width:62%;height:170%;pointer-events:none;z-index:0;
  background:radial-gradient(closest-side,rgba(55,207,224,.20),transparent 72%);filter:blur(10px)}
.bk-tip-head{position:relative;z-index:2;display:flex;align-items:flex-start;gap:13px;padding:16px 18px 8px}
.bk-tip-ic{flex:0 0 auto;width:36px;height:36px;border-radius:11px;display:grid;place-items:center;
  background:linear-gradient(155deg,rgba(74,158,255,.32),rgba(55,207,224,.13));color:#cfeaff;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.2),0 7px 18px -9px rgba(74,158,255,.9)}
.bk-tip-ic svg{width:19px;height:19px}
.bk-tip-head b{font-family:var(--fdisp),system-ui;font-size:15.5px;letter-spacing:-.01em;
  background:linear-gradient(100deg,#eaf4ff,#c2e1ff 54%,#83d2e8);-webkit-background-clip:text;background-clip:text;color:transparent}
.bk-tip-sub{font-size:12.5px;color:#9fb6d4;margin-top:3px;line-height:1.5}
.bk-tip-sub b{color:#8fd2ff;font-family:inherit;font-size:inherit;font-weight:700}
.bk-tip-list{position:relative;z-index:2;display:flex;flex-direction:column;gap:5px;padding:8px 12px 14px}
.bk-tip-row{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:11px;cursor:pointer;width:100%;text-align:left;font:inherit;
  background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.016));
  border:1px solid rgba(122,162,255,.13);transition:transform .14s,border-color .14s,box-shadow .14s,background .14s}
.bk-tip-row:hover{transform:translateY(-1px);border-color:rgba(92,202,255,.55);
  background:linear-gradient(180deg,rgba(74,158,255,.15),rgba(55,207,224,.05));
  box-shadow:0 12px 28px -16px rgba(74,158,255,.95),inset 0 1px 0 rgba(255,255,255,.12)}
.bk-tip-nm{flex:1 1 auto;min-width:0;font-size:13px;font-weight:600;color:#e8eefb;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bk-tip-mv{flex:0 0 auto;font-size:11px;color:#829ab8;transition:color .14s}
.bk-tip-row:hover .bk-tip-mv{color:#a6d4ff}
.bk-tip-sz{flex:0 0 auto;font-size:12.5px;font-weight:800;font-variant-numeric:tabular-nums;
  background:linear-gradient(120deg,#8fbcff,#37cfe0);-webkit-background-clip:text;background-clip:text;color:transparent}
.bk-tip-more{font-size:11.5px;color:var(--mut);padding:6px 10px 2px;position:relative;z-index:2}
.bk-empty{font-size:12px;color:#5b6675;padding:10px 11px;font-style:italic}
/* Info-Dropdown „Wie erkennt Disky Backups?" (statt großer Box) */
.bk-info{margin:0 2px 18px}
.bk-info>summary{list-style:none;cursor:pointer;display:inline-flex;align-items:center;gap:8px;font-size:12.5px;font-weight:500;color:#8fa0b4;user-select:none;padding:5px 0;transition:color .12s}
.bk-info>summary:hover{color:#cdd8e6}
.bk-info>summary::-webkit-details-marker{display:none}
.bk-info-i{width:16px;height:16px;border-radius:50%;border:1.5px solid #5f86c4;color:#7ea3d8;font-style:italic;font-weight:700;font-size:10px;display:grid;place-items:center;flex:0 0 auto}
.bk-info-body{margin:8px 0 0 6px;font-size:13px;line-height:1.55;color:var(--mut);max-width:760px;border-left:2px solid var(--line);padding-left:13px}
.bk-info-body b{color:#cdd6e2;font-weight:600}
.bk-tip.risk{color:#ff8a8a}
/* ── Festplatten-Karte: Kopfzeile (Name kürzt, Aktionen bleiben oben-rechts) ── */
.drv-head{display:flex;align-items:center;gap:10px;flex-wrap:nowrap}
.drv-name{font-size:15px;font-weight:700;flex:0 1 auto;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.drv-date{flex:0 0 auto;font-size:12.5px}
.drv-open{cursor:pointer}
.drv-name.drv-open:hover{color:var(--acc)}
.drv-edit{width:14px;height:14px;flex:0 0 auto;color:#5b6675;opacity:0;transition:opacity .15s,color .15s}
.drv-edit svg{width:100%;height:100%}
.card:hover .drv-edit{opacity:.75}
.drv-edit:hover{color:var(--acc);opacity:1}
.drv-meta{font-size:12.5px;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
@media(max-width:680px){.drv-date{display:none}}
.drv-cat{font-size:12px;text-transform:uppercase;letter-spacing:.07em;color:#5b6675;font-weight:700;margin:20px 2px 11px}
/* ── Aufräum-Assistent ── */
.cleanup{display:flex;gap:24px;align-items:stretch;background:linear-gradient(180deg,rgba(74,158,255,.06),transparent),var(--bg2);border:1px solid var(--line);border-radius:18px;padding:20px 22px;margin:4px 0 22px;overflow:hidden}
.cl-main{flex:1 1 0;min-width:0;display:flex;flex-direction:column}
@media(max-width:820px){.cleanup{flex-direction:column}}
.cleanup.ok{display:flex;flex-direction:row;align-items:center;gap:12px}
.cleanup.ok .cl-ic{background:rgba(74,222,128,.14);color:#4ade80}
.cl-robot{position:relative;flex:0 0 300px;min-height:300px;align-self:stretch}
@media(max-width:820px){.cl-robot{flex-basis:auto;height:220px;min-height:220px}}
.cl-robot-glow{position:absolute;inset:-8% -5%;pointer-events:none;background:radial-gradient(closest-side,rgba(90,170,255,.18),transparent 72%)}
.cl-robot .asst-robot{position:absolute;inset:0;overflow:hidden}
.cl-head{display:flex;align-items:flex-start;gap:12px;margin-bottom:16px}
.cl-ic{width:32px;height:32px;flex:0 0 auto;display:grid;place-items:center;border-radius:9px;background:rgba(74,158,255,.14);color:var(--acc)}
.cl-ic svg{width:18px;height:18px}
.cl-tot{color:var(--acc);font-weight:700;font-size:13px;margin-left:8px}
.cl-defrag{display:block;width:100%;height:104px;margin:4px 0 16px;opacity:.96;border-radius:12px}
.cl-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(195px,1fr));gap:12px}
.cl-card{background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:13px 15px;transition:border-color .15s}
.cl-card:hover{border-color:#2c3a4f}
.cl-sz{font-size:21px;font-weight:800;letter-spacing:-.02em;color:var(--warn)}
.cl-ti{font-weight:700;font-size:13.5px;margin-top:3px}
.cl-sub{color:var(--mut);font-size:11.5px;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cl-hint{color:#6b7686;font-size:11.5px;margin-top:8px;line-height:1.45}
.cl-clean{margin-top:12px;font:inherit;font-weight:600;font-size:12.5px;color:var(--acc);background:rgba(74,158,255,.1);border:1px solid rgba(74,158,255,.35);border-radius:9px;padding:7px 13px;cursor:pointer;transition:background .15s,transform .15s}
.cl-clean:hover{background:rgba(74,158,255,.2);transform:translateY(-1px)}
/* Aufräum-Liste (Dateien/Ordner, im Finder zeigbar) */
.cl-list{background:var(--bg2);border:1px solid var(--line);border-radius:16px;padding:16px 18px;margin:4px 0 22px}
.cll-head{display:flex;flex-wrap:wrap;align-items:center;gap:8px 14px;margin-bottom:14px}
.cll-back{font:inherit;font-size:12.5px;font-weight:600;color:var(--mut);background:none;border:none;cursor:pointer;padding:2px 0;display:inline-flex;align-items:center;gap:6px;flex:0 0 100%}
.cll-back:hover{color:var(--txt)}
.cll-title{font-family:var(--fdisp);font-weight:700;font-size:17px;letter-spacing:-.01em;flex:0 0 100%}
.cll-sub{color:var(--mut);font-size:12.5px;flex:1;min-width:120px}
.cll-clean{font:inherit;font-weight:600;font-size:12.5px;color:var(--acc);background:rgba(74,158,255,.1);border:1px solid rgba(74,158,255,.35);border-radius:9px;padding:7px 13px;cursor:pointer;transition:background .15s;flex:0 0 auto}
.cll-clean:hover{background:rgba(74,158,255,.2)}
.cf-row{display:flex;align-items:center;gap:10px;padding:6px 9px;border-radius:8px;font-size:12.5px;cursor:default}
.cf-row[data-rel]{cursor:pointer}
.cf-row[data-rel]:hover{background:rgba(74,158,255,.08)}
.cf-ic{width:15px;height:15px;flex:0 0 auto;color:var(--mut)}.cf-ic svg{width:100%;height:100%}
.cf-name{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:260px;flex:0 1 auto}
.cf-path{color:#6b7686;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:30px}
.cf-sz{color:#8a94a3;flex:0 0 auto}
.cf-rev{width:15px;height:15px;flex:0 0 auto;color:#5b6675;opacity:0;transition:opacity .15s,color .15s}
.cf-rev svg{width:100%;height:100%}
.cf-row:hover .cf-rev{opacity:.85}.cf-rev:hover{color:var(--acc)}
/* Duplikat-Fundorte: „auch auf [Platte] /Pfad" — klare Nachverfolgung */
.cf-dups{display:flex;flex-wrap:wrap;gap:6px;align-items:center;padding:0 9px 7px 34px;font-size:11.5px;color:#7c8593}
.cf-also{color:#8a94a3;font-weight:700;text-transform:uppercase;letter-spacing:.05em;font-size:10px}
.cf-loc{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.035);border:1px solid var(--line);border-radius:7px;padding:2px 8px;max-width:380px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cf-loc .tag{flex:0 0 auto}
.cf-more{color:#6b7686}
@media(max-width:760px){.sidebar{display:none}.const-stage{aspect-ratio:1/1}}
/* ── WorldMap-View ── */
.wm-wrap{padding:0 0 30px}
.wm-stats{display:flex;gap:30px;margin:2px 0 16px}
.wm-stats b{font-size:22px;font-weight:800;display:block;font-variant-numeric:tabular-nums}
.wm-stats b.acc{color:var(--acc)}
.wm-stats span{font-size:11px;color:var(--mut)}
.wm-stage{position:relative;border-radius:18px;overflow:hidden;background:radial-gradient(120% 120% at 60% 30%,rgba(28,44,70,.5),rgba(8,12,18,.55));border:1px solid rgba(255,255,255,.07);box-shadow:inset 0 1px 0 rgba(255,255,255,.05),0 18px 50px rgba(0,0,0,.4);aspect-ratio:2/1;max-height:60vh}
#wmSvg{position:absolute;inset:0;width:100%;height:100%;cursor:grab;touch-action:none}
#wmSvg:active{cursor:grabbing}
.wm-dots circle{fill:#2c4a72}
.wm-mk{cursor:pointer}
.wm-mk .wm-ring{fill:#4a9eff;stroke:#bfe0ff;stroke-width:.8;filter:drop-shadow(0 0 4px rgba(74,158,255,.9))}
.wm-mk .wm-pulse{fill:#4a9eff;opacity:.12;transform-box:fill-box;transform-origin:center;animation:wmPulse 2.6s ease-in-out infinite}
.wm-mk .wm-core{fill:#fff}
.wm-mk:hover .wm-ring{filter:drop-shadow(0 0 8px rgba(120,190,255,1))}
@keyframes wmPulse{0%,100%{opacity:.07;transform:scale(.9)}50%{opacity:.2;transform:scale(1.12)}}
.wm-ctrl{position:absolute;right:14px;bottom:14px;display:flex;flex-direction:column;gap:7px;z-index:4}

<script type="module">
// KI-Bibliothek wird LAZY geladen — erst wenn KI-Suche/KI-Index wirklich genutzt wird.
// Dadurch startet die App sofort (kein MB-Download beim Start).
const MODEL="Xenova/clip-vit-base-patch32";
const LIB="https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.3.3";
let vision,text,processor,tokenizer,RawImage,loading=null;
function norm(a){let s=0;for(const x of a)s+=x*x;s=Math.sqrt(s)||1;const o=new Float32Array(a.length);for(let i=0;i<a.length;i++)o[i]=a[i]/s;return o;}
async function load(onlog){
  if(window.DiskyAI.ready) return;
  if(loading) return loading;
  loading=(async()=>{
    onlog&&onlog("Lade KI-Bibliothek…");
    const T = await import(LIB);
    const { AutoTokenizer, CLIPTextModelWithProjection, AutoProcessor, CLIPVisionModelWithProjection, env } = T;
    RawImage = T.RawImage; env.allowLocalModels=false;
    try{ onlog&&onlog("Lade KI-Modell (WebGPU)…");
      vision=await CLIPVisionModelWithProjection.from_pretrained(MODEL,{device:"webgpu",dtype:"fp16"}); window.DiskyAI.device="WebGPU"; }
    catch(e){ onlog&&onlog("WebGPU n/a → WASM…");
      vision=await CLIPVisionModelWithProjection.from_pretrained(MODEL,{device:"wasm",dtype:"q8"}); window.DiskyAI.device="WASM"; }
    text=await CLIPTextModelWithProjection.from_pretrained(MODEL,{device:window.DiskyAI.device==="WebGPU"?"webgpu":"wasm",dtype:window.DiskyAI.device==="WebGPU"?"fp16":"q8"});
    processor=await AutoProcessor.from_pretrained(MODEL);
    tokenizer=await AutoTokenizer.from_pretrained(MODEL);
    window.DiskyAI.ready=true; onlog&&onlog("KI bereit ("+window.DiskyAI.device+")");
  })();
  return loading;
}
async function embedImageSrc(src){ const img=await RawImage.read(src); const inp=await processor(img); const out=await vision(inp); return norm(out.image_embeds.data); }
async function embedText(q){ const inp=tokenizer([q],{padding:true,truncation:true}); const out=await text(inp); return norm(out.text_embeds.data); }
window.DiskyAI={ready:false,device:"",load,embedImageSrc,embedText};
</script>

function matchDriveType(model, ssd, removable){
  const m=(model||"").toLowerCase();
  if(/apple|interne ssd|macintosh/.test(m)) return "mac";
  if(/cfexpress|cfe\b|xqd/.test(m)) return "cfexpress";
  if(/micro ?sd/.test(m)) return "microsd";
  if(/\bsd(xc|hc)?\b|sd[- ]?karte|memory ?card|card ?reader|\breader\b|card$/.test(m)) return "card";
  if(/rugged|lacie/.test(m)) return "rugged";
  if(/my ?passport/.test(m)) return "passport";
  if(/my ?book/.test(m)) return "mybook";
  if(/one ?touch|backup ?plus|expansion/.test(m)) return "onetouch";
  if(/sandisk|extreme/.test(m)) return "sandisk";
  if(/g-?raid|thunderbay|owc|pegasus|2big|6big/.test(m)) return "raidsilver";
  if(/synology|qnap|diskstation|\bnas\b/.test(m)) return "nas";
  if(/my ?book|desktop|d2 /.test(m)) return "desktop";
  if(removable) return "card";   // entfernbare, unbenannte Karte/Reader → Speicherkarte
  return ssd ? "ssd" : "hdd";
}

let DB;
function openDB(){
  return new Promise((res,rej)=>{
    const r = indexedDB.open("drivecat", 1);

      const d = e.target.result;
      d.createObjectStore("drives",{keyPath:"id",autoIncrement:true});
      const f = d.createObjectStore("files",{keyPath:"id",autoIncrement:true});
      f.createIndex("driveId","driveId");
      f.createIndex("hash","hash");

    r.onsuccess=()=>res(r.result);
    r.onerror=()=>rej(r.error);
  });
}
function tx(stores,mode){ return DB.transaction(stores,mode); }

function getAll(store,index,key){

function human(n){
  if(n==null) return "?";
  n=+n; const u=["B","KB","MB","GB","TB","PB"]; let i=0;
  while(Math.abs(n)>=1024 && i<u.length-1){n/=1024;i++;}
  return (i? n.toFixed(1):n)+" "+u[i];
}
// Byte-Wert in Animations-Teile zerlegen (passend zu human(): Mantisse + Einheit)
function byteAnim(bytes){ const s=human(bytes); const m=(""+s).match(/^([\d.]+)\s*(\w+)$/);
  return m ? {to:parseFloat(m[1]), dec:(m[2]==="B"?0:1), suf:" "+m[2], final:s} : {to:0,dec:0,suf:"",final:s}; }
// Zahlen im Cockpit beim (Wieder-)Laden hochzählen — Ease-out, Endwert exakt gesnappt.
function animateCounts(root){
  root.querySelectorAll(".cnum[data-to]").forEach(el=>{
    const to=parseFloat(el.dataset.to)||0, dec=+el.dataset.dec||0, sep=el.dataset.sep==="1";
    const pre=el.dataset.pre||"", suf=el.dataset.suf||"", finalTxt=el.textContent;
    if(to<=0) return;                                 // 0 → Endwert stehen lassen (bewusst auch bei „Bewegung reduzieren": Effekt ist explizit gewünscht)
    // Endbreite reservieren + linksbündig → die erste Ziffer bleibt fix, die Zeile wackelt nicht beim Hochzählen
    el.style.display="inline-block"; el.style.textAlign="left";
    el.style.minWidth=Math.ceil(el.getBoundingClientRect().width)+"px";
    const fmt=v=> pre + (sep ? Math.round(v).toLocaleString("de") : v.toFixed(dec)) + suf;
    const start=to*0.9;                               // nicht von 0 — nur das letzte Stück sanft hochzählen (smoother/easier)
    const DUR=850, t0=performance.now();
    el.textContent=fmt(start);
    let done=false;
    const step=now=>{ if(done) return; const p=Math.min(1,(now-t0)/DUR); const e=1-Math.pow(1-p,3);
      if(p>=1){ done=true; el.textContent=finalTxt; return; }
      el.textContent=fmt(start+(to-start)*e); requestAnimationFrame(step); };
    requestAnimationFrame(step);
    setTimeout(()=>{ if(!done){ done=true; el.textContent=finalTxt; } }, DUR+400); // Sicherheitsnetz, falls rAF nicht tickt
  });
}
function esc(s){return(s==null?"":""+s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

function t(k,...a){ const L=I18N[lang]||I18N.de; let v=(k in L)?L[k]:I18N.de[k]; if(v==null) return k; return typeof v==="function"?v(...a):v; }
function nloc(n){ try{ return (n==null?0:n).toLocaleString(lang==="en"?"en-US":"de-DE"); }catch(e){ return ""+n; } }
function applyStaticI18n(){
  try{ document.documentElement.lang=lang; }catch(e){}
  document.querySelectorAll("[data-i18n]").forEach(el=>{ el.textContent=t(el.getAttribute("data-i18n")); });
  document.querySelectorAll("[data-i18n-ph]").forEach(el=>{ el.setAttribute("placeholder",t(el.getAttribute("data-i18n-ph"))); });
  document.querySelectorAll("[data-i18n-title]").forEach(el=>{ el.setAttribute("title",t(el.getAttribute("data-i18n-title"))); });
  document.querySelectorAll(".sb-lang button").forEach(b=>b.classList.toggle("on", b.dataset.lang===lang));
}
function setLang(l){ if((l!=="de"&&l!=="en")||l===lang) return; lang=l; localStorage.setItem("disky_lang",l);
  applyStaticI18n();
  try{ render(); }catch(e){}
  try{ renderSidebarDrives(); }catch(e){}
  try{ renderAcct(); }catch(e){}
}

/* SHA-256 Quick-Hash: Größe + Anfang/Mitte/Ende (je 1 MB) */
async function quickHash(file){
  const size = file.size;
  let parts;
  if(size <= 3*CHUNK) parts=[file];
  else parts=[file.slice(0,CHUNK),
              file.slice(Math.floor(size/2),Math.floor(size/2)+CHUNK),
              file.slice(size-CHUNK,size)];
  const head = new TextEncoder().encode(String(size));
  const bufs = [head.buffer];
  for(const p of parts) bufs.push(await p.arrayBuffer());
  let total=0; for(const b of bufs) total+=b.byteLength;
  const all=new Uint8Array(total); let off=0;
  for(const b of bufs){ all.set(new Uint8Array(b),off); off+=b.byteLength; }
  const dig = await crypto.subtle.digest("SHA-256", all);
  return [...new Uint8Array(dig)].map(x=>x.toString(16).padStart(2,"0")).join("");
}

/* Verzeichnis rekursiv durchlaufen */
async function* walk(dirHandle, rel){
  for await (const e of dirHandle.values()){
    if(IGNORE_NAMES.has(e.name) || e.name.startsWith("._")) continue;
    const childRel = rel ? rel+"/"+e.name : e.name;

  const dots=WM_DOTS.map(d=>{const q=_wmProj(d[0],d[1]);return `<circle cx="${q[0].toFixed(1)}" cy="${q[1].toFixed(1)}" r="1.15"/>`;}).join("");
  const PR=p=>p.pr[0]?p.pr[0].name:t("wm_here");
  const drawMarks=(list)=>list.map(p=>{const q=_wmProj(p.lo,p.la); const r=(5+Math.sqrt(p.n/maxN)*15).toFixed(1); const i=places.indexOf(p);
    return `<g class="wm-mk" data-i="${i}" tabindex="0" role="button" aria-label="${esc(PR(p))}, ${p.n} ${t("wm_files")}" transform="translate(${q[0].toFixed(1)},${q[1].toFixed(1)})"><circle class="wm-pulse" r="${(+r+9).toFixed(1)}"/><circle class="wm-ring" r="${r}"/><circle class="wm-core" r="2.5"/></g>`;}).join("");
  const totBy=places.reduce((a,p)=>a+p.by,0), totPr=new Set(places.flatMap(p=>p.pr.map(x=>x.name))).size;
  const chip=(k,v,lab)=>`<button class="wm-chip" data-fk="${k}" data-fv="${esc(String(v))}">${esc(lab)}</button>`;
  app.innerHTML = pageHero("worldmap") + `<div class="wm-wrap">
    <div class="wm-stats"><div><b>${nloc(places.length)}</b><span>${t("wm_locs")}</span></div><div><b class="acc">${nloc(totPr)}</b><span>${t("wm_projs")}</span></div><div><b>${human(totBy)}</b><span>${t("wm_material")}</span></div></div>
    <div class="wm-top">
      <label class="wm-search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="10.5" cy="10.5" r="6.5"/><path d="M20 20l-4.5-4.5"/></svg><input id="wmQ" placeholder="${t("wm_search_ph")}"></label>
      <div class="wm-chips">${driveOpts.map(d=>chip("drive",d.id,d.label)).join("")}${projOpts.slice(0,8).map(p=>chip("proj",p,p)).join("")}</div>
    </div>
    <div class="wm-stage">
      <svg id="wmSvg" viewBox="0 0 1000 500" preserveAspectRatio="xMidYMid meet"><g id="wmG"><g class="wm-dots">${dots}</g><g class="wm-links" id="wmLinks"></g><g class="wm-marks" id="wmMarks">${drawMarks(places)}</g></g></svg>
      <div class="wm-sweep" aria-hidden="true"></div>
      ${places.length?`<div class="wm-legend"><i class="d" style="width:6px;height:6px"></i><i class="d" style="width:11px;height:11px"></i><span>${t("wm_legend")}</span></div>`:""}
      ${places.length?`<div class="wm-list" id="wmList"></div>`:""}
      ${places.length?"":`<div class="wm-empty"><div class="wm-empty-ic"><svg viewBox="0 0 24 24" width="36" height="36" fill="none" stroke="#4a9eff" stroke-width="1.7" stroke-linejoin="round"><path d="M12 21.5s7-6.6 7-11.7a7 7 0 1 0-14 0c0 5.1 7 11.7 7 11.7z"/><circle cx="12" cy="9.6" r="2.6" fill="#4a9eff" stroke="none"/></svg></div>${t("wm_empty")}</div>`}
      <div class="wm-ctrl"><button id="wmIn" title="+" aria-label="+">+</button><button id="wmOut" title="−" aria-label="−">−</button><button id="wmRst" title="reset" aria-label="reset">⟳</button></div>
      <div class="wm-tip" id="wmTip"></div>
      <aside class="wm-panel" id="wmPanel"><button class="wm-panel-x" id="wmPanelX" aria-label="close">×</button><div class="wm-panel-h" id="wmPanelH"></div><div class="wm-panel-l" id="wmPanelL"></div></aside>
    </div></div>`;
  const svg=document.getElementById("wmSvg"), g=document.getElementById("wmG"), tip=document.getElementById("wmTip");
  const stage=document.querySelector(".wm-stage"), panel=document.getElementById("wmPanel"), links=document.getElementById("wmLinks");
  _wm={s:1,x:0,y:0,drag:null,raf:0};
  const clamp=()=>{ const span=1000*(_wm.s-1), spy=500*(_wm.s-1); _wm.x=Math.max(-span,Math.min(0,_wm.x)); _wm.y=Math.max(-spy,Math.min(0,_wm.y)); };
  const apply=()=>{ clamp(); g.setAttribute("transform",`translate(${_wm.x} ${_wm.y}) scale(${_wm.s})`); };
  // eased fly-to a viewBox point (cx,cy in 0..1000/0..500) at target scale
  const flyTo=(cx,cy,ts)=>{ cancelAnimationFrame(_wm.raf); const s0=_wm.s,x0=_wm.x,y0=_wm.y, s1=Math.max(1,Math.min(8,ts||4));
    const x1=500-cx*s1, y1=250-cy*s1, t0=performance.now(), D=520;
    const step=(now)=>{ let k=Math.min(1,(now-t0)/D); k=1-Math.pow(1-k,3); _wm.s=s0+(s1-s0)*k; _wm.x=x0+(x1-x0)*k; _wm.y=y0+(y1-y0)*k; apply(); if(k<1)_wm.raf=requestAnimationFrame(step); }; _wm.raf=requestAnimationFrame(step); };
  const zoom=(d)=>{ _wm.s=Math.max(1,Math.min(8,_wm.s*d)); apply(); };
  svg.onwheel=(e)=>{ e.preventDefault(); zoom(e.deltaY<0?1.18:1/1.18); };
  svg.onpointerdown=(e)=>{ _wm.drag={x:e.clientX,y:e.clientY,ox:_wm.x,oy:_wm.y,moved:false}; try{svg.setPointerCapture(e.pointerId);}catch(_){} };
  svg.onpointermove=(e)=>{ if(!_wm.drag)return; const k=1000/(svg.clientWidth||1000); _wm.x=_wm.drag.ox+(e.clientX-_wm.drag.x)*k; _wm.y=_wm.drag.oy+(e.clientY-_wm.drag.y)*k; if(Math.abs(e.clientX-_wm.drag.x)+Math.abs(e.clientY-_wm.drag.y)>3)_wm.drag.moved=true; apply(); };
  svg.onpointerup=svg.onpointercancel=()=>{ _wm.drag=null; };
  document.getElementById("wmIn").onclick=()=>zoom(1.5);
  document.getElementById("wmOut").onclick=()=>zoom(1/1.5);
  document.getElementById("wmRst").onclick=()=>{ closePanel(); cancelAnimationFrame(_wm.raf); _wm={s:1,x:0,y:0,drag:null,raf:0}; apply(); };
  // ── tooltip via delegation (clamped to stage) ──
  const showTip=(p)=>{ tip.innerHTML=`<b>${esc(PR(p))}</b><span>${nloc(p.n)} ${t("wm_files")} · ${human(p.by)}</span>`+(p.pr.length>1?`<i>+${p.pr.length-1} ${t("wm_more")}</i>`:""); tip.classList.add("show"); };
  const moveTip=(e)=>{ const r=stage.getBoundingClientRect(); let x=e.clientX-r.left+14,y=e.clientY-r.top+14; const w=tip.offsetWidth||170,h=tip.offsetHeight||50; if(x+w>r.width)x=Math.max(6,e.clientX-r.left-w-12); if(y+h>r.height)y=Math.max(6,r.height-h-8); tip.style.left=x+"px"; tip.style.top=y+"px"; };
  const closePanel=()=>{ panel.classList.remove("show"); stage.classList.remove("with-panel"); links.innerHTML=""; svg.querySelectorAll(".wm-mk.sel").forEach(m=>m.classList.remove("sel")); };
  // ── click a marker → fly-to + side panel listing its projects ──
  const openPlace=(i)=>{ const p=places[i]; if(!p)return; const q=_wmProj(p.lo,p.la);
    svg.querySelectorAll(".wm-mk.sel").forEach(m=>m.classList.remove("sel")); const mk=svg.querySelector(`.wm-mk[data-i="${i}"]`); if(mk)mk.classList.add("sel");
    flyTo(q[0],q[1],4.2);
    document.getElementById("wmPanelH").innerHTML=`<b>${esc(PR(p))}</b><span>${nloc(p.n)} ${t("wm_files")} · ${human(p.by)} · ${p.drv.map(d=>esc(driveName(d))).join(", ")}</span>`;
    const max=Math.max(1,...p.pr.map(x=>x.n));
    document.getElementById("wmPanelL").innerHTML=p.pr.map(x=>`<div class="wm-prow" data-proj="${esc(x.name)}" data-did="${x.drv[0]}"><div style="flex:1;min-width:0"><div class="nm">${esc(x.name)}</div><div class="bar" style="width:${Math.round(x.n/max*100)}%"></div></div><span class="ct">${nloc(x.n)}</span></div>`).join("");
    document.getElementById("wmPanelL").querySelectorAll(".wm-prow").forEach(row=>row.onclick=()=>{ mapDriveId=+row.dataset.did||row.dataset.did; mapStack=[]; mapTree=null; mapDrill=row.dataset.proj; setView("map"); });
    panel.classList.add("show"); stage.classList.add("with-panel");
    // connection lines: link this place to every other place sharing one of its projects (multi-location shoot)
    const myProj=new Set(p.pr.map(x=>x.name)); let ln="";
    places.forEach((o,j)=>{ if(j===i||!o)return; if(o.pr.some(x=>myProj.has(x.name))){ const a=_wmProj(p.lo,p.la),b=_wmProj(o.lo,o.la); const mx=(a[0]+b[0])/2,my=(a[1]+b[1])/2-Math.hypot(a[0]-b[0],a[1]-b[1])*.18; ln+=`<path class="wm-link" d="M${a[0].toFixed(1)},${a[1].toFixed(1)} Q${mx.toFixed(1)},${my.toFixed(1)} ${b[0].toFixed(1)},${b[1].toFixed(1)}"/>`; } });
    links.innerHTML=ln;
  };
  // delegated marker events
  let hoverP=null;
  svg.addEventListener("mouseover",e=>{ const mk=e.target.closest(".wm-mk"); if(!mk)return; hoverP=places[+mk.dataset.i]; if(hoverP)showTip(hoverP); });
  svg.addEventListener("mousemove",e=>{ if(hoverP)moveTip(e); });
  svg.addEventListener("mouseout",e=>{ if(e.target.closest(".wm-mk")){ hoverP=null; tip.classList.remove("show"); } });
  svg.addEventListener("click",e=>{ const mk=e.target.closest(".wm-mk"); if(mk&&!(_wm.drag&&_wm.drag.moved))openPlace(+mk.dataset.i); });
  svg.addEventListener("keydown",e=>{ const mk=e.target.closest(".wm-mk"); if(mk&&(e.key==="Enter"||e.key===" ")){ e.preventDefault(); openPlace(+mk.dataset.i); } });
  document.getElementById("wmPanelX").onclick=closePanel;
  stage.addEventListener("keydown",e=>{ if(e.key==="Escape")closePanel(); });
  // ── searchable location list (bottom-left), click = fly-to ──
  const listEl=document.getElementById("wmList"), qEl=document.getElementById("wmQ");
  const buildList=(term)=>{ if(!listEl)return; const tl=(term||"").toLowerCase();
    const rows=places.map((p,i)=>({p,i})).filter(({p})=>!tl||PR(p).toLowerCase().includes(tl)||p.pr.some(x=>x.name.toLowerCase().includes(tl))).sort((a,b)=>b.p.n-a.p.n).slice(0,40);
    listEl.innerHTML=rows.map(({p,i})=>`<div class="li" data-i="${i}"><b>${esc(PR(p))}</b><span>${nloc(p.n)}</span></div>`).join("")||`<div class="li" style="cursor:default"><span>${t("wm_none")}</span></div>`;
    listEl.querySelectorAll(".li[data-i]").forEach(li=>li.onclick=()=>openPlace(+li.dataset.i)); };
  buildList("");
  // ── filter chips (drive / project) ──
  const active={drive:new Set(),proj:new Set()};
  const applyFilter=()=>{ const keep=places.map((p,i)=>{ const okD=!active.drive.size||p.drv.some(d=>active.drive.has(String(d))); const okP=!active.proj.size||p.pr.some(x=>active.proj.has(x.name)); return okD&&okP?i:-1; }).filter(i=>i>=0);
    document.getElementById("wmMarks").innerHTML=drawMarks(keep.map(i=>places[i])); };
  app.querySelectorAll(".wm-chip").forEach(c=>c.onclick=()=>{ const k=c.dataset.fk,v=c.dataset.fv; const set=active[k]; if(set.has(v))set.delete(v); else set.add(v); c.classList.toggle("on"); applyFilter(); });
  if(qEl)qEl.oninput=()=>buildList(qEl.value);
  apply();
}

function pageHero(key){
  if(!ART[key] && !["drives","projects","search","map","dupes","backup","gather","worldmap"].includes(key)) return "";
  const eb=t("hero_"+key+"_eb"), ti=t("hero_"+key+"_t"), d=t("hero_"+key+"_d");
  return `<header class="phero"><div class="phero-txt"><div class="phero-eyebrow">${eb}</div><h1 class="phero-title">${ti}</h1><p class="phero-desc">${d}</p></div><div class="phero-art">${ART[key]||""}</div></header>`;
}
/* ── Sammlung (Gather) — plattenübergreifend, in localStorage gemerkt ── */
let _gatherDest=null;
function gatherGet(){ try{ return JSON.parse(localStorage.getItem("disky_gather")||"[]"); }catch(e){ return []; } }
function gatherSet(a){ localStorage.setItem("disky_gather", JSON.stringify(a)); updateGatherBadge(); }
function gatherHas(driveId, project){ return gatherGet().some(x=>x.driveId===driveId && x.project===project); }
function gatherToggle(driveId, project){ const a=gatherGet(); const i=a.findIndex(x=>x.driveId===driveId&&x.project===project);
  if(i>=0) a.splice(i,1); else a.push({driveId, project}); gatherSet(a); }
function updateGatherBadge(){ const el=document.getElementById("gatherBadge"); if(!el) return;
  const n=gatherGet().length; el.textContent=n||""; el.classList.toggle("show", n>0); }

function setView(v){ view=v;
  document.querySelectorAll(".nav").forEach(x=>x.classList.toggle("on",x.dataset.v===v));
  render();
}
document.querySelectorAll(".nav").forEach(t=>t.onclick=()=>setView(t.dataset.v));
document.getElementById("brandHome")?.addEventListener("click",e=>{ e.preventDefault(); setView("overview"); });  // Logo → Übersicht (nicht mehr auf tote landing.html)
document.querySelectorAll(".sb-lang button").forEach(b=>b.onclick=()=>setLang(b.dataset.lang));   // Sprache EN/DE umschalten
document.getElementById("scanBtn").onclick=()=>{ if(view!=="overview") setView("overview"); setTimeout(startScan,80); };
document.getElementById("feedbackBtn")?.addEventListener("click",showFeedback);
qbox.oninput=e=>{ q=e.target.value.toLowerCase(); render(); };
function match(s){ return !q || (""+ (s||"")).toLowerCase().includes(q); }

async function render(){
  // Laufende Hintergrund-Animationen der vorigen Ansicht stoppen (sonst laufen rAF-Loops auf
  // unsichtbaren Canvases weiter und ziehen dauerhaft CPU). Die jeweilige Ansicht startet neu, was sie braucht.
  if(_defragStop){ _defragStop(); _defragStop=null; }
  if(_asstAttn){ clearInterval(_asstAttn); _asstAttn=null; }
  if(_ovClock){ clearInterval(_ovClock); _ovClock=null; }
  if(_ovTelem){ clearInterval(_ovTelem); _ovTelem=null; }
  const _ovb=document.getElementById("ovBg"); if(_ovb) _ovb.classList.remove("hide");   // Starfield-Hintergrund auf JEDER Seite
  qbox.classList.toggle("hide", view==="overview" || view==="map" || view==="search" || view==="gather" || view==="backup" || view==="dupes");
  renderSidebarDrives(); updateGatherBadge();
  // Navigation: dauert die Ansicht >170ms, fährt das Sternenfeld (rechts) in den Hyperspace —
  // beim Fertig-Rendern bremst es nahtlos zurück. Der allererste Start steuert den Warp selbst (IIFE).
  const lt=-1;   // KEIN Warp bei Navigation/Re-Render — Hyperspace läuft NUR im leeren Boot-Ladescreen, nie über sichtbarem Content
  let p;
  if(view==="overview") p=renderOverview();
  else if(view==="drives") p=renderDrives();
  else if(view==="map") p=renderMap();
  else if(view==="worldmap") p=renderWorldMap();
  else if(view==="projects") p=renderProjects();
  else if(view==="dupes") p=renderDupes();
  else if(view==="backup") p=renderBackup();
  else if(view==="search") p=renderSearch();
  else if(view==="gather") p=renderGather();
  return Promise.resolve(p).finally(()=>{ if(lt>=0){ clearTimeout(lt); warpStarfield(0); } });
}

/* ───────────────────────── Übersicht (Home) ───────────────────────── */
async function renderOverview(){
  const supported = !!window.showDirectoryPicker;
  const drives = await getAll("drives");
  const importInput = `<input type="file" id="importfile" accept="application/json" class="hide">`;

  if(drives.length===0){
    app.innerHTML = `
      <div class="welcome">
        <div class="wglow"></div>
        <div class="wicon"><svg viewBox="0 0 96 96" fill="none">
          <defs><linearGradient id="wg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#333b48"/><stop offset="1" stop-color="#1b2029"/></linearGradient></defs>
          <rect x="13" y="24" width="70" height="44" rx="12" fill="url(#wg)" stroke="#2f3a48"/>
          <rect x="24" y="33" width="34" height="4" rx="2" fill="#fff" opacity=".08"/>
          <rect x="20" y="46" width="44" height="3" rx="1.5" fill="#4a9eff" opacity=".45"/>
          <circle cx="27" cy="58" r="3" fill="#4a9eff"/>
          <circle cx="67" cy="63" r="13" fill="#0d0f14" stroke="#4a9eff" stroke-width="3.2"/>
          <line x1="76" y1="72" x2="84" y2="80" stroke="#4a9eff" stroke-width="3.2" stroke-linecap="round"/></svg></div>
        <h1 class="wtitle">${t("welcome_title")}</h1>
        <p class="wsub">${t("welcome_sub")}</p>
        <button class="big wcta" id="pick" ${supported?"":"disabled"}>${t("welcome_cta")}</button>
        <div class="wmeta">${t("welcome_free",DISKY.FREE_LIMIT)} · ${supported?"":t("welcome_browser")}<a class="wlink" id="import">${t("welcome_import")}</a></div>
        ${importInput}
        <div id="scanArea" class="prog hide" style="text-align:left;max-width:580px;margin:24px auto 0"></div>
      </div>
      <div id="connected"></div>`;
  } else {
    let files=0, bytes=0; drives.forEach(d=>{ files+=d.fileCount||0; bytes+=d.bytes||0; });
    // Perf: Duplikat-/Backup-Analyse über ALLE Dateien ist teuer → per Katalog-Signatur memoizieren.
    // Unveränderter Katalog (gleiche Platten/Dateizahl/Bytes) → sofort aus dem Cache statt 800k erneut zu laden+iterieren.
    const _ovSig = drives.map(d=>(d.id||d.label)+":"+(d.fileCount||0)+":"+(d.bytes||0)).join("|");
    // Session-übergreifend cachen: bei unverändertem Katalog (Normalfall beim Öffnen) rendert das Cockpit SOFORT
    // mit den letzten Zahlen — kein 800k-Datei-Load im Boot-Pfad. Nach einem Scan invalidiert die Signatur den Cache.
    if(!_ovStatsCache){ try{ const _p=JSON.parse(localStorage.getItem("disky_ovstats")||"null"); if(_p&&_p.sig) _ovStatsCache=_p; }catch(e){} }
    let dupGroups, reclaim, ba;
    if(_ovStatsCache && _ovStatsCache.sig===_ovSig){ ({dupGroups, reclaim, ba}=_ovStatsCache); }
    else {
      const all = await allFiles();
      const hmap = new Map();
      for(const f of all){ if(!f.hash||(f.size||0)<1048576) continue; const k=fkey(f); let g=hmap.get(k); if(!g){g={size:f.size,n:0};hmap.set(k,g);} g.n++; }
      dupGroups=0; reclaim=0;
      for(const g of hmap.values()){ if(g.n>1){ dupGroups++; reclaim+=g.size*(g.n-1); } }
      ba = analyzeBackup(all, drives);   // Backup IMMER projektbasiert
      _ovStatsCache={sig:_ovSig, dupGroups, reclaim, ba};
      try{ localStorage.setItem("disky_ovstats", JSON.stringify(_ovStatsCache)); }catch(e){}
    }
    // angeschlossene Volumes (für Live-Status + Karten-Punkte) + noch nicht katalogisierte Mac-Platte
    let _on={uuids:new Set(),names:new Set()}, internalVol=null;
    if(window.diskyNative?.listVolumes){ try{ const vols=await getVolumes();
      _on=buildOnline(vols);
      const iv=vols.find(v=>v.internal);
      if(iv && !drives.some(d=>d.driveType==="mac"||d.volumeName===iv.volumeName||d.label===iv.volumeName||d.label===iv.name)) internalVol=iv;
    }catch(e){} }
    const isOnline=d=> driveOnline(d, _on);
    const connected = drives.filter(isOnline).length;
    // ── „Braucht Aufmerksamkeit" — proaktive Hinweise, nach Dringlichkeit ──
    const full = drives.filter(d=>d.capacityBytes && (d.bytes||0)/d.capacityBytes>=0.9)
      .sort((a,b)=>((b.bytes||0)/b.capacityBytes)-((a.bytes||0)/a.capacityBytes))[0];
    const tips=[];
    if(internalVol) tips.push({cls:"new",internal:1,tx:t("tip_internal",esc(internalVol.volumeName||"Macintosh HD"))});
    if(full) tips.push({cls:"warn",disk:full.id,tx:t("tip_full",esc(full.label),Math.min(100,Math.round(100*(full.bytes||0)/full.capacityBytes)))});
    if(ba.risk.length){ tips.push({cls:"risk",go:"backup",tx:t("tip_risk",ba.risk.length,esc(projName(ba.risk[0].name)))}); }
    if(ba.partial.length){ tips.push({cls:"warn",go:"backup",tx:t("tip_partial",ba.partial.length)}); }
    if(ba.review.length){ tips.push({cls:"new",go:"backup",tx:t("tip_review",ba.review.length)}); }
    if(reclaim>0) tips.push({cls:"reclaim",go:"dupes",tx:t("tip_reclaim",human(reclaim))});
    const asstTitle = tips.length ? t("asst_title",tips.length) : t("asst_allgood");
    const asstItems = tips.length
      ? tips.slice(0,4).map(tip=>{ const attr = tip.disk!=null ? `data-disk="${tip.disk}"` : tip.internal ? `data-internal="1"` : `data-go="${tip.go}"`;
          return `<button class="atip ${tip.cls}" ${attr}><span class="atip-tx">${tip.tx}</span><span class="atip-arr">→</span></button>`; }).join("")
      : `<div class="atip ok"><span class="atip-tx">${t("asst_ok")}</span></div>`;
    const asst=`<section class="asst">
      <div class="asst-left">
        <div class="asst-eyebrow"><span class="cpit-dot"></span>${t("asst_eyebrow")}</div>
        <h2 class="asst-title">${asstTitle}</h2>
        <div class="asst-items">${asstItems}</div>
      </div>
      <div class="asst-right">
        <span class="asst-glow"></span>
        <div class="asst-robot" id="asstRobot"></div>
      </div>
    </section>`;
    // ── Live-Status-Strip (Zahlen zählen beim Laden hoch) ──
    const bA=byteAnim(bytes);
    const stats=`<div class="ov-stats">
      <div class="s"><span class="sv cnum" data-to="${drives.length}">${drives.length}</span><span class="sl">${t("stat_drives",drives.length)}${connected?t("stat_connected",connected):""}</span></div>
      <span class="sep"></span>
      <div class="s"><span class="sv cnum" data-to="${files}" data-sep="1">${nloc(files)}</span><span class="sl">${t("stat_files")}</span></div>
      <span class="sep"></span>
      <div class="s"><span class="sv cnum" data-to="${bA.to}" data-dec="${bA.dec}" data-suf="${esc(bA.suf)}">${bA.final}</span><span class="sl">${t("stat_used")}</span></div>
      <span class="sep"></span>
      <div class="s${dupGroups>0?" amber":""}"><span class="sv cnum" data-to="${dupGroups}">${dupGroups}</span><span class="sl">${t("stat_dupgroups",dupGroups)}</span></div>
    </div>`;
    // ── Platten-Karten (Belegung + Verbindungsstatus → Speicher-Karte) ──
    const driveCard=d=>{ const c=d.capacityBytes||0, u=d.bytes||0, pct=c?Math.min(100,Math.round(u/c*100)):null;
      const on=isOnline(d), lvl=pct==null?"":pct>=95?"red":pct>=80?"amber":"";
      return `<button class="ov-drive ${lvl}" data-disk="${d.id}" title="${t("dc_open")}">
        <span class="ovd-top"><span class="ovd-ic">${driveImg(d.driveType)}</span><span class="ovd-dot ${on?"on":"off"}" title="${on?t("dc_connected"):t("dc_closet")}"></span></span>
        <span class="ovd-name">${esc(d.label)}</span>
        <span class="ovd-cap">${c?human(u)+" / "+human(c):human(u)}</span>
        <span class="ovd-bar"${pct==null?' style="opacity:.35"':''}><span style="width:${pct==null?0:Math.min(100,pct)}%"></span></span>
        <span class="ovd-meta">${pct!=null?pct+"% · ":""}${t("dc_files",nloc(d.fileCount||0))}</span>
      </button>`; };
    const driveCards = [...drives].sort((a,b)=>(b.driveType==="mac"?1:0)-(a.driveType==="mac"?1:0)).map(driveCard).join("");
    // JARVIS-Status: der Robo „meldet sich" direkt beim Öffnen — kurzer Lagebericht aus echten Daten
    const _iss=ba.risk.length, _part=ba.partial.length;
    const statusLine = _iss
      ? `<span class="ovs-dot warn"></span>${t("ov_status_risk",_iss)}`
      : _part
      ? `<span class="ovs-dot warn"></span>${t("ov_status_partial",_part)}`
      : `<span class="ovs-dot"></span>${t("ov_status_ok")}`;
    app.innerHTML = `
      <div class="ov-top">
        <div class="ov-greet">
          <div class="cpit-eyebrow"><span class="cpit-dot"></span>${t("ov_cockpit")}</div>
          <div class="ov-hello">${t("ov_welcome_back")}</div>
          <div class="ov-status">${statusLine}</div>
        </div>
        <div class="ov-hud" id="ovHud">
          <div class="ovh-time" id="ovhTime">--:--<span class="sec">:--</span></div>
          <div class="ovh-date" id="ovhDate"></div>
          <div class="ovh-sys"><span class="ovs-dot"></span>${t("ov_hud_ready")}</div>
        </div>
      </div>
      ${stats}
      <div class="const-stage" id="constStage"></div>
      ${asst}
      <div id="connected"></div>
      <div id="scanArea" class="prog hide"></div>
      ${importInput}`;
    app.querySelectorAll("[data-go]").forEach(t=>t.onclick=()=>setView(t.dataset.go));
    app.querySelectorAll(".ov-drive[data-disk], .atip[data-disk]").forEach(b=>b.onclick=()=>{ mapDriveId=+b.dataset.disk; mapStack=[]; mapTree=null; setView("map"); });   // „Platte zu voll" → Speicher-Karte dieser Platte
    app.querySelectorAll(".atip[data-internal]").forEach(b=>b.onclick=()=>{ mapDriveId="internal"; mapStack=[]; mapTree=null; setView("map"); });   // Mac noch nicht katalogisiert → Karte intern (scannt)
    const ovScan=document.getElementById("ovScan"); if(ovScan) ovScan.onclick=startScan;
    animateCounts(app);
    renderConstellation(drives);
    const _ar=document.getElementById("asstRobot");
    mountRobot(_ar);                 // Standbild sofort (offline, kein WebGL nötig) …
    upgradeRobotToSpline(_ar);       // … dann LIVE-3D drüber (lokale Spline-Dateien), Intro wird kaschiert
    startAsstAttention();            // zeigt hin und wieder auf einen Hinweis
    startOvClock();                  // Live-Uhr/Status-Konsole oben rechts
  }
  const pick=document.getElementById("pick"); if(pick) pick.onclick=startScan;
  const impLink=document.getElementById("import"); if(impLink) impLink.onclick=()=>document.getElementById("importfile").click();
  const impFile=document.getElementById("importfile"); if(impFile) impFile.onchange=importCatalog;
  renderConnected();
}

/* Mega Mind Map — alle Platten als ein Bild. Hub mittig, Platten als leuchtende Knoten. */
async function renderConstellation(drives){
  const stage=document.getElementById("constStage"); if(!stage) return;
  // angeschlossene Volumes (nativ) → online-Status + interne Platte
  let _on={uuids:new Set(),names:new Set()}, internalVol=null;
  if(window.diskyNative?.listVolumes){ try{ const vols=await getVolumes();
    _on=buildOnline(vols);
    internalVol=vols.find(v=>v.internal)||null; }catch(e){} }
  // interne Platte: entweder katalogisiert (Typ mac / passt zum internen Volume) ODER live (noch nicht katalogisiert)
  const catInternal = drives.find(d=>d.driveType==="mac" || (internalVol && (d.volumeName===internalVol.volumeName||d.label===internalVol.volumeName||d.label===internalVol.name))) || null;
  const externals = drives.filter(d=>d!==catInternal);
  const intNode = catInternal
      ? {id:catInternal.id, label:catInternal.label, driveType:catInternal.driveType||"mac", cap:catInternal.capacityBytes||0, used:catInternal.bytes||0, online:true, internal:true}
    : internalVol
      ? {label:internalVol.volumeName||"Macintosh HD", driveType:"mac", cap:internalVol.totalBytes||0, used:internalVol.usedBytes||0, online:true, internal:true, scan:true}
      : null;
  const extNodes = externals.map(d=>({id:d.id, label:d.label, driveType:d.driveType, cap:d.capacityBytes||0, used:d.bytes||0, online:driveOnline(d,_on), volumeUUID:d.volumeUUID||null, internal:false}));

  // Koordinatensystem 160×100 (Seitenverhältnis der Bühne 16:10 → kein Verzerren)
  const VW=160, VH=100, CX=80, CY=50, HW=15, HH=8, F=v=>v.toFixed(2);
  const m=extNodes.length, total=(intNode?1:0)+m;
  // Radius + Knotengröße skalieren — theoretisch 20–30 Platten finden Platz
  const rx=46+Math.min(28, m*1.5), ry=34+Math.min(11, m*0.8);
  const ns = total<=8 ? 1 : total<=16 ? 0.78 : total<=24 ? 0.62 : 0.5;
  // Positionen: interne Platte FIX oben über dem Hub, externe gleichmäßig um den Rest (Top-Slot bleibt frei)
  const place=[];
  if(intNode) place.push({node:intNode, x:CX, y:CY-ry});
  // SKEW: externe Knoten bewusst NEBEN die Chip-Achsen setzen → jede Bahn bekommt einen Knick
  // (Leiterbahn-Look wie die Inspiration). Mac bleibt exakt oben (saubere gerade Bahn).
  const SKEW=20;
  extNodes.forEach((node,i)=>{ const a=(-90 + SKEW + 360*(intNode ? (i+1)/(m+1) : (i+0.5)/Math.max(1,m)))*Math.PI/180;
    place.push({node, x:CX+rx*Math.cos(a), y:CY+ry*Math.sin(a)}); });
  // Verwinkelte Leiterbahn-Routing (wie die CPU-Inspiration): Knoten → raus in einen Kanal →
  // parallel zur Chip-Kante → in den Pin. Abgerundete 90°-Ecken. Skaliert auf beliebig viele Platten.
  const grads=["gb","gc","gw","gg"];
  const L=CX-HW, R=CX+HW, T=CY-HH, B=CY+HH;
  // jeden Knoten der nächstgelegenen Chip-Kante zuordnen, Pins gleichmäßig über die Kante verteilen
  const sides={left:[],right:[],top:[],bottom:[]};
  place.forEach((p,i)=>{ const dx=p.x-CX, dy=p.y-CY;
    sides[(Math.abs(dx)>=Math.abs(dy))?(dx<0?"left":"right"):(dy<0?"top":"bottom")].push(i); });
  const pin={};
  for(const edge of ["left","right","top","bottom"]){ const arr=sides[edge], k=arr.length;
    arr.sort((a,b)=> (edge==="left"||edge==="right") ? place[a].y-place[b].y : place[a].x-place[b].x);
    arr.forEach((i,j)=>{ const f=(j+1)/(k+1);
      pin[i] = edge==="left"  ? {x:L, y:T+(B-T)*f, edge}
             : edge==="right" ? {x:R, y:T+(B-T)*f, edge}
             : edge==="top"   ? {x:L+(R-L)*f, y:T, edge}
             :                  {x:L+(R-L)*f, y:B, edge}; }); }
  // abgerundeter orthogonaler Pfad durch eine Punktreihe
  const rp=(pts)=>{ const P=[]; for(const q of pts){ const o=P[P.length-1]; if(!o||Math.hypot(q[0]-o[0],q[1]-o[1])>0.4) P.push(q); }
    if(P.length<2) return `M ${F(pts[0][0])} ${F(pts[0][1])}`;
    const RR=3.2; let d=`M ${F(P[0][0])} ${F(P[0][1])}`;
    for(let i=1;i<P.length-1;i++){ const a=P[i-1],c=P[i],b=P[i+1];
      const l1=Math.hypot(c[0]-a[0],c[1]-a[1])||1, l2=Math.hypot(b[0]-c[0],b[1]-c[1])||1;
      const r1=Math.min(RR,l1/2), r2=Math.min(RR,l2/2);
      const p1=[c[0]-(c[0]-a[0])/l1*r1, c[1]-(c[1]-a[1])/l1*r1];
      const p2=[c[0]+(b[0]-c[0])/l2*r2, c[1]+(b[1]-c[1])/l2*r2];
      d+=` L ${F(p1[0])} ${F(p1[1])} Q ${F(c[0])} ${F(c[1])} ${F(p2[0])} ${F(p2[1])}`; }
    const e=P[P.length-1]; return d+` L ${F(e[0])} ${F(e[1])}`; };
  // Z-Treppe wie eine Leiterbahn: Knick in der Bahnmitte, Position pro Bahn leicht versetzt (jitter)
  // → unterschiedlich verwinkelte Wege statt gerader Speichen. Achsen-gerade Bahnen (Mac) bleiben gerade.
  const route=(p,pn,i)=>{ const j=((i%3)-1)*5; const pts=[[p.x,p.y]];
    if(pn.edge==="left"||pn.edge==="right"){ const midX=(p.x+pn.x)/2 + j;
      pts.push([midX,p.y],[midX,pn.y],[pn.x,pn.y]); }
    else { const midY=(p.y+pn.y)/2 + j;
      pts.push([p.x,midY],[pn.x,midY],[pn.x,pn.y]); }
    return rp(pts); };
  const routes=place.map((p,i)=>route(p,pin[i],i));
  const baseTraces=routes.map((d,i)=>
    `<path class="trace" id="tr${i}" d="${d}" pathLength="100" stroke-dasharray="100 100" stroke-dashoffset="100">
        <animate attributeName="stroke-dashoffset" from="100" to="0" dur="1.1s" begin="${(0.15*i).toFixed(2)}s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.25 0.1 0.4 1"/></path>`).join("");
  // LICHT EXAKT WIE CPU-ARCHITECTURE (svg-ui): pro Leiterbahn ein radial-gradient-Glühkreis, der DURCH
  // die Bahn maskiert ist (Maske = die Bahn als weißer Stroke) und via animateMotion/mpath die Bahn
  // entlangfließt. Ergebnis: weiches, glühendes Licht, das in den DISKY-Chip strömt. Folgt jeder Ecke,
  // konstantes Tempo (calcMode="paced"), gestaffelt. GPU-günstig (Transform + Maske, kein Per-Frame-Blur).
  const CMAX=Math.min(routes.length, 14);
  // Glüh-Verläufe (heller Kern → CI-Farbe → transparent), 4 Töne durchgewechselt
  // Verläufe wie im Original: heller Kern → Farbe → transparent, fx="1" (heller Kopf, leichter Kometen-Effekt)
  const flowGrads=
     `<radialGradient id="cg0" fx="1"><stop offset="0%" stop-color="#d8f7ff"/><stop offset="50%" stop-color="#37cfe0"/><stop offset="100%" stop-color="#37cfe0" stop-opacity="0"/></radialGradient>`
    +`<radialGradient id="cg1" fx="1"><stop offset="0%" stop-color="#dcefff"/><stop offset="50%" stop-color="#54a6ff"/><stop offset="100%" stop-color="#54a6ff" stop-opacity="0"/></radialGradient>`
    +`<radialGradient id="cg2" fx="1"><stop offset="0%" stop-color="#eaf6ff"/><stop offset="50%" stop-color="#9fd6ff"/><stop offset="100%" stop-color="#9fd6ff" stop-opacity="0"/></radialGradient>`
    +`<radialGradient id="cg3" fx="1"><stop offset="0%" stop-color="#cafff4"/><stop offset="50%" stop-color="#37d7e0"/><stop offset="100%" stop-color="#37d7e0" stop-opacity="0"/></radialGradient>`;
  // Maske pro Bahn = die DÜNNE Bahn (stroke 0.6 wie das Original 0.5) → das Licht ist eine haardünne Linie, kein Schlauch
  const masks=routes.slice(0,CMAX).map((d,i)=>
    `<mask id="cm${i}" maskUnits="userSpaceOnUse" x="0" y="0" width="${VW}" height="${VH}"><path d="${d}" fill="none" stroke="#fff" stroke-width="0.6" stroke-linecap="round" stroke-linejoin="round"/></mask>`).join("");
  // bewegter Glühkreis r=8 (wie Original) je Bahn, maskiert auf die dünne Linie, fließt vom Knoten in den Chip
  const flows=routes.slice(0,CMAX).map((d,i)=>{
    const dur=(2.6+(i%5)*0.5).toFixed(2), delay=((i*0.55)%2.6).toFixed(2);
    // Opacity synchron zur Bewegung: smooth einblenden am Start, voll durchlaufen, smooth ausblenden am Ende.
    // → kein ruckartiges Ende, der Loop-Neustart passiert bei opacity 0 (unsichtbar).
    return `<g mask="url(#cm${i})"><circle r="8" cx="0" cy="0" fill="url(#cg${i%4})" opacity="0">`
      +`<animate attributeName="opacity" dur="${dur}s" begin="${delay}s" repeatCount="indefinite" values="0;1;1;0" keyTimes="0;0.16;0.78;1" calcMode="spline" keySplines="0.4 0 0.2 1;0 0 1 1;0.4 0 0.2 1"/>`
      +`<animateMotion dur="${dur}s" begin="${delay}s" repeatCount="indefinite" calcMode="paced" rotate="0"><mpath href="#tr${i}"/></animateMotion></circle></g>`;
  }).join("");
  const svg=`<svg class="csvg" viewBox="0 0 ${VW} ${VH}" preserveAspectRatio="none"><defs>${flowGrads}${masks}</defs>${baseTraces}${flows}</svg>`;
  // Hub = rotierendes Universum (statt Chip): glühender Kern, langsame Orbits, schwebende Partikel
  const chip=`<div class="hub-universe">
    <span class="hu-glow"></span>
    <svg class="hu-svg" viewBox="0 0 160 160" fill="none"><defs>
      <radialGradient id="huCoreG" cx="50%" cy="45%" r="60%"><stop offset="0" stop-color="#f2fdff"/><stop offset="38%" stop-color="#8fdcff"/><stop offset="100%" stop-color="#2f7fe0"/></radialGradient>
      <linearGradient id="huStroke" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#4a9eff"/><stop offset="100%" stop-color="#37cfe0"/></linearGradient>
      <filter id="huGlow" x="-150%" y="-150%" width="400%" height="400%"><feGaussianBlur stdDeviation="2.4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
      <g class="hu-orbit o1"><ellipse cx="80" cy="80" rx="66" ry="24"/><circle class="hu-e" cx="146" cy="80" r="3.6" fill="#7fe9f7" filter="url(#huGlow)"/></g>
      <g class="hu-orbit o2"><ellipse cx="80" cy="80" rx="66" ry="24"/><circle class="hu-e" cx="14" cy="80" r="3" fill="#9ad8ff" filter="url(#huGlow)"/></g>
      <g class="hu-orbit o3"><ellipse cx="80" cy="80" rx="66" ry="24"/><circle class="hu-e" cx="146" cy="80" r="2.6" fill="#bff4ff" filter="url(#huGlow)"/></g>
      <circle class="hu-core" cx="80" cy="80" r="9.5" fill="url(#huCoreG)" filter="url(#huGlow)"/></svg>
    <span class="hu-particles"><i></i><i></i><i></i><i></i><i></i><i></i></span>
  </div>`;
  // Knoten (Platten) — Position in % (x/1.6 wegen 160er-Breite)
  const nodes=place.map(p=>{
    const node=p.node;
    const pct=node.cap?Math.min(100,Math.round(100*node.used/node.cap)):60;
    const rc=pct>=90?"#ff6b6b":pct>=75?"#ffb454":"#4a9eff";
    const sub=node.cap?`${human(node.used)} / ${human(node.cap)}`:human(node.used);
    const attr = node.id!=null ? `data-id="${node.id}"` : (node.scan ? `data-scan="1"` : `data-internal="1"`);
    return `<button class="cnode ${node.online?"":"off"}${node.internal?" cint":""}" ${attr} data-uuid="${esc(node.volumeUUID||"")}" style="left:${F(p.x/1.6)}%;top:${F(p.y)}%;--ring:${pct};--rc:${rc}">
      ${node.online?'<span class="pin" title="'+t("dc_connected")+'"></span>':""}
      ${node.internal?`<span class="cbadge">${t("iv_intern_tag")}</span>`:""}
      <span class="disc"><span class="di">${driveImg(node.driveType)}</span></span>
      <span class="cn">${esc(node.label)}</span><span class="cs">${sub}</span></button>`;
  }).join("");
  stage.style.setProperty("--ns", ns);
  // Sonar-Puls + Aura am Hub → das Zentrum „atmet"/sendet (JARVIS-Feeling), rein dekorativ
  const sonar=`<div class="hub-sonar"><b class="hub-aura"></b></div>`;   // nur sanfte Aura (Sonar-Ringe entfernt → ruhiger)
  const nebula=`<div class="hub-nebula"><span class="neb n1"></span><span class="neb n2"></span><span class="neb n3"></span><span class="neb n4"></span><i class="ns"></i><i class="ns"></i><i class="ns"></i><i class="ns"></i></div>`;
  stage.innerHTML=nebula+svg+sonar+chip+nodes;
  stage.querySelectorAll(".cnode[data-id]").forEach(b=>b.onclick=()=>{ mapDriveId=+b.dataset.id; mapStack=[]; mapTree=null; setView("map"); });
  stage.querySelectorAll(".cnode[data-scan],.cnode[data-internal]").forEach(b=>b.onclick=()=>{ mapDriveId="internal"; mapStack=[]; mapTree=null; setView("map"); });
}

// Hintergrund-Punktraster (deckt von der Mitte auf + flackert sanft) — wie der Sign-in-Dot-Effekt, nativ
let _dotsStop=null;
// Hyperspace-Steuerung des Sternenfelds: warpStarfield(1)=rein, warpStarfield(0)=raus (seamless)
let _sfWarpFn=null, _sfWarpGet=null;
// Performance: Animationen pausieren, wenn das Fenster nicht aktiv ist (unfokussiert/versteckt) → spart CPU/GPU/Akku.
let _animActive = (typeof document!=="undefined") ? !document.hidden : true;
try{ addEventListener("blur",()=>{_animActive=false;}); addEventListener("focus",()=>{_animActive=true;}); document.addEventListener("visibilitychange",()=>{_animActive=!document.hidden;}); }catch(e){}
function warpStarfield(t){ try{ _sfWarpFn&&_sfWarpFn(t); }catch(e){} }
function warpValue(){ try{ return _sfWarpGet?_sfWarpGet():0; }catch(e){ return 0; } }
/* Starfield-Hintergrund (Vanilla-Port der React-Komponente): Sterne strömen sanft aus der Mitte nach außen.
   Läuft nur auf der Übersicht — render() stoppt _dotsStop beim Verlassen, renderOverview startet neu. */
function startStarfield(host){
  if(!host || host.querySelector("canvas")) return;   // idempotent: läuft persistent über alle Seiten
  host.innerHTML="";
  const cv=document.createElement("canvas"); host.appendChild(cv);
  const ctx=cv.getContext("2d"); if(!ctx) return;
  const dpr=Math.min(2,window.devicePixelRatio||1);
  const QTY=460, ratio=QTY/2;                   // Anzahl + Projektions-Verhältnis
  const STAR="rgba(255,255,255,1)", BG="#0a0c10";
  let w=0,h=0,cx=0,cy=0,z=0,colorRatio=0,arr=[],raf=0,tk=0;
  const reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  // Bei „Bewegung reduzieren": KEIN Vorwärts-Flug (störende Bewegung) — aber das Funkeln läuft weiter.
  const SPEED_BASE = reduce ? 0 : 0.65;
  // ── Hyperspace-Warp: dieselben Sterne beschleunigen aus dem Drift in lange Streifen ──
  let warp=0, warpTarget=0;                 // 0 = normaler Drift · 1 = voller Hyperspace
  _sfWarpFn=(t)=>{ warpTarget=Math.max(0,Math.min(1,+t||0)); }; _sfWarpGet=()=>warp;   // Steuerung + Auslesen von außen
  function measure(){ w=host.clientWidth||0; h=host.clientHeight||0; if(!w||!h) return;
    cx=Math.round(w/2); cy=Math.round(h/2); z=(w+h)/2; colorRatio=1/z;
    cv.width=Math.round(w*dpr); cv.height=Math.round(h*dpr); ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.fillStyle=BG; ctx.strokeStyle=STAR; }
  function spawn(){ arr=new Array(QTY).fill().map(()=>[ Math.random()*w*2-cx*2, Math.random()*h*2-cy*2, Math.round(Math.random()*z),0,0,0,0,true, Math.random()*6.283, 0.9+Math.random()*0.5 ]); }   // [8]=Schimmer-Phase [9]=leichte Größenvariation (klein)
  function project(s){ s[3]=cx+(s[0]/s[2])*ratio; s[4]=cy+(s[1]/s[2])*ratio; }
  function update(){ const sp = SPEED_BASE;   // ruhiger, KONSTANTER Drift — der Warp ist eine radiale Dehnung beim Zeichnen, kein Vorwärts-Rausch (sonst wrappen/flackern Sterne einzeln)
    for(const s of arr){ s[7]=true; s[5]=s[3]; s[6]=s[4];
    s[2]-=sp; if(s[2]>z){ s[2]-=z; s[7]=false; } if(s[2]<0){ s[2]+=z; s[7]=false; }
    project(s); } }
  function draw(){ tk++; const we=warp*warp;   // we = sanfter Dehnungsfaktor (0→1→0), bewegt das GANZE Feld gemeinsam
    ctx.globalAlpha=1; ctx.fillStyle=BG; ctx.fillRect(0,0,w,h);
    for(const s of arr){ if(!(s[3]>0&&s[3]<w&&s[4]>0&&s[4]<h)) continue;
      const depth=Math.max(.12,1-colorRatio*s[2]);                // näher = heller/größer
      const big=s[9];                                              // leichte Größenvariation je Stern
      const tw=0.5+0.5*Math.sin(tk*0.05+s[8]);                    // 0..1 langsames, LEICHTES Schimmern
      // ── RADIALE Dehnung: jeder Stern streckt sich entlang seiner Linie zur Mitte. Länge ∝ Dehnung · Abstand
      //    zur Mitte → innen kurz, außen lang (Tunnel). Alle gemeinsam, eine ruhige Bewegung — kein Einzel-Flackern.
      if(we>0.002){ const dx=s[3]-cx, dy=s[4]-cy, rad=Math.hypot(dx,dy)||0.001; const ux=dx/rad, uy=dy/rad;
        const L=we*(8+depth*depth*560)*big;   // Länge ∝ Tiefe² → nah=lang, fern=kurz (echte Mischung); Streak schießt vom Sprungpunkt nach AUSSEN
        ctx.globalAlpha=Math.min(1,depth*(0.45+0.55*warp)); ctx.strokeStyle=STAR;
        ctx.lineWidth=Math.max(.6,depth*big*(1+warp*1.7)); ctx.lineCap="round";
        ctx.beginPath(); ctx.moveTo(s[3],s[4]); ctx.lineTo(s[3]+ux*L,s[4]+uy*L); ctx.stroke(); }
      // kleiner Punkt mit dezentem Schimmern (im Warp ausblenden — dann zählt nur der Streifen)
      ctx.globalAlpha=Math.min(1,depth*(0.55+0.45*tw))*(1-warp*0.92);
      ctx.fillStyle=STAR; const r=depth*big*(0.85+0.3*tw);
      ctx.beginPath(); ctx.arc(s[3],s[4],r,0,6.283); ctx.fill(); }
    // Zentrales „Sprungpunkt"-Leuchten — nur während des Warps, skaliert mit der Intensität
    if(warp>0.015){ const gr=Math.min(w,h)*(0.05+warp*0.12);
      const gg=ctx.createRadialGradient(cx,cy,0,cx,cy,gr);
      gg.addColorStop(0,'rgba(120,190,255,'+(warp*0.42).toFixed(3)+')');
      gg.addColorStop(0.45,'rgba(55,120,255,'+(warp*0.11).toFixed(3)+')');
      gg.addColorStop(1,'rgba(0,0,0,0)');
      ctx.globalAlpha=1; ctx.fillStyle=gg; ctx.beginPath(); ctx.arc(cx,cy,gr,0,6.283); ctx.fill(); ctx.fillStyle=STAR; }
    ctx.globalAlpha=1; }
  function drawStatic(){ ctx.fillStyle=BG; ctx.fillRect(0,0,w,h); ctx.fillStyle=STAR;
    for(const s of arr){ project(s); if(s[3]>0&&s[3]<w&&s[4]>0&&s[4]<h){ const r=(1-colorRatio*s[2])*1.4; ctx.globalAlpha=Math.max(.15,1-colorRatio*s[2]); ctx.fillRect(s[3],s[4],r,r); } } ctx.globalAlpha=1; }
  let _lastFrame=0, _lwNow=0;
  function frame(now){ if(!w){ measure(); if(!w){ raf=requestAnimationFrame(frame); return; } spawn(); }
    if(host.clientWidth!==w||host.clientHeight!==h){ const ow=w,oh=h; measure(); if(arr.length&&ow&&oh){ const rw=w/ow,rh=h/oh; for(const s of arr){ s[0]*=rw; s[1]*=rh; } } }
    // Warp-Faktor JEDEN Frame sanft Richtung Ziel ziehen (rein/raus eased) — schnelleres Rein, ruhigeres Raus
    const wdt=_lwNow?Math.min(0.05,(now-_lwNow)/1000):0.016; _lwNow=now;
    if(warp!==warpTarget){ const rate=warpTarget>warp?3.2:3.0; warp+=(warpTarget-warp)*Math.min(1,wdt*rate); if(Math.abs(warpTarget-warp)<0.002) warp=warpTarget; }   // sanft rein, zügig zurück → Rückkehr fertig BEVOR Content erscheint
    const active = warp>0.01;
    // 30fps-Kappe nur im Ruhezustand; während des Warps volle FPS für saubere Streifen
    // Ruhezustand: 30fps-Kappe; Fenster inaktiv → gar nicht zeichnen (Loop bleibt billig). Während Warp immer volle FPS.
    if(!active && (!_animActive || now-_lastFrame < 30)){ raf=requestAnimationFrame(frame); return; } _lastFrame=now;
    update(); draw(); raf=requestAnimationFrame(frame); }
  measure(); if(w) spawn();
  raf=requestAnimationFrame(frame);   // Loop läuft IMMER → Sterne funkeln auch bei „Bewegung reduzieren" (nur ohne Flug)
  const onR=()=>measure(); window.addEventListener("resize",onR);
  let _ro=null; try{ _ro=new ResizeObserver(onR); _ro.observe(host); }catch(e){}   // Container-Resize (z.B. Boot-Reveal: left 0→250px) → Canvas bleibt unverzerrt
  _dotsStop=()=>{ cancelAnimationFrame(raf); window.removeEventListener("resize",onR); try{_ro&&_ro.disconnect();}catch(e){} host.innerHTML=""; };
}

/* ───────────────────────── Auto-Scan (nativ, Hintergrund) ───────────────────────── */
const scanningVols = new Set();
let bgStatus = "";
function isOnboarded(){ return localStorage.getItem("disky_onboarded")==="1"; }
// Auto-Scan erst NACH dem Onboarding (vorher hat der User die Auto/Manuell-Frage noch nicht beantwortet)
function autoScanEnabled(){ return window.diskyNative && isOnboarded() && localStorage.getItem("disky_autoscan")!=="0"; }
function setAutoScan(on){ localStorage.setItem("disky_autoscan", on?"1":"0"); }

async function replaceFiles(driveId, recs){
  await new Promise(res=>{ const t=tx(["files"],"readwrite"); const idx=t.objectStore("files").index("driveId");
    const cur=idx.openCursor(IDBKeyRange.only(driveId));
    cur.onsuccess=e=>{ const c=e.target.result; if(c){c.delete();c.continue();} }; t.oncomplete=res; t.onerror=res; });
  for(let i=0;i<recs.length;i+=500){
    await new Promise(res=>{ const t=tx(["files"],"readwrite"); const s=t.objectStore("files");
      for(const r of recs.slice(i,i+500)){ r.driveId=driveId; s.put(r); } t.oncomplete=res; t.onerror=res; });
  }
  invalidateFiles();
}

async function autoScanVolume(vol){
  if(!window.diskyNative?.scanList || scanning) return;
  if(vol.internal) return;                 // interne Mac-Platte NICHT hier scannen — eigener kontrollierter Scan (maybeAutoScanInternal), sonst läuft sie dauernd
  if(scanningVols.has(vol.mount)) return;
  const drives = await getAll("drives");
  // Platte EINDEUTIG über die Volume-UUID zuordnen. Zwei verschiedene Platten heißen oft beide „Untitled" —
  // niemals nach Namen vermischen, sonst landen die Dateien der einen unter der Kapazität der anderen (→ >100% voll).
  let drive = (vol.volumeUUID && drives.find(d=>d.volumeUUID===vol.volumeUUID))
           || drives.find(d=>!d.volumeUUID && (d.volumeName===vol.volumeName || d.volumeName===vol.name || d.label===(vol.volumeName||vol.name)));
  const isNew = !drive;
  // Neue Platte nicht ungefragt anlegen, wenn das Gratis-Limit erreicht ist
  if(isNew && !isPro() && drives.length >= DISKY.FREE_LIMIT) return;

  scanningVols.add(vol.mount);
  bgStatus = t("bg_updating", esc(vol.volumeName||vol.name));
  dockProgress("indeterminate");
  if(view==="overview") renderConnected();
  try{
    const list = await window.diskyNative.scanList(vol.mount);
    const prev = new Map();
    if(drive){ const ex = await getAll("files","driveId",drive.id); for(const f of ex) prev.set(f.relPath,f); }
    const recs=[], toHash=[], byRel=new Map();
    for(const it of list){
      const old = prev.get(it.relPath);
      const project = it.relPath.includes("/") ? it.relPath.split("/")[0] : "(Stammverzeichnis)";
      const rec = {driveId:drive?drive.id:0, project, relPath:it.relPath, name:it.name, ext:it.ext, size:it.size, mtime:it.mtime, hash:null};
      if(old && old.size===it.size && Math.abs((old.mtime||0)-it.mtime)<2000){
        rec.hash=old.hash; if(old.thumb)rec.thumb=old.thumb; if(old.embed)rec.embed=old.embed;
        if(old.lat!=null)rec.lat=old.lat; if(old.lon!=null)rec.lon=old.lon;   // Geo-Daten über Re-Scan retten (WorldMap)
      } else if(it.size>0){ toHash.push(it.relPath); }
      recs.push(rec); byRel.set(it.relPath, rec);
    }
    if(toHash.length){
      const hashes = await window.diskyNative.hashFiles(vol.mount, toHash);
      for(const rel in hashes){ const r=byRel.get(rel); if(r) r.hash=hashes[rel]; }
    }
    let bytes=0; for(const r of recs) bytes+=r.size||0;
    // SCHUTZ VOR DATENVERLUST: ein LEERES Scan-Ergebnis (Rechte verweigert, Platte kurz weg, transienter Fehler)
    // darf einen bereits gefüllten Katalog NICHT überschreiben. Nur Kapazität/Zeitstempel auffrischen — Daten bleiben.
    if(!isNew && recs.length===0 && (drive.fileCount||0)>0){
      await updateDrive(drive.id, {capacityBytes:vol.totalBytes||drive.capacityBytes||null, volumeUUID:vol.volumeUUID||drive.volumeUUID||null, scannedAt:Date.now()});
    } else {
      if(isNew){
        const id = await addDrive({label:vol.volumeName||vol.name, volumeName:vol.volumeName||vol.name,
          volumeUUID:vol.volumeUUID||null,
          model:vol.model||null, capacityBytes:vol.totalBytes||null,
          driveType:matchDriveType(vol.model, vol.ssd, vol.removable), fileCount:recs.length, bytes, scannedAt:Date.now()});
        drive={id}; recs.forEach(r=>r.driveId=id);
      }
      await replaceFiles(drive.id, recs);
      // Kapazität bei JEDEM Scan vom Live-Volume auffrischen (verhindert veraltete/falsche Werte → >100%) + UUID nachtragen
      await updateDrive(drive.id, {fileCount:recs.length, bytes, capacityBytes:vol.totalBytes||drive.capacityBytes||null, volumeUUID:vol.volumeUUID||drive.volumeUUID||null, scannedAt:Date.now()});
    }
  }catch(e){ /* leise weiter */ }
  finally{
    scanningVols.delete(vol.mount);
    bgStatus="";
    if(!scanningVols.size) dockProgress(null);
    renderSidebarDrives();
    if(view==="overview") render(); else renderConnected();
    scheduleAutoBackup();   // Katalog-Sicherung anstoßen (debounced)
  }
}

let _autoQueue = Promise.resolve();
function queueAutoScan(vol){ _autoQueue = _autoQueue.then(()=>autoScanVolume(vol)).catch(()=>{}); }

  for(const v of vols){ if(!v.internal) queueAutoScan(v); }
}

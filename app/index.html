async function runScan(dir, opts, area){
  const {label, model, capacityBytes, driveType, aiIndex} = opts;
  // Lizenz-Gate: in der Gratis-Version max. DISKY.FREE_LIMIT Platten.
  const existingDrives = await getAll("drives");
  const alreadyKnown = existingDrives.some(d=>d.label===label);
  if(!isPro() && !alreadyKnown && existingDrives.length >= DISKY.FREE_LIMIT){
    area.classList.add("hide");
    showUpgrade();
    return;
  }
  scanning = true;
  document.getElementById("pick").disabled = true;
  await deleteDriveByLabel(label); // Re-Scan ersetzt alten Stand

  const driveId = await addDrive({label, volumeName:dir.name, model:model||null,
    capacityBytes:capacityBytes||null, driveType:driveType||"ssd", fileCount:0, bytes:0, scannedAt:Date.now()});

  area.innerHTML = `
    <div class="row"><span class="dot"></span><b>${t("scan_running",esc(label))}</b>
      <span class="spacer"></span><button class="ghost" id="stop">${t("scan_stop")}</button></div>
    <div class="bar"><i id="pbar" style="width:0%"></i></div>
    <div class="nums" id="pnums">${t("scan_starting")}</div>
    <div class="nums muted" id="pcur"></div>`;
  let stopped=false;
  document.getElementById("stop").onclick=()=>{stopped=true;};

  let count=0, bytes=0, batch=[];
  const t0 = performance.now();
  const pbar=document.getElementById("pbar"), pnums=document.getElementById("pnums"), pcur=document.getElementById("pcur");
  let aiCount=0;
  if(aiIndex){ pcur.textContent=t("scan_ai_loading");
    try{ await window.DiskyAI?.load(m=>pcur.textContent=m); }catch(e){ pcur.textContent=t("scan_ai_err",e.message); } }

  async function flush(){
    if(!batch.length) return;
    const t = tx(["files"],"readwrite"); const s=t.objectStore("files");
    for(const f of batch) s.put(f);
    batch=[]; await new Promise(r=>{t.oncomplete=r;t.onerror=r;}); invalidateFiles();
  }

  try{
    for await (const {handle, rel} of walk(dir, "")){
      if(stopped) break;
      let file;
      try{ file = await handle.getFile(); }catch(e){ continue; }
      const project = rel.includes("/") ? rel.split("/")[0] : "(Stammverzeichnis)";
      const ext=(handle.name.match(/\.[^.]+$/)||[""])[0].toLowerCase();
      let hash=null;
      try{ if(file.size>0) hash = await quickHash(file); }catch(e){}
      const rec={driveId, project, relPath:rel, name:handle.name, ext, size:file.size, mtime:file.lastModified, hash};
      if(aiIndex && window.DiskyAI?.ready && isMediaExt(ext)){
        try{ const thumb = IMG_EXTS.has(ext) ? await thumbFromImage(file) : await thumbFromVideo(file);
          if(thumb){ rec.thumb=thumb; rec.embed=await window.DiskyAI.embedImageSrc(thumb); aiCount++;
            if(aiCount%5===0) pcur.textContent="KI: "+rel; } }catch(e){}
      }
      batch.push(rec);
      count++; bytes+=file.size;
      if(batch.length>=(aiIndex?40:400)){
        await flush();
        const el=(performance.now()-t0)/1000;
        pnums.textContent = t("scan_progress", nloc(count), human(bytes), aiIndex?t("scan_indexed",aiCount):` · ${human(bytes/el)}/s`);
        if(!aiIndex) pcur.textContent = rel;
        pbar.style.width = Math.min(99,(count/ (count+800))*100).toFixed(0)+"%"; // grobe Anzeige
        dockProgress(Math.min(0.99, count/(count+800)));
      }
    }
    await flush();
  }catch(err){
    pcur.textContent = t("scan_err", err.message);
  }

  // Drive-Summe aktualisieren
  const dt = tx(["drives"],"readwrite"); const ds=dt.objectStore("drives");
  const drv = await reqP(ds.get(driveId));
  drv.fileCount=count; drv.bytes=bytes; ds.put(drv);
  await new Promise(r=>dt.oncomplete=r);

  pbar.style.width="100%";
  dockProgress(null);
  pnums.innerHTML = t("scan_finished", nloc(count), human(bytes));
  pcur.textContent = stopped ? t("scan_stopped") : "";
  scanning=false;
  const pickBtn=document.getElementById("pick"); if(pickBtn) pickBtn.disabled=false;
  renderSidebarDrives();
  scheduleAutoBackup();   // Katalog-Sicherung nach manuellem Scan
  // Nach dem Scan automatisch die Sunburst-Karte dieser Platte zeigen
  if(!stopped){
    setTimeout(()=>{ mapDriveId=driveId; mapStack=[]; mapTree=null; setView("map"); }, 800);
  }
}

/* ───────────────────────── Platten-Ansicht ───────────────────────── */
async function renderDrives(){
  const drives = await getAll("drives");
  // angeschlossene Volumes (nativ) → Intern-Flag + interne Platte zeigen, auch wenn noch nicht katalogisiert
  let vols=[];
  if(window.diskyNative?.listVolumes){ try{ vols=await getVolumes(); }catch(e){} }
  const internalVol = vols.find(v=>v.internal) || null;
  if(!drives.length && !internalVol){ app.innerHTML = emptyState(); return; }
  const isInternal = d => d.driveType==="mac" || (internalVol && (d.volumeName===internalVol.volumeName || d.label===internalVol.volumeName || d.label===internalVol.name));
  const matchD = d => match(d.label)||match(d.volumeName);
  const maxB = Math.max(...drives.map(d=>d.bytes||0),1);

  const card = (d)=>{
    const used=d.bytes||0, cap=d.capacityBytes||0;
    const pct = cap ? Math.min(100,Math.round(100*used/cap)) : Math.round(100*used/maxB);
    const barCol = cap ? (pct>=90?"#ff6b6b":pct>=75?"#ffb454":"var(--acc)") : "var(--acc)";
    const usage = cap ? t("drv_usage",human(used),human(cap),pct) : t("drv_indexed",human(used));
    return `
    <div class="card">
      <div class="row" style="align-items:flex-start">
        <div class="driveimg drv-open" data-edit="${d.id}" title="${t("drv_edit_t")}">${driveImg(d.driveType)}</div>
        <div style="flex:1;min-width:0">
          <div class="drv-head">
            <b class="drv-name drv-open" data-edit="${d.id}" title="${t("drv_edit_t")}">${esc(d.label)}</b>
            <span class="drv-edit drv-open" data-edit="${d.id}" title="${t("drv_edit_t")}">${IC.edit}</span>
            <span class="spacer"></span>
            <span class="muted drv-date">${dstr(d.scannedAt)}</span>
            <button class="ghost drv-remove" data-del="${esc(d.label)}" title="${t("drv_remove_t")}">${t("drv_remove")}</button></div>
          <div class="muted drv-meta">${t("drv_volume",esc(d.volumeName||"?"))}${d.model?` · ${esc(d.model)}`:""}</div>
          <table style="margin-top:10px"><tr>
            <td>${t("dc_files",nloc(d.fileCount||0))}</td>
            <td class="num">${usage}</td></tr></table>
          <div class="bar"><i style="width:${pct}%;background:${barCol}"></i></div>
        </div>
      </div>
    </div>`;};
  const virtualCard = (v)=>{
    const used=v.usedBytes||0, cap=v.totalBytes||0; const pct=cap?Math.min(100,Math.round(100*used/cap)):0;
    const barCol=pct>=90?"#ff6b6b":pct>=75?"#ffb454":"var(--acc)";
    return `
    <div class="card">
      <div class="row" style="align-items:flex-start">
        <div class="driveimg">${driveImg("mac")}</div>
        <div style="flex:1;min-width:0">
          <div class="drv-head">
            <b class="drv-name">${esc(v.volumeName||"Macintosh HD")}</b>
            <span class="spacer"></span>
            <button class="big" id="drvScanInternal" style="padding:7px 14px;font-size:13px">${t("conn_scan")}</button></div>
          <div class="muted drv-meta">${esc(v.model||"Apple Interne SSD")} · ${t("drv_not_cat")}</div>
          <table style="margin-top:10px"><tr>
            <td class="muted">${t("drv_dash_files")}</td>
            <td class="num">${t("drv_usage",human(used),human(cap),pct)}</td></tr></table>
          <div class="bar"><i style="width:${pct}%;background:${barCol}"></i></div>
        </div>
      </div>
    </div>`;};

  const internalDrives = drives.filter(d=>isInternal(d)&&matchD(d));
  const externalDrives = drives.filter(d=>!isInternal(d)&&matchD(d));
  const internalCataloged = drives.some(isInternal);
  const showVirtual = internalVol && !internalCataloged && (!q || match(internalVol.volumeName||"") || match("macintosh") || match("intern"));

  let html = pageHero('drives');
  const internHtml = (showVirtual?virtualCard(internalVol):"") + internalDrives.map(card).join("");
  const externHtml = externalDrives.map(card).join("");
  if(internHtml) html += `<div class="drv-cat">${t("drv_cat_int")}</div>`+internHtml;
  if(externHtml) html += `<div class="drv-cat">${t("drv_cat_ext")}</div>`+externHtml;
  if(!internHtml && !externHtml) html += `<div class="empty">${t("no_matches")}</div>`;
  // Katalog-Sicherung (nur in der nativen App) — Sicherheitsnetz gegen Datenverlust
  if(window.diskyNative?.catalogBackup){
    html += `<div class="bk-card" style="margin-top:26px;border:1px solid var(--line);border-radius:16px;padding:18px 20px;background:linear-gradient(180deg,rgba(18,24,34,.5),rgba(12,16,22,.5))">
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
        <span style="width:34px;height:34px;border-radius:10px;display:grid;place-items:center;color:#bfe0ff;background:linear-gradient(155deg,rgba(74,158,255,.28),rgba(55,207,224,.1))">${IC.layers||""}</span>
        <div style="flex:1;min-width:160px"><b style="font-family:var(--fdisp)">${t("bk_section_t")}</b>
          <div class="muted" style="font-size:12.5px" id="bkLast">${t("bk_section_sub")}</div></div>
        <button class="ghost" id="bkNow" style="padding:7px 13px">${t("bk_now")}</button>
        <button class="ghost" id="bkRestore" style="padding:7px 13px">${t("bk_restore")}</button>
        <button class="ghost" id="bkReveal" style="padding:7px 13px">${t("bk_reveal")}</button>
      </div></div>`;
  }
  app.innerHTML = html;
  // Backup-Sektion verdrahten + letzten Stand anzeigen
  if(window.diskyNative?.catalogBackup){
    (async()=>{ try{ const list=await window.diskyNative.catalogBackupList(); const el=document.getElementById("bkLast");
      if(el && list && list.length){ el.textContent=t("bk_last", agoStr(list[0].mtime)); } else if(el){ el.textContent=t("bk_never"); } }catch(e){} })();
    const bn=document.getElementById("bkNow"); if(bn) bn.onclick=async()=>{ bn.disabled=true; const r=await autoBackupCatalog(true);
      const el=document.getElementById("bkLast"); if(el) el.textContent = r&&r.ok ? t("bk_last",agoStr(Date.now())) : t("bk_never"); bn.disabled=false; };
    const br=document.getElementById("bkRestore"); if(br) br.onclick=async()=>{ try{ const list=await window.diskyNative.catalogBackupList(); if(!list||!list.length){ alert(t("bk_never")); return; } pickBackupToRestore(list); }catch(e){} };
    const bv=document.getElementById("bkReveal"); if(bv) bv.onclick=()=>{ try{ window.diskyNative.catalogBackupReveal(); }catch(e){} };
  }

  app.querySelectorAll("[data-edit]").forEach(b=>b.onclick=()=>openDriveEdit(+b.dataset.edit));
  app.querySelectorAll("[data-del]").forEach(b=>b.onclick=async()=>{
    const lbl=b.dataset.del;
    if(!confirm(t("drv_del1",lbl))) return;
    if(!confirm(t("drv_del2",lbl))) return;
    await deleteDriveByLabel(lbl); render();
  });
  const si=document.getElementById("drvScanInternal"); if(si) si.onclick=()=>setView("overview");
}

/* ───────────────────────── Projekte-Ansicht ───────────────────────── */
let _projSort="size";
const PROJ_SORTS={
  size:(a,b)=>b.bytes-a.bytes,
  name:(a,b)=>(a.project||"").localeCompare(b.project||"","de"),
  date:(a,b)=>(b.last||0)-(a.last||0),
  files:(a,b)=>b.files-a.files,
};
async function renderProjects(){ deepMode="projects"; return renderSearch(); }   // „Projekte" lebt jetzt als Linse in Deep Search
async function deepProjectsBody(host){
  const drives = await getAll("drives");
  if(!drives.length){ host.innerHTML = emptyState(); return; }
  const dById = Object.fromEntries(drives.map(d=>[d.id,d]));
  const files = await allFiles();
  const agg = {};
  for(const f of files){
    const d = dById[f.driveId]; if(!d) continue;
    const k = f.driveId+"|"+f.project;
    let a = agg[k]; if(!a){ a=agg[k]={driveId:f.driveId,project:f.project,files:0,bytes:0,first:Infinity,last:0}; }
    a.files++; a.bytes+=f.size||0;
    if(f.mtime){ if(f.mtime<a.first)a.first=f.mtime; if(f.mtime>a.last)a.last=f.mtime; }
  }
  const rows = Object.values(agg).filter(a=>match(a.project)||match(dById[a.driveId]?.label));
  const groups={};
  rows.forEach(r=>{(groups[r.driveId]=groups[r.driveId]||[]).push(r);});
  const sorter=PROJ_SORTS[_projSort]||PROJ_SORTS.size;
  const sortBtns=[["size",t("sort_size")],["name",t("sort_name")],["date",t("sort_date")],["files",t("sort_files")]]
    .map(([k,l])=>`<button class="psort${_projSort===k?" on":""}" data-sort="${k}">${l}</button>`).join("");
  // Platten nach Gesamtgröße sortieren (größte zuerst)
  const gids=Object.keys(groups).sort((a,b)=>
    groups[b].reduce((s,x)=>s+x.bytes,0)-groups[a].reduce((s,x)=>s+x.bytes,0));
  const searching=!!(q||"").trim();   // bei aktiver Suche Treffer-Platten automatisch aufklappen
  let html=`<div class="ptools"><span class="lbl">${t("proj_sort")}</span>${sortBtns}</div>`;
  gids.forEach((did,gi)=>{
    const d=dById[did], items=groups[did].slice().sort(sorter);
    const totalB=items.reduce((s,x)=>s+x.bytes,0)||1, totalF=items.reduce((s,x)=>s+x.files,0);
    const list=items.map(r=>{
      const span=(r.first===Infinity)?"—":(dstr(r.first)===dstr(r.last)?dstr(r.first):dstr(r.first)+" – "+dstr(r.last));
      const share=Math.round(100*r.bytes/totalB);
      const nm=projName(r.project), aliased=nm!==r.project;
      return `<div class="prow" data-did="${did}" data-proj="${esc(r.project)}" style="--share:${share}%" title="${t("proj_share_t",esc(nm),share,esc(d.label))}">
        <span class="pr-name">${esc(nm)}${aliased?`<span class="pr-orig">${esc(r.project)}</span>`:""}</span>
        <span class="pr-edit" data-folder="${esc(r.project)}" title="${t("proj_rename_t")}">✎</span>
        <span class="pr-files">${t("proj_files_abbr",nloc(r.files))}</span>
        <span class="pr-date">${span}</span>
        <span class="pr-size">${human(r.bytes)}</span>
        <span class="pr-share">${share}%</span>
        <button class="pr-gather${gatherHas(did, r.project)?" on":""}" data-gdid="${did}" data-gproj="${esc(r.project)}" title="${_bwL("Zum Sammeln & Übertragen hinzufügen","Add to Gather & Transfer")}">${gatherHas(did, r.project)?"✓":"+"}</button></div>`;
    }).join("");
    html+=`<details class="pgroup"${searching?" open":""}>   <!-- beim Suchen aufgeklappt (Treffer sofort sichtbar), sonst zugeklappt -->
      <summary class="phead"><span class="parrow"></span><span class="pimg">${driveImg(d.driveType)}</span><h2>${esc(d.label)}</h2>
        <span class="ptot">${t("proj_head",items.length,nloc(totalF),human(totalB))}</span></summary>
      <div class="plist">${list}</div></details>`;
  });
  host.innerHTML = gids.length? html : `<div class="empty">${t("no_matches")}</div>`;
  host.querySelectorAll(".psort").forEach(b=>b.onclick=e=>{ e.preventDefault(); _projSort=b.dataset.sort; deepProjectsBody(host); });
  host.querySelectorAll(".prow").forEach(r=>r.onclick=()=>{
    mapDriveId=+r.dataset.did; mapStack=[]; mapTree=null; mapDrill=r.dataset.proj; setView("map");
  });
  // „+" → Projekt zu „Sammeln & Übertragen" hinzufügen/entfernen (in-place, ohne Re-Render → kein Sprung)
  host.querySelectorAll(".pr-gather").forEach(b=>b.onclick=ev=>{ ev.stopPropagation();
    gatherToggle(+b.dataset.gdid, b.dataset.gproj);
    const on=gatherHas(+b.dataset.gdid, b.dataset.gproj); b.classList.toggle("on",on); b.textContent=on?"✓":"+"; });
  host.querySelectorAll(".pr-edit").forEach(b=>b.onclick=ev=>{ ev.stopPropagation();
    const folder=b.dataset.folder, cur=projName(folder);
    const v=prompt(t("proj_rename_prompt",folder), cur);
    if(v!==null){ setProjAlias(folder, v); deepProjectsBody(host); } });
}

/* ───────────────────────── Sammeln & Übertragen ───────────────────────── */
async function renderGather(){
  const drives=await getAll("drives");
  const dById=Object.fromEntries(drives.map(d=>[d.id,d]));
  const files=await allFiles();
  const coll=gatherGet();
  // angeschlossene Platten → Mount
  let mountByName={};
  if(window.diskyNative?.listVolumes){ try{ (await getVolumes()).forEach(v=>{ mountByName[v.volumeName]=v.mount; mountByName[v.name]=v.mount; }); }catch(e){} }
  const mountOf=d=> d?(mountByName[d.volumeName]||mountByName[d.label]||null):null;
  // Sammlung auflösen
  const items=coll.map(it=>{ const d=dById[it.driveId]; if(!d) return null;
    const fl=files.filter(f=>f.driveId===it.driveId && topFolder(f.relPath)===it.project);
    return {driveId:it.driveId, project:it.project, drive:d, files:fl, bytes:fl.reduce((s,f)=>s+(f.size||0),0)}; }).filter(Boolean);
  // nach Platte gruppieren
  const byDrive=new Map();
  items.forEach(x=>{ let g=byDrive.get(x.driveId); if(!g){g={drive:x.drive,items:[],bytes:0,files:0};byDrive.set(x.driveId,g);} g.items.push(x); g.bytes+=x.bytes; g.files+=x.files.length; });
  const groups=[...byDrive.values()];
  const onlineGroups=groups.filter(g=>mountOf(g.drive));
  const totalBytes=items.reduce((s,x)=>s+x.bytes,0), totalFiles=items.reduce((s,x)=>s+x.files.length,0);
  const readyBytes=onlineGroups.reduce((s,g)=>s+g.bytes,0);

  let html=pageHero('gather');
  if(!items.length){
    html+=`<div class="empty"><span class="big-emoji">${IC.box}</span>${t("g_empty")}<div class="muted" style="font-size:13px;margin-top:6px">${t("g_empty_hint")}</div></div>`;
    app.innerHTML=html; return;
  }
  html+=`<div class="ov-statline" style="margin:0 0 18px">
    <div class="ov-stat"><span class="v">${groups.length}</span><span class="l">${t("stat_drives",groups.length)}</span></div>
    <div class="ov-stat"><span class="v">${nloc(totalFiles)}</span><span class="l">${t("stat_files")}</span></div>
    <div class="ov-stat"><span class="v">${human(totalBytes)}</span><span class="l">${t("g_to_transfer")}</span></div></div>`;
  // Benötigte Platten
  html+=`<div class="bk-sec"><span class="dot" style="background:#4a9eff"></span>${t("g_needed")}</div>
    <div class="bk-sub">${t("g_needed_sub")}</div><div class="bk-list">`+
    groups.map(g=>{ const on=!!mountOf(g.drive);
      return `<div class="bkrow" style="--kc:${on?"#4ade80":"#ffb454"}">
        <span class="bk-ic">${driveImg(g.drive.driveType)}</span>
        <span class="bk-nm">${esc(g.drive.label)}</span>
        <span class="bk-drv"><span class="tag${on?" on":""}">${on?t("g_connected"):t("g_plugin")}</span></span>
        <span class="bk-amtwrap"><span class="bk-amt">${human(g.bytes)}</span><span class="bk-q">${t("dc_files",g.files)}</span></span></div>`; }).join("")+`</div>`;
  // Sammlung
  html+=`<div class="bk-sec"><span class="dot" style="background:#6aa8ff"></span>${t("g_collection")}</div><div class="bk-list">`+
    items.map(x=>{ const on=!!mountOf(x.drive);
      return `<div class="bkrow" style="--kc:${on?"#4ade80":"#3a4250"}">
        <span class="bk-ic">${IC.folder}</span>
        <span class="bk-nm">${esc(x.project)}</span>
        <span class="bk-drv"><span class="tag">${esc(x.drive.label)}</span></span>
        <span class="bk-amtwrap"><span class="bk-amt">${human(x.bytes)}</span><span class="bk-q">${t("g_files_abbr",x.files.length)}</span></span>
        <button class="gx" data-did="${x.driveId}" data-proj="${esc(x.project)}" title="${t("g_remove")}">✕</button></div>`; }).join("")+`</div>`;
  // Ziel + Übertragen
  const native=!!window.diskyNative?.copy;
  html+=`<div class="gather-bar">
    <div class="gb-target">${_gatherDest?t("g_target_set",esc(_gatherDest)):t("g_target_none")} ${native?`<button class="cl-clean" id="gPick">${_gatherDest?t("g_change"):t("g_pick")}</button>`:`<span class="muted" style="font-size:12px">${t("g_app_only")}</span>`}</div>
    <div class="gb-actions">
      <button class="ghost" id="gClear">${t("g_clear")}</button>
      <button class="big" id="gGo" ${(native&&_gatherDest&&onlineGroups.length)?"":"disabled"}>${t("g_transfer",human(readyBytes))}${onlineGroups.length<groups.length?t("g_missing",groups.length-onlineGroups.length):""} →</button>
    </div>
    <div class="gprog hide" id="gProg"><div class="gpbar"><i id="gpFill"></i></div><div class="gpmsg" id="gpMsg"></div></div>
  </div>`;
  app.innerHTML=html;
  app.querySelectorAll(".gx").forEach(b=>b.onclick=()=>{ gatherToggle(+b.dataset.did, b.dataset.proj); renderGather(); });
  const pick=document.getElementById("gPick"); if(pick) pick.onclick=async()=>{ try{ const p=await window.diskyNative.pickFolder(); if(p){ _gatherDest=p; renderGather(); } }catch(e){} };
  const clr=document.getElementById("gClear"); if(clr) clr.onclick=()=>{ if(confirm(t("g_clear_confirm"))){ gatherSet([]); renderGather(); } };
  const go=document.getElementById("gGo"); if(go) go.onclick=()=>doTransfer(onlineGroups, mountByName);
}
async function doTransfer(onlineGroups, mountByName){
  if(!window.diskyNative?.copy || !_gatherDest) return;
  const mountOf=d=> mountByName[d.volumeName]||mountByName[d.label];
  const jobs=[];
  onlineGroups.forEach(g=>{ const base=(mountOf(g.drive)||"").replace(/\/$/,"");
    g.items.forEach(x=>x.files.forEach(f=>{ jobs.push({src:base+"/"+f.relPath, rel:f.relPath, size:f.size||0}); })); });
  if(!jobs.length) return;
  const prog=document.getElementById("gProg"), fill=document.getElementById("gpFill"), msg=document.getElementById("gpMsg"), go=document.getElementById("gGo");
  prog.classList.remove("hide"); if(go) go.disabled=true;
  msg.textContent=t("g_transferring");
  const stop=window.diskyNative.onCopyProgress(p=>{ const pct=p.totalBytes?Math.round(100*p.bytesDone/p.totalBytes):0;
    fill.style.width=pct+"%"; msg.textContent=t("g_progress",p.filesDone,p.totalFiles,human(p.bytesDone),human(p.totalBytes),pct); });
  let res; try{ res=await window.diskyNative.copy(jobs, _gatherDest); }
  catch(e){ if(stop)stop(); msg.innerHTML=`<span style="color:#ff6b6b">${t("g_err",esc(e.message||""))}</span>`; if(go)go.disabled=false; return; }
  if(stop)stop();
  fill.style.width="100%";
  msg.innerHTML=t("g_done", res.ok, res.failed, esc(_gatherDest));
  if(go) go.disabled=false;
}

/* ───────────────────────── Duplikate-Ansicht ───────────────────────── */
function topFolder(rel){ const i=(rel||"").indexOf("/"); return i<0 ? "(Stammverzeichnis)" : rel.slice(0,i); }

// macOS-Ordner-Icon (zwei Lagen, leichter 3D-Look)
// Disky-CI-Ordner: definierte Stahl-Azur-Form (clean, mit Tiefe) — kein muddy Schwarz, kein grelles Apple-Blau.
/* CI-Ordner (Milchglas) — Glas-Front frostet das blaue „Heft", hintergrund-unabhängig gebacken. IDs mit ci-Präfix gegen Kollisionen. */
const FOLDER_SVG=`<svg viewBox="118 34 384 384" class="macfld" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg"><defs>
  <linearGradient id="ciFile" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#bfe2ff"/><stop offset=".5" stop-color="#5aa8ff"/><stop offset="1" stop-color="#3d88ff"/></linearGradient>
  <linearGradient id="ciCard" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#a6cdff"/><stop offset=".5" stop-color="#4496ff"/><stop offset="1" stop-color="#2a6ff0"/></linearGradient>
  <radialGradient id="ciBloom" cx=".5" cy=".56" r=".58"><stop offset="0" stop-color="#bfe0ff" stop-opacity=".95"/><stop offset=".6" stop-color="#4f9bff" stop-opacity=".5"/><stop offset="1" stop-color="#3f8cff" stop-opacity="0"/></radialGradient>
  <linearGradient id="ciMilk" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#eaf3ff" stop-opacity=".30"/><stop offset=".44" stop-color="#d2e4fb" stop-opacity=".06"/><stop offset="1" stop-color="#c6dcf8" stop-opacity=".16"/></linearGradient>

        <div class="dm-sub"><b class="amber">${human(a.reclaim)}</b> ${t("dup_reclaimable")} · ${t("dc_files",nloc(a.dup))} · ${t("dup_lies_on")} ${dr.map(d=>`<span class="tag">${esc(d)}</span>`).join('<span class="df-x">⇄</span>')}</div></div></div>
    <div class="dm-files">${items}</div></div>`;

async function renderDupes(){
  const drives = await getAll("drives");
  if(!drives.length){ app.innerHTML = emptyState(); return; }
  const byId = Object.fromEntries(drives.map(d=>[d.id,d.label]));
  const files = await allFiles();
  const MIN = 1024*1024; // 1 MB
  // 1) Hash-Gruppen bilden
  const map = new Map();
  for(const f of files){
    if(!f.hash || (f.size||0)<MIN) continue;
    const k=fkey(f); let g = map.get(k); if(!g){ g={size:f.size,copies:[]}; map.set(k,g); }
    g.copies.push(f);
  }
  // Gesamtzahl Dateien je (Top-Ordner) — für „ganzer Ordner doppelt"
  const folderTotal = new Map();
  for(const f of files){ const k=topFolder(f.relPath); folderTotal.set(k,(folderTotal.get(k)||0)+1); }
  // 2) Nach Ordner zusammenfassen
  let groupCount=0, totalWasted=0;
  const agg = new Map(); // topFolder → {name, dup, reclaim, drives:Set, items:[]}
  for(const g of map.values()){
    if(g.copies.length<2) continue;
    groupCount++; totalWasted += g.size*(g.copies.length-1);
    // ALLE Platten dieser Duplikat-Gruppe — jede betroffene Ordnerzeile zeigt das volle „Wo".
    const groupDrives=[...new Set(g.copies.map(f=>byId[f.driveId]||"?"))];
    g.copies.forEach((f,i)=>{
      const k=topFolder(f.relPath);
      let a=agg.get(k); if(!a){ a={name:k, dup:0, reclaim:0, drives:new Set(), items:[]}; agg.set(k,a); }
      a.dup++; groupDrives.forEach(d=>a.drives.add(d));   // nicht nur die eigene Platte, sondern wo es noch liegt
      if(i>0) a.reclaim += f.size||0;            // alle Kopien außer einer = freiräumbar
      a.items.push({drive:byId[f.driveId]||"?", path:f.relPath, size:f.size||0, redundant:i>0});
    });
  }
  let folders=[...agg.values()];
  folders.forEach(a=>{ a.total=folderTotal.get(a.name)||a.dup; a.whole = a.dup>=a.total && a.total>0; });
  folders = folders.filter(a=>a.reclaim>0);   // 0 B freiräumbar (redundante Kopie liegt woanders) → ausblenden, bringt nichts
  folders.sort((x,y)=>y.reclaim-x.reclaim);

  // Suchleiste UNTER dem Titel (Glow-Look). Globale Top-Leiste ist in dieser Ansicht ausgeblendet.
  const SIC=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="10.5" cy="10.5" r="6.75"/><path d="M20 20l-4.8-4.8"/></svg>`;
  app.innerHTML = pageHero('dupes')
    + `<div class="dupsearch"><span class="ds-ic">${SIC}</span>
        <input id="dupQ" type="text" autocomplete="off" spellcheck="false" placeholder="${t("deep_ph")}" value="${esc(q||"")}">
        <button class="ds-x${q?"":" hide"}" id="dupX" title="${t("deep_clear")}" tabindex="-1">✕</button></div>`
    + `<div class="dup-stats">
        <span><b>${nloc(groupCount)}</b> ${t("dup_groups_label")}</span><i></i>
        <span><b class="amber">${human(totalWasted)}</b> ${t("dup_reclaimable")}</span><i></i>
        <span><b>${nloc(folders.length)}</b> ${t("dup_folders_label")}</span></div>`
    + `<div id="dupBody"></div>`;
  const bodyEl=document.getElementById("dupBody"), FLIMIT=120;
  const card=(a,i)=>{
    const dr=[...a.drives];
    const chips=dr.slice(0,2).map(d=>`<span class="dchip">${esc(d)}</span>`).join("")
      + (dr.length>2?`<span class="dchip more">+${dr.length-2}</span>`:"");
    return `<button class="dupcard" data-i="${i}" title="${t("dup_card_t",esc(dr.join(', ')),nloc(a.dup),a.whole)}">
      <span class="dupfolder">${FOLDER_SVG}${a.whole?`<span class="dupfolder-badge" title="${t("dup_whole")}"></span>`:""}</span>
      <span class="dupcard-name">${esc(a.name)}</span>
      <span class="dupcard-meta"><b>${human(a.reclaim)}</b> · ${t("proj_files_abbr",nloc(a.dup))}</span>
      <span class="dupcard-drives">${chips}</span>
    </button>`;
  };
  function fill(){
    if(!folders.length){ bodyEl.innerHTML=`<div class="empty"><span class="big-emoji">${IC.check}</span>${t("dup_none")}</div>`; return; }
    const filtered = folders.filter(a=> match(a.name) || a.items.some(it=>match(it.path)||match(it.drive)) );
    if(!filtered.length){ bodyEl.innerHTML=`<div class="empty"><span class="big-emoji">${IC.check}</span>${t("no_matches")}</div>`; _dupList=[]; return; }
    const list=filtered.slice(0,FLIMIT);
    bodyEl.innerHTML=`<div class="dupgrid">${list.map(card).join("")}</div>`
      + (filtered.length>FLIMIT?`<div class="muted" style="padding:10px 2px">${t("dup_more",nloc(filtered.length-FLIMIT))}</div>`:"");
    _dupList=list;
    bodyEl.querySelectorAll(".dupcard").forEach(b=>b.onclick=()=>openDupFolder(_dupList[+b.dataset.i]));
  }
  fill();
  const inp=document.getElementById("dupQ"), x=document.getElementById("dupX");
  if(inp){ inp.oninput=()=>{ q=inp.value.toLowerCase(); if(x) x.classList.toggle("hide", !inp.value); clearTimeout(_dupQT); _dupQT=setTimeout(fill,120); }; }
  if(x){ x.onclick=()=>{ q=""; inp.value=""; x.classList.add("hide"); inp.focus(); fill(); }; }
}

/* ── Foto-/Video-Rohmaterial erkennen — der Backup-Assistent dreht sich um Shoots, nicht um jede Datei ── */
const RAWPHOTO_EXTS=new Set([".cr2",".cr3",".nef",".nrw",".arw",".srf",".sr2",".raf",".orf",".rw2",".dng",".pef",".srw",".raw",".3fr",".fff",".iiq",".gpr",".x3f",".erf",".rwl",".mef",".mos",".cap",".nksc"]);
const VIDFOOTAGE_EXTS=new Set([".mov",".mp4",".m4v",".mxf",".braw",".r3d",".ari",".arx",".mts",".m2ts",".avchd",".insv",".insp",".avi",".mkv",".mpg",".m2v",".dav",".lrv",".360"]);
const PROJECTFILE_EXTS=new Set([".prproj",".drp",".fcpbundle",".imovielibrary",".aep",".aepx",".psd",".psb",".ai",".lrcat",".lrcat-data",".lrtemplate",".xmp",".sesx",".als",".motn",".cube",".look",".veg",".kdenlive",".c4d",".blend"]);
const isFootage=ext=>RAWPHOTO_EXTS.has(ext)||VIDFOOTAGE_EXTS.has(ext);
const isProjectFile=ext=>PROJECTFILE_EXTS.has(ext);
// System-/Standardordner sind KEINE Projekte (Mac/Win + Cloud-Sync) — sonst landet „Downloads"/„Pictures" im Backup-Check
const SYSTEM_FOLDERS=new Set(["downloads","desktop","schreibtisch","documents","dokumente","pictures","bilder",
  "music","musik","movies","filme","movie","library","bibliothek","applications","programme","public","öffentlich",
  "sites","system","users","benutzer","shared","trash","papierkorb","$recycle.bin","recycle.bin","windows",
  "program files","program files (x86)","appdata","programdata","onedrive","dropbox","node_modules",
  "creative cloud files","icloud drive","google drive","temp","tmp","cache",".cache",
  // Kamera-/Geräte-Standardordner + namenlose Ordner = KEINE Projekte (Inhalt-Ordner wie „Footage" bleiben drin!)
  "dcim","private","msdcf","avf_info","clip","sub","lost+found","found.000","spotlight-v100",
  "untitled","unbenannt","ohne titel","namenlos","kein name","no name","neuer ordner","new folder","neues projekt","new project"]);
function isSystemFolder(name){ if(!name) return true; const n=name.trim().toLowerCase();
  if(!n) return true;                                         // leerer/namenloser Ordner → raus
  if(n.startsWith(".")||name.startsWith("(")) return true;    // versteckte Ordner + Root-Sammelbucket
  if(/^\d{3}[a-z]/i.test(n)) return true;                     // Kamera-DCIM-Unterordner (100CANON, 101NIKON, 100MSDCF, 100GOPRO …)
  return SYSTEM_FOLDERS.has(n); }
/* ───────────────────────── Backup-Assistent (Shoot-Schutz) ───────────────────────── */
/* ── Projekt-Aliase: der Nutzer kann erkannte Projekte (Top-Ordner) umbenennen ── */
function projAliases(){ try{ return JSON.parse(localStorage.getItem("disky_projalias")||"{}"); }catch(e){ return {}; } }
function projName(folder){ const a=projAliases(); return (a[folder]||folder); }       // Anzeigename (Alias oder Ordner)
function setProjAlias(folder, alias){ const a=projAliases(); alias=(alias||"").trim();
  if(!alias || alias===folder) delete a[folder]; else a[folder]=alias;
  localStorage.setItem("disky_projalias", JSON.stringify(a)); }

/* ── Projekt-Status: manuell „archiviert"(=fertig) / „active"(=trotz Auto weiter überwachen) ── */
function projStatus(){ try{ return JSON.parse(localStorage.getItem("disky_projstatus")||"{}"); }catch(e){ return {}; } }
function setProjStatus(folder, st){ const a=projStatus(); if(!st||st==="auto") delete a[folder]; else a[folder]=st;
  localStorage.setItem("disky_projstatus", JSON.stringify(a)); }
// „Final/Export gefunden" → starkes Signal, dass ein Shoot abgeschlossen ist
// FINAL/Export/Abgabe = starkes Indiz, dass ein Shoot ERLEDIGT ist → „sieht fertig aus" (Archiv-Vorschlag)
/* ── Abgabe-/Export-Erkennung: zweistufig (STRONG = echte Abgabe, WEAK = bloß ein Export) ──
   STRONG = Ordner/Name schreit „fertig abgegeben" (Final, Master, Delivery, Abgabe, Freigabe …)
   WEAK   = ein Export wurde gemacht, kann aber auch ein Zwischenstand/Draft sein (Export, Render, Output …) */
const STRONG_DONE=new Set(["final","finals","finale","master","masters","mastered","mastering","delivery","deliveries","deliverable","deliverables","deliver","delivered","abgabe","abgaben","abnahme","freigabe","freigaben","freigegeben","approved","approval","graded","grade","grading","sendout","versand","final export","final render","final cut","finalcut","online master","onlinemaster","fertig","done","abgeschlossen"]);
const WEAK_DONE=new Set(["export","exports","exported","render","renders","rendered","renderings","rendering","output","outputs","ausspielung","ausgespielt","prores","h264","h265","mp4","fertige videos","upload","uploads","hochgeladen","veröffentlicht","published"]);
const RE_STRONG_FILE=/(^|[ _\-.])(final|finale|master|delivery|delivered|deliverable|approved|freigabe|abgabe|abnahme|ausgespielt|graded|fertig)([ _\-.0-9v]|$)/i;
const RE_WEAK_FILE  =/(^|[ _\-.])(export|exported|render|rendered|output|upload|published)([ _\-.0-9v]|$)/i;
// Liefert 2 = starke Abgabe, 1 = (schwacher) Export, 0 = normales Arbeits-/Quellfile
function deliverClass(relPath){
  if(!relPath) return 0;
  const segs=relPath.toLowerCase().split("/"); const fn=segs[segs.length-1]||"";
  for(let i=0;i<segs.length-1;i++){ if(STRONG_DONE.has(segs[i].trim())) return 2; }   // ein Ordner-Segment ist starke Abgabe
  if(RE_STRONG_FILE.test(fn)) return 2;                                                // oder der Dateiname (Wedding_FINAL.mov)
  for(let i=0;i<segs.length-1;i++){ if(WEAK_DONE.has(segs[i].trim())) return 1; }      // ein Export-Ordner
  if(RE_WEAK_FILE.test(fn)) return 1;
  return 0;
}
const ARCH_MS=1000*60*60*24*30*6;   // „inaktiv" = 6 Monate ohne Änderung (Default)
const QUIET_MS=1000*60*60*24*21;    // „seit dem Export Ruhe" = ~3 Wochen
// Schwelle aus dem Backup-Profil: „Wann ist ein Projekt fertig?" → Wochen / Monate / nie
function archMs(){ try{ const p=JSON.parse(localStorage.getItem("disky_bk_profile")||"null"); const d=p&&p.ans&&p.ans.done;
  return d==="w"?1000*60*60*24*45 : d==="never"?Infinity : ARCH_MS; }catch(e){ return ARCH_MS; } }
// „Wie streng beim Backup?" aus dem Profil → ab welcher Footage-Sicherung gilt ein Projekt als gefährdet.
// streng: schon warnen, wenn <80% doppelt liegen; entspannt: erst <35%; Standard: <50%.
function footCut(){ try{ const p=JSON.parse(localStorage.getItem("disky_bk_profile")||"null"); const s=p&&p.ans&&p.ans.strict;
  return s==="high"?0.8 : s==="low"?0.35 : 0.5; }catch(e){ return 0.5; } }

/* ── Backup-Analyse auf PROJEKT-Ebene (geteilt von Backup-Ansicht + Übersicht-Hinweis) ──
   Backup ist IMMER projektbasiert: ein „Shoot/Projekt" = Top-Ordner mit genug Rohmaterial. */
function analyzeBackup(files, drives){
  const _archMs=archMs();   // „fertig nach" aus dem Profil
  const _footCut=footCut(); // „wie streng" aus dem Profil → Footage-Sicherungs-Schwelle
  const byId=Object.fromEntries(drives.map(d=>[d.id,d.label]));
  const byType=Object.fromEntries(drives.map(d=>[d.id,d.driveType||""]));
  const MIN=1024*1024, MEDIA_MIN=512*1024*1024;   // Projekt = mind. 0,5 GB Rohmaterial
  const hd=new Map();
  for(const f of files){ if(!f.hash||(f.size||0)<MIN) continue; const k=fkey(f); let s=hd.get(k); if(!s){s=new Set();hd.set(k,s);} s.add(f.driveId); }
  const status=projStatus(), now=Date.now();
  const proj=new Map(), pMeta=new Map();
  for(const f of files){
    const name=topFolder(f.relPath), sz=f.size||0, foot=isFootage(f.ext||"");
    let p=proj.get(name); if(!p){p=new Map();proj.set(name,p);}
    let m=pMeta.get(name); if(!m){m={lastMod:0,lastWorkMod:0,lastDeliverMod:0,hasStrong:false,hasExport:false,hasProject:false};pMeta.set(name,m);}
    const mt=f.mtime||0, dc=deliverClass(f.relPath), isProj=isProjectFile(f.ext||"");
    if(mt>m.lastMod) m.lastMod=mt;
    if(dc>0){                                              // Abgabe/Export → eigener Zeitstempel
      if(mt>m.lastDeliverMod) m.lastDeliverMod=mt;
      if(dc===2) m.hasStrong=true; else m.hasExport=true;
    } else if(foot || isProj){                            // echtes Arbeits-/Quellmaterial → wann zuletzt editiert/gedreht
      if(mt>m.lastWorkMod) m.lastWorkMod=mt;
    }
    if(!m.hasProject && isProj && dc===0) m.hasProject=true;
    let inst=p.get(f.driveId); if(!inst){inst={bytes:0,files:0,covered:0,foot:0,footCov:0,rest:0,restCov:0};p.set(f.driveId,inst);}
    inst.bytes+=sz; inst.files++;
    let bk=false; if(f.hash && sz>=MIN){ const s=hd.get(fkey(f)); bk=!!(s && [...s].some(d=>d!==f.driveId)); }
    if(bk) inst.covered+=sz;
    if(foot){ inst.foot+=sz; if(bk) inst.footCov+=sz; } else { inst.rest+=sz; if(bk) inst.restCov+=sz; }
  }
  const risk=[], safe=[], partial=[], review=[], archived=[];
  for(const [name,instMap] of proj){
    if(isSystemFolder(name)) continue;   // Downloads/Pictures/Music/… sind keine Shoots
    const insts=[...instMap.entries()].map(([driveId,v])=>({driveId,label:byId[driveId]||"?",dtype:byType[driveId]||"",...v}));
    insts.sort((a,b)=>b.bytes-a.bytes);
    const footTotal=insts.reduce((s,i)=>s+i.foot,0);
    if(footTotal < MEDIA_MIN) continue;
    const primary=insts[0], total=insts.reduce((s,i)=>s+i.bytes,0);
    // Footage-Sicherung von der Instanz nehmen, die das Footage WIRKLICH hält (nicht der größten —
    // sonst übersehen wir Rohmaterial, das nur auf einer kleineren Platte einmal liegt).
    const footInst = insts.reduce((a,b)=> (b.foot>(a?a.foot:-1)?b:a), null);
    const footCov = footInst && footInst.foot ? footInst.footCov/footInst.foot : 1;
    const coverage = primary.bytes? primary.covered/primary.bytes : 0;
    const meta=pMeta.get(name)||{}, st=status[name];
    const lastMod=meta.lastMod||0, lastWork=meta.lastWorkMod||0, lastDeliver=meta.lastDeliverMod||0;
    const inactive = lastMod ? (now-lastMod)>_archMs : false;        // länger als die Schwelle liegen gelassen
    const quiet    = lastMod ? (now-lastMod)>QUIET_MS : false;       // seit ~3 Wochen Ruhe
    const deliverNewest = lastDeliver>0 && lastDeliver>=lastWork;    // nach dem Export wurde NICHTS mehr editiert/gedreht
    const onHDD = insts.some(i=>i.dtype==="hdd");
    const primarySSD = primary.dtype==="ssd"||primary.dtype==="mac";
    /* ── Aktiv vs. Archiv – workflow-basiert (siehe deliverClass / lastWork vs lastDeliver) ── */
    let predActive, conf, rcode;
    if(inactive){ predActive=false; conf="hi"; rcode="inactive"; }                                   // 2. zu lange nicht angefasst
    else if(meta.hasStrong && deliverNewest){ predActive=false; conf="hi"; rcode="delivered"; }       // 3. abgegeben, danach nichts mehr
    else if(meta.hasExport && deliverNewest && quiet){ predActive=false; conf="mid"; rcode="exported"; } // 5. exportiert & seither still
    else if((meta.hasStrong||meta.hasExport) && !deliverNewest){ predActive=true; conf="mid"; rcode="revising"; } // 4. nach Export weiter editiert
    else { predActive=true; conf=quiet?"mid":"hi"; rcode=meta.hasProject?"progress":"fresh"; }        // 6. in Arbeit / frisches Rohmaterial
    if(st==="archived"){ predActive=false; conf="hi"; rcode="manual"; }                                // 1. manuell → Archiv
    else if(st==="active" && !(meta.hasStrong && deliverNewest)){ predActive=true; conf="hi"; rcode="manualA"; } // manuell aktiv (außer klar abgegeben)
    const e={name,insts,total,labels:[...new Set(insts.map(i=>i.label))],
      footCov, coverage, missingRest:Math.max(0, primary.rest-primary.restCov), hasRest:primary.rest>0,
      lastMod, lastWork, lastDeliver, hasStrong:!!meta.hasStrong, hasExport:!!meta.hasExport, hasFinal:!!(meta.hasStrong||meta.hasExport),
      hasProject:!!meta.hasProject, predActive, conf, rcode, onHDD, primarySSD, primaryType:primary.dtype};
    e.riskBytes=primary.bytes-primary.covered;
    if(st==="archived"){ e.kind="archived"; archived.push(e); continue; }   // manuell als fertig markiert → Archiv
    if(footCov<_footCut){                                                   // zu wenig doppelt gesichert (Schwelle aus „wie streng") → Sicherung fehlt
      if(!predActive){ e.reason=(rcode==="delivered"||rcode==="exported")?"final":"inactive"; e.kind="review"; review.push(e); }   // sieht fertig aus → bestätigen
      else { e.state = meta.hasProject ? "active" : "notstarted"; e.kind="risk"; risk.push(e); }   // braucht Backup: aktiv ODER unbearbeitetes Rohmaterial
    }
    else if(coverage<0.95){ e.uncovered=primary.bytes-primary.covered; e.kind="partial"; partial.push(e); }
    else { e.freeable=total-primary.bytes; e.kind="safe"; safe.push(e); }
  }
  risk.sort((a,b)=>b.riskBytes-a.riskBytes); safe.sort((a,b)=>b.freeable-a.freeable); partial.sort((a,b)=>b.uncovered-a.uncovered);

}

async function exportCatalog(){
  const drives = await getAll("drives");
  const files = await allFiles();
  const blob = new Blob([JSON.stringify({v:1, drives, files})], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "festplatten-katalog-"+new Date().toISOString().slice(0,10)+".json";
  a.click(); URL.revokeObjectURL(a.href);
}
async function importCatalog(e){
  const file = e.target.files[0]; if(!file) return;
  const data = JSON.parse(await file.text());
  if(!data.drives || !data.files){ alert(t("imp_invalid")); return; }
  if(!confirm(t("imp_confirm"))) return;
  for(const d of data.drives){
    await deleteDriveByLabel(d.label);
  }
  // neue IDs vergeben, Dateien umhängen
  const idMap={};
  for(const d of data.drives){
    const {id, ...rest} = d;
    idMap[id] = await addDrive(rest);
  }
  const t = tx(["files"],"readwrite"); const s=t.objectStore("files");
  for(const f of data.files){
    const {id, driveId, ...rest} = f;
    if(idMap[driveId]===undefined) continue;
    s.put({driveId:idMap[driveId], ...rest});
  }
  await new Promise(r=>t.oncomplete=r);
  invalidateFiles(); alert(t("imp_loaded")); render();
}

/* ── Automatische Katalog-Sicherung (Sicherheitsnetz gegen Datenverlust) ──
   Schreibt den ganzen Katalog versioniert als gzip-JSON nach userData/catalog-backups/.
   Gedrosselt (höchstens alle 10 Min) und debounced nach Scans, damit es nie stört. */
let _bkTimer=null, _bkLast=0;
async function autoBackupCatalog(force){
  if(!window.diskyNative?.catalogBackup) return null;
  const now=Date.now();
  if(!force && now-_bkLast < 10*60*1000) return null;        // höchstens alle 10 Minuten
  try{
    const drives=await getAll("drives"); if(!drives.length) return null;
    const files=await allFiles();
    const json=JSON.stringify({v:1, ts:now, drives, files});
    const r=await window.diskyNative.catalogBackup(json);
    if(r&&r.ok){ _bkLast=now; try{ localStorage.setItem("disky_bk_last", String(now)); }catch(e){} }
    return r;
  }catch(e){ return null; }
}
function scheduleAutoBackup(){ if(!window.diskyNative?.catalogBackup) return;
  clearTimeout(_bkTimer); _bkTimer=setTimeout(()=>autoBackupCatalog(false), 25000); }   // 25s nachdem ein Scan zur Ruhe kam
async function restoreCatalogFromBackup(file){
  if(!window.diskyNative?.catalogBackupRead) return;
  const json=await window.diskyNative.catalogBackupRead(file); if(!json){ alert(t("bk_restore_fail")); return; }
  let data; try{ data=JSON.parse(json); }catch(e){ alert(t("bk_restore_fail")); return; }
  if(!data.drives||!data.files){ alert(t("bk_restore_fail")); return; }
  if(!confirm(t("bk_restore_confirm", nloc(data.drives.length), nloc(data.files.length)))) return;
  for(const d of data.drives){ await deleteDriveByLabel(d.label); }
  const idMap={};
  for(const d of data.drives){ const {id, ...rest}=d; idMap[id]=await addDrive(rest); }
  await new Promise(r=>{ const t2=tx(["files"],"readwrite"); const s=t2.objectStore("files");
    for(const f of data.files){ const {id, driveId, ...rest}=f; if(idMap[driveId]===undefined) continue; s.put({driveId:idMap[driveId], ...rest}); }
    t2.oncomplete=r; t2.onerror=r; });
  invalidateFiles(); alert(t("bk_restore_ok")); render();
}

const IMG_EXTS=new Set([".jpg",".jpeg",".png",".heic",".tiff",".tif",".webp",".gif"]);
const VID_EXTS=new Set([".mov",".mp4",".m4v",".avi",".mkv",".mts",".m2ts",".mxf"]);
function isMediaExt(ext){ return IMG_EXTS.has(ext)||VID_EXTS.has(ext); }

// Thumbnail (kleines JPEG) aus Bild- oder Video-Datei
function thumbFromImage(blob){return new Promise((res)=>{const im=new Image();
  im.onload=()=>{const W=200,r=(im.height/im.width)||0.66,c=document.createElement("canvas");
    c.width=W;c.height=Math.round(W*r)||132;c.getContext("2d").drawImage(im,0,0,c.width,c.height);
    res(c.toDataURL("image/jpeg",0.72));URL.revokeObjectURL(im.src);};
  im.onerror=()=>res(null);im.src=URL.createObjectURL(blob);});}
function thumbFromVideo(file){return new Promise((res)=>{const v=document.createElement("video");
  v.muted=true;v.playsInline=true;v.src=URL.createObjectURL(file);
  v.addEventListener("loadeddata",()=>{try{v.currentTime=Math.min(1.5,(v.duration||2)/2);}catch(e){res(null);}});
  v.addEventListener("seeked",()=>{const W=200,r=(v.videoHeight/v.videoWidth)||0.56,c=document.createElement("canvas");
    c.width=W;c.height=Math.round(W*r)||112;c.getContext("2d").drawImage(v,0,0,c.width,c.height);
    res(c.toDataURL("image/jpeg",0.72));},{once:true});
  v.addEventListener("error",()=>res(null));setTimeout(()=>res(null),8000);});}

// Kleines JPEG-Thumb aus einer (größeren) data-URL erzeugen
// Auto-Pop / Viewing-LUT-Annäherung: erkennt flaches Log-Material (wenig Kontrast + Sättigung)
// und legt Schwarz-/Weißpunkt + S-Kurve + Sättigung drüber. Stärke skaliert mit der „Flachheit",
// d.h. bereits gegradetes/normales Material bleibt praktisch unberührt. Macht S-Log3/V-Log/C-Log-
// Standbilder aus „grau" zu sauberen Previews.
function autoPop(ctx,w,h){
  let img; try{ img=ctx.getImageData(0,0,w,h); }catch(e){ return; }
  const d=img.data, n=w*h; if(!n) return;
  let sumSat=0; const hist=new Float32Array(256);
  for(let i=0;i<d.length;i+=4){ const r=d[i],g=d[i+1],b=d[i+2];
    const mx=r>g?(r>b?r:b):(g>b?g:b), mn=r<g?(r<b?r:b):(g<b?g:b);
    hist[(0.299*r+0.587*g+0.114*b)|0]++; sumSat+=mx?(mx-mn)/mx:0; }
  const meanSat=sumSat/n, clip=n*0.02; let acc=0,p2=0,p98=255;
  for(let i=0;i<256;i++){ acc+=hist[i]; if(acc>=clip){ p2=i; break; } }
  acc=0; for(let i=255;i>=0;i--){ acc+=hist[i]; if(acc>=clip){ p98=i; break; } }
  const range=(p98-p2)/255;
  // Flachheit: gestauchter Tonwertumfang UND geringe Sättigung
  const flat=Math.max(0,Math.min(1,(0.80-range)/0.5))*Math.max(0,Math.min(1,(0.30-meanSat)/0.24));
  if(flat<0.06) return;
  const lo=p2/255, span=Math.max(0.25,(p98-p2)/255), sat=1+0.55*flat, con=1+0.45*flat, amt=flat;
  const lvl=v=>{ let s=(v-lo)/span; s=s<0?0:s>1?1:s; return 0.5+(s-0.5)*con; };
  for(let i=0;i<d.length;i+=4){
    const r0=d[i]/255,g0=d[i+1]/255,b0=d[i+2]/255;
    let r=lvl(r0),g=lvl(g0),b=lvl(b0);
    const L=0.299*r+0.587*g+0.114*b;
    r=L+(r-L)*sat; g=L+(g-L)*sat; b=L+(b-L)*sat;
    d[i]  =Math.max(0,Math.min(255,(r0+(r-r0)*amt)*255));
    d[i+1]=Math.max(0,Math.min(255,(g0+(g-g0)*amt)*255));
    d[i+2]=Math.max(0,Math.min(255,(b0+(b-b0)*amt)*255));
  }
  ctx.putImageData(img,0,0);
}
function thumbFromDataURL(url,W=200){return new Promise(res=>{const im=new Image();
  im.onload=()=>{const r=(im.height/im.width)||0.6,c=document.createElement("canvas");
    c.width=W;c.height=Math.round(W*r)||120;const cx=c.getContext("2d");cx.drawImage(im,0,0,c.width,c.height);
    try{autoPop(cx,c.width,c.height);}catch(e){}
    res(c.toDataURL("image/jpeg",0.72));};
  im.onerror=()=>res(url); im.src=url;});}

// Welche Medien können JETZT indiziert werden (auf angeschlossenen Platten, noch ohne Embedding)?
async function aiIndexTodo(){
  const files=await allFiles();
  const drives=await getAll("drives");
  const driveById=Object.fromEntries(drives.map(d=>[d.id,d]));
  let mountByName={};
  if(window.diskyNative?.listVolumes){ try{ (await getVolumes()).forEach(v=>{ mountByName[v.volumeName]=v.mount; mountByName[v.name]=v.mount; }); }catch(e){} }
  const todo=[], later=[];
  for(const f of files){ if(!isMediaExt(f.ext)||f.embed) continue;
    const d=driveById[f.driveId]; const mount=mountByName[d?.volumeName]||mountByName[d?.label];
    if(mount) todo.push({f, full:mount.replace(/\/$/,"")+"/"+f.relPath}); else later.push(f); }
  return {todo, later};
}

function fmtEta(sec){ if(!isFinite(sec)||sec<=0) return ""; sec=Math.ceil(sec);
  if(sec<60) return sec+" Sek."; if(sec<3600) return Math.round(sec/60)+" Min.";
  const h=Math.floor(sec/3600), m=Math.round((sec%3600)/60); return h+" Std."+(m?" "+m+" Min.":""); }
let aiBuilding=false, aiCancel=false;
async function buildAiIndex(){

  aiBuilding=true; aiCancel=false;
  // Fortschritts-UI (Balken + %, ETA, Abbrechen) ersetzt den Aufbau-Button
  const row=document.querySelector(".kibuildrow");
  const renderProg=(done,total,etaTxt)=>{
    if(!row) return; const pct=total?Math.round(100*done/total):0;
    row.innerHTML=`<div class="kiprog"><span style="width:${pct}%"></span></div>
      <div class="kiprow"><span class="kiprtxt">${t("ki_indexing",nloc(done),nloc(total),pct,etaTxt)}</span>
        <button class="ghost kicancel" id="kicancel">${t("c_cancel")}</button></div>`;
    const c=document.getElementById("kicancel"); if(c) c.onclick=()=>{ aiCancel=true; c.disabled=true; c.textContent=t("ki_cancelling"); };
  };
  setSt(t("scan_ai_loading"));
  try{ await window.DiskyAI.load(setSt); }catch(e){ setSt(t("scan_ai_err",e.message)); aiBuilding=false; renderSearch(); return; }
  const {todo}=await aiIndexTodo();
  if(!todo.length){ setSt(t("ai_no_new")); aiBuilding=false; renderSearch(); return; }
  let done=0, ok=0; const t0=performance.now(); dockProgress(0); renderProg(0,todo.length,"");
  for(const {f,full} of todo){
    if(aiCancel) break;
    try{
      const raw=await window.diskyNative.thumbnail(full);
      if(raw){ const embed=await window.DiskyAI.embedImageSrc(raw); const thumb=await thumbFromDataURL(raw);
        f.embed=embed; f.thumb=thumb;
        await new Promise(r=>{ const t=tx(["files"],"readwrite"); t.objectStore("files").put(f); t.oncomplete=r; t.onerror=r; });
        ok++; }
    }catch(e){}
    done++;
    if(done%3===0||done===todo.length){
      const elapsed=(performance.now()-t0)/1000, rate=done/elapsed;
      const etaTxt = done>=6 && rate>0 ? fmtEta((todo.length-done)/rate) : "";
      renderProg(done,todo.length,etaTxt); dockProgress(done/todo.length);
    }
  }
  dockProgress(null); aiBuilding=false; invalidateFiles();
  if(aiCancel){ const e=document.getElementById("kistatus"); if(e) e.textContent=t("ki_cancelled",nloc(ok)); }
  renderSearch();
}

// Linse „Alle": Name/Pfad über den ganzen Katalog — funktioniert auch, wenn die Platte abgesteckt ist.
async function deepNameBody(host){
  const drives=await getAll("drives");
  if(!drives.length){ host.innerHTML=emptyState(); return; }
  const dById=Object.fromEntries(drives.map(d=>[d.id,d.label]));
  const files=await allFiles();
  // Mounts der angeschlossenen Platten → entscheidet, ob „im Finder zeigen" möglich ist
  let mountByName={};
  if(window.diskyNative?.listVolumes){ try{ (await getVolumes()).forEach(v=>{ mountByName[v.volumeName]=v.mount; mountByName[v.name]=v.mount; }); }catch(e){} }
  const mountOfDrive=id=>{ const d=drives.find(x=>x.id===id); return d?(mountByName[d.volumeName]||mountByName[d.label]||null):null; };
  host.innerHTML=`<div id="dres" class="deep-res"></div>`;
  const res=host.querySelector("#dres");
  const qq=(q||"").trim();   // kommt von der Suchleiste oben (global)
  if(!qq){ res.innerHTML=`<div class="deep-hint">${t("deep_hint",nloc(files.length))}</div>`; return; }
  // ── Ordner zuerst: Pfad-Segmente, deren Name zum Suchbegriff passt (gebündelt je Platte) ──
  const fmap=new Map();
  for(const f of files){ const rel=f.relPath||""; if(!rel.includes("/")) continue;
    const segs=rel.split("/"); segs.pop(); const acc=[];
    for(const seg of segs){ acc.push(seg);
      if(seg.toLowerCase().includes(qq)){ const path=acc.join("/"), key=f.driveId+"|"+path;
        let g=fmap.get(key); if(!g){ g={did:f.driveId,path,name:seg,items:0,bytes:0}; fmap.set(key,g); }
        g.items++; g.bytes+=f.size||0; } } }
  const folders=[...fmap.values()].sort((a,b)=>b.bytes-a.bytes).slice(0,40);
  const fhits=files.filter(f=>(f.name||"").toLowerCase().includes(qq)).slice(0,300);
  let html="";
  if(folders.length){ html+=`<div class="deep-grp">${t("deep_grp_folders",folders.length)}</div>`+folders.map(g=>
    `<button class="dhit dfold" data-did="${g.did}" data-path="${esc(g.path)}" title="${t("deep_fold_t")}">
      <span class="dh-ic">${IC.folder}</span>
      <span class="dh-name">${esc(g.name)}</span>
      <span class="dh-loc">${esc(dById[g.did]||"?")} · ${esc(g.path)} · ${t("dc_files",nloc(g.items))}</span>
      <span class="dh-size">${human(g.bytes)}</span></button>`).join(""); }
  if(fhits.length){ html+=`<div class="deep-grp">${t("deep_grp_files",fhits.length>=300?"300+":fhits.length)}</div>`+fhits.map(f=>{
    const on=!!mountOfDrive(f.driveId);
    return `<button class="dhit dfile" data-did="${f.driveId}" data-rel="${esc(f.relPath||"")}" title="${on?t("deep_file_show"):t("deep_file_noshow")}">
      <span class="dh-ic">${IC.file}</span>
      <span class="dh-name">${esc(f.name||f.relPath||"?")}</span>
      <span class="dh-loc">${esc(dById[f.driveId]||"?")} · ${esc(f.relPath||"")}${on?"":t("deep_in_closet")}</span>
      <span class="dh-size">${human(f.size||0)}</span></button>`;}).join(""); }
  res.innerHTML = html || `<div class="deep-hint">${t("deep_no_hits",esc(qq))}</div>`;
  res.querySelectorAll(".dfold").forEach(b=>{
    const openMap=()=>{ mapDriveId=+b.dataset.did; mapStack=[]; mapTree=null; mapDrillPath=(b.dataset.path||"").split("/").filter(Boolean); setView("map"); };
    b.onclick=openMap;
    b.oncontextmenu=ev=>{ const mount=mountOfDrive(+b.dataset.did), path=b.dataset.path||"", full=mount?mount.replace(/\/$/,"")+"/"+path:null;
      showCtx(ev,[ {label:t("ctx_open_map"),ic:IC.layers,on:openMap},
        full?{label:t("ctx_reveal_folder"),ic:IC.reveal,on:()=>window.diskyNative.reveal(full)}:{label:t("ctx_offline"),ic:IC.reveal,disabled:true},
        "sep", {label:t("ctx_copy_path"),ic:IC.copy,on:()=>copyText(full||path)} ], path.split("/").pop()||path); };
  });
  res.querySelectorAll(".dfile").forEach(b=>{
    const did=+b.dataset.did, rel=b.dataset.rel||"";
    const reveal=()=>{ const mount=mountOfDrive(did); if(mount&&window.diskyNative?.reveal) window.diskyNative.reveal(mount.replace(/\/$/,"")+"/"+rel); };
    const inMap=()=>{ mapDriveId=did; mapStack=[]; mapTree=null; mapDrillPath=rel.includes("/")?rel.split("/").slice(0,-1):null; setView("map"); };
    b.onclick=()=>{ if(mountOfDrive(did)&&window.diskyNative?.reveal) reveal(); else inMap(); };
    b.oncontextmenu=ev=>{ const mount=mountOfDrive(did), full=mount?mount.replace(/\/$/,"")+"/"+rel:null;
      showCtx(ev,[ full?{label:t("ctx_reveal_file"),ic:IC.reveal,on:reveal}:{label:t("ctx_offline"),ic:IC.reveal,disabled:true},
        {label:t("ctx_show_map"),ic:IC.layers,on:inMap},
        "sep", {label:t("ctx_copy_path"),ic:IC.copy,on:()=>copyText(full||rel)}, {label:t("ctx_copy_name"),ic:IC.copy,on:()=>copyText(rel.split("/").pop()||rel)} ], rel.split("/").pop()||rel); };
  });
}

async function deepAiBody(host){
  const files=await allFiles();

  const {todo,later}=await aiIndexTodo();
  host.innerHTML=`
    <div class="card kihero">

      </div>
      <div class="kichips">${["underwater","sunset","person","drone shot","city at night","food"].map(c=>`<span class="kchip">${c}</span>`).join("")}</div>

      ${(todo.length||later.length)?`<div class="kibuildrow">
        ${todo.length?`<button class="big" id="kibuild">${t("ki_build",nloc(todo.length))}</button>`:""}
        ${later.length?`<span class="muted" style="font-size:12.5px">${t("ki_later",nloc(later.length))}</span>`:""}
      </div>`:""}
    </div>
    <div id="kiresults" class="kigrid"></div>`;
  const drives=await getAll("drives");
  const dById=Object.fromEntries(drives.map(d=>[d.id,d.label]));
  const go=async()=>{
    const ql=document.getElementById("kiq").value.trim(); if(!ql) return;
    searchState.q=ql;
    const st=document.getElementById("kistatus");
    if(!window.DiskyAI){ st.textContent=t("ki_module_loading"); return; }
    document.getElementById("kibtn").disabled=true;
    if(!window.DiskyAI.ready){ st.textContent=t("scan_ai_loading"); await window.DiskyAI.load(m=>st.textContent=m); }
    st.textContent=t("ki_searching");
    const qe=await window.DiskyAI.embedText(ql);
    const scored=indexed.map(f=>{let s=0,e=f.embed;for(let i=0;i<e.length;i++)s+=qe[i]*e[i];return {f,s};})
      .sort((a,b)=>b.s-a.s).slice(0,60);
    document.getElementById("kiresults").innerHTML=scored.map(({f,s})=>`
      <div class="kicard">
        <div class="kithumb">${f.thumb?`<img src="${f.thumb}" loading="lazy">`:`<div class="kinothumb">${VID_EXTS.has(f.ext)?IC.film:IC.image}</div>`}
          <span class="kiscore">${(s*100).toFixed(0)}</span></div>
        <div class="kimeta"><div class="kiname" title="${esc(f.relPath)}">${esc(f.name)}</div>
          <div class="kipath muted">${esc(dById[f.driveId]||"?")} · ${esc(f.relPath)}</div></div>
      </div>`).join("");
    st.textContent=t("ki_results",scored.length,ql,indexed.length);
    document.getElementById("kibtn").disabled=false;
  };
  document.getElementById("kibtn")?.addEventListener("click",go);
  document.getElementById("kiq")?.addEventListener("keydown",e=>{if(e.key==="Enter")go();});
  host.querySelectorAll(".kchip").forEach(c=>c.onclick=()=>{ if(!indexed.length) return; document.getElementById("kiq").value=c.textContent; go(); });
  document.getElementById("kibuild")?.addEventListener("click",buildAiIndex);
}

  const steps=["welcome","tutorial","update"].concat(native?["access"]:[]).concat(["done"]);
  let i=0;
  const ov=document.createElement("div"); ov.className="onb"; ov.innerHTML=`<div class="onb-card" id="onbCard"></div>`;
  document.body.appendChild(ov);
  const card=ov.querySelector("#onbCard");
  const finish=(scanNow)=>{ setAutoScan(autoChoice); localStorage.setItem("disky_onboarded","1"); ov.remove();
    try{ renderAcct(); render(); }catch(e){}
    if(autoChoice && native){ try{ maybeAutoScanInternal(); }catch(e){} }
    if(scanNow) setTimeout(()=>{ if(view!=="overview") setView("overview"); setTimeout(startScan,140); },150); };
  const dots=()=>`<div class="onb-dots">${steps.map((_,k)=>`<span class="onb-dot${k===i?" on":""}"></span>`).join("")}</div>`;
  function draw(){
    const s=steps[i]; let body="";
    if(s==="welcome") body=`<div class="onb-eyebrow"><span class="cpit-dot"></span>${t("onb_step1_eb")}</div>
      <div class="onb-hero">${ORBIT}</div>
      <h2 class="onb-title">${t("onb_welcome_title")}</h2>
      <p class="onb-desc">${t("onb_welcome_desc")}</p>`;
    else if(s==="tutorial") body=`<div class="onb-eyebrow">${t("onb_tut_eb")}</div>
      <h2 class="onb-title">${t("onb_tut_title")}</h2>

        <div class="onb-feat"><span class="onb-feat-ic">${IC.layers}</span><div><b>${t("onb_feat_map_t")}</b><span>${t("onb_feat_map_d")}</span></div></div>

      </div>
      <div class="onb-note">${IC.check}<span>${t("onb_note")}</span></div>`;
    else if(s==="update") body=`<div class="onb-eyebrow">${t("onb_upd_eb")}</div>
      <h2 class="onb-title">${t("onb_upd_title")}</h2>
      <p class="onb-desc">${t("onb_upd_desc")}</p>
      <div class="onb-choices">
        <button class="onb-choice${autoChoice?" on":""}" data-c="auto"><span class="onb-choice-rd"></span><div><b>${t("onb_auto_t")}<span class="ch-rec">${t("onb_rec")}</span></b><span>${t("onb_auto_d")}</span></div></button>
        <button class="onb-choice${autoChoice?"":" on"}" data-c="manual"><span class="onb-choice-rd"></span><div><b>${t("onb_manual_t")}</b><span>${t("onb_manual_d")}</span></div></button>
      </div>`;
    else if(s==="access") body=`<div class="onb-eyebrow">${t("onb_acc_eb")}</div>
      <h2 class="onb-title">${t("onb_acc_title")}</h2>
      <p class="onb-desc">${t("onb_acc_desc")}</p>
      <button class="onb-btn ghost" id="onbFda" style="width:100%">${t("onb_acc_btn")}</button>`;
    else if(s==="done") body=`<div class="onb-eyebrow"><span class="cpit-dot"></span>${t("onb_done_eb")}</div>
      <div class="onb-hero">${ORBIT}</div>
      <h2 class="onb-title">${t("onb_done_title")}</h2>
      <p class="onb-desc">${t("onb_done_desc",DISKY.FREE_LIMIT)}</p>`;
    card.innerHTML = body + `<div class="onb-foot">${dots()}<div class="onb-actions">
      ${i>0?`<button class="onb-skip" id="onbBack">${t("onb_back")}</button>`:`<button class="onb-skip" id="onbSkip">${t("onb_skip")}</button>`}
      ${s==="done"?`<button class="onb-btn ghost" id="onbToOv">${t("onb_to_ov")}</button>`:""}
      <button class="onb-btn" id="onbNext">${i===0?t("onb_start"):(s==="done"?t("onb_scan_first"):t("onb_next"))}</button>

    const fda=card.querySelector("#onbFda"); if(fda) fda.onclick=()=>{ try{ window.diskyNative?.fullDiskAccess?.(); }catch(e){} };
    const back=card.querySelector("#onbBack"); if(back) back.onclick=()=>{ i--; draw(); };
    const skip=card.querySelector("#onbSkip"); if(skip) skip.onclick=()=>finish(false);
    const toOv=card.querySelector("#onbToOv"); if(toOv) toOv.onclick=()=>finish(false);
    card.querySelector("#onbNext").onclick=()=>{ if(s==="done") finish(true); else { i++; draw(); } };
  }
  draw();
}

let mapDriveId=null, mapStack=[], mapTree=null, _mapMount=null, mapDrill=null, mapDrillPath=null;

function buildTree(files, rootName){
  const root={name:rootName,size:0,children:{},isFile:false};
  for(const f of files){
    const parts=f.relPath.split("/");
    root.size+=f.size||0;
    let node=root;
    for(let i=0;i<parts.length;i++){
      const nm=parts[i];
      if(!node.children[nm]) node.children[nm]={name:nm,size:0,children:{},isFile:(i===parts.length-1)};
      node=node.children[nm];
      node.size+=f.size||0;
    }
  }
  (function fin(n){ n.childArr=Object.values(n.children).sort((a,b)=>b.size-a.size);
    n.children=null; n.childArr.forEach(fin); })(root);
  return root;
}

function arcPath(cx,cy,r0,r1,a0,a1){
  const P=(r,a)=>[cx+r*Math.cos(a), cy+r*Math.sin(a)];
  const large=(a1-a0)>Math.PI?1:0;
  const [x0,y0]=P(r1,a0),[x1,y1]=P(r1,a1),[x2,y2]=P(r0,a1),[x3,y3]=P(r0,a0);
  return `M${x0.toFixed(2)} ${y0.toFixed(2)} A${r1} ${r1} 0 ${large} 1 ${x1.toFixed(2)} ${y1.toFixed(2)} `+
         `L${x2.toFixed(2)} ${y2.toFixed(2)} A${r0} ${r0} 0 ${large} 0 ${x3.toFixed(2)} ${y3.toFixed(2)} Z`;
}

// Kern-Scan der internen Platte. HASH-FREI = schnell (die Pie-Chart braucht nur Größen+Pfade;
// Prüfsummen sind nur für Duplikat-Erkennung nötig → für die riesige Home-Platte bewusst aus).
// Aktualisiert eine bereits katalogisierte interne Platte in-place statt eine zweite anzulegen.
let _intScanPromise=null;
function runInternalScan(iv,{hash=false,onStatus}={}){
  if(_intScanPromise) return _intScanPromise;     // schon ein Scan unterwegs (z.B. Hintergrund) → denselben teilen
  if(!window.diskyNative?.scanList || !iv?.mount) return Promise.resolve(null);
  const say=t=>{ try{ onStatus&&onStatus(t); }catch(e){} };
  _intScanPromise=(async()=>{
    const name=iv.volumeName||"Macintosh HD";
    try{
      dockProgress("indeterminate"); say(t("iv_scanning"));
      const list=await window.diskyNative.scanList(iv.mount);
      say(t("iv_files_found",nloc(list.length)));
      const recs=[], toHash=[], byRel=new Map();
      for(const it of list){
        const project=it.relPath.includes("/")?it.relPath.split("/")[0]:"(Stammverzeichnis)";
        const rec={driveId:0,project,relPath:it.relPath,name:it.name,ext:it.ext,size:it.size,mtime:it.mtime,hash:null};
        if(hash && it.size>0) toHash.push(it.relPath);
        recs.push(rec); byRel.set(it.relPath,rec);
      }
      if(hash && toHash.length){ say(t("iv_checksums")); const hashes=await window.diskyNative.hashFiles(iv.mount,toHash); for(const rel in hashes){ const r=byRel.get(rel); if(r) r.hash=hashes[rel]; } }
      let bytes=0; for(const r of recs) bytes+=r.size||0;
      const drives=await getAll("drives");
      const existing=drives.find(d=>d.driveType==="mac"||d.volumeName===name||d.label===name);
      let id;
      if(existing){ id=existing.id; await updateDrive(id,{capacityBytes:iv.totalBytes||existing.capacityBytes||null, fileCount:recs.length, bytes, scannedAt:Date.now()}); }
      else { id=await addDrive({label:name, volumeName:name, model:iv.model||"Apple Interne SSD", capacityBytes:iv.totalBytes||null, driveType:"mac", fileCount:recs.length, bytes, scannedAt:Date.now()}); }
      recs.forEach(r=>r.driveId=id);
      await replaceFiles(id, recs);
      invalidateFiles(); dockProgress(null); scheduleAutoBackup();
      try{ renderSidebarDrives(); }catch(e){}
      return id;
    }catch(e){ dockProgress(null); say(t("scan_failed",(e&&e.message||e))); throw e; }
  })();
  _intScanPromise.finally(()=>{ _intScanPromise=null; });
  return _intScanPromise;
}

/* ── Aufräum-Assistent: erkennt lokal entbehrliche Dateien (Cache/Proxy/Duplikate) ── */
const RE_PROXY=/(^|\/)prox(y|ies)(\/|$)|optimized ?media|transcoded|_proxy|(^|\/)previews?(\/|$)/i;
const RE_CACHE=/media ?cache|peak files|cache files|(^|\/)cache(\/|$)|diskcache|auto-?save|adobe\/common|common\/media|render files|\.(pek|cfa|ims|pkf|tmp|mpgindex)$/i;
let _clCats={}, _clMount=null, _clDriveId=null, _clFiles=null;
// CL_TITLES werden über den t()-Mechanismus befüllt — statische Map nur als Fallback
const CL_TITLES_KEY={cache:"cl_cache",proxy:"cl_proxy",dup:"cl_dup"};
function clTitle(k){ return t(CL_TITLES_KEY[k])||({cache:"Cache & temp. files",proxy:"Proxies & Preview Renders",dup:"Duplicates (copy elsewhere)"}[k]||k); }
async function trashCategory(key){
  const list=(_clCats[key]||[]); const mount=_clMount; if(!list.length||!mount||!window.diskyNative?.trash) return;
  let bytes=0; list.forEach(f=>bytes+=f.size||0);
  const safeNote = key==="dup" ? t("cl_safe_note") : "";
  if(!confirm(t("cl_trash1", nloc(list.length), human(bytes), safeNote))) return;
  if(!confirm(t("cl_trash2", nloc(list.length), human(bytes)))) return;
  const base=mount.replace(/\/$/,""); const pathOf=f=>base+"/"+f.relPath;
  let res; try{ res=await window.diskyNative.trash(list.map(pathOf)); }catch(e){ alert(t("cl_trash_fail",e.message)); return; }
  const okSet=new Set(res.ok||[]);
  const delIds=list.filter(f=>okSet.has(pathOf(f))).map(f=>f.id).filter(id=>id!=null);
  if(delIds.length){ await new Promise(r=>{ const t=tx(["files"],"readwrite"); const s=t.objectStore("files"); for(const id of delIds) s.delete(id); t.oncomplete=r; t.onerror=r; }); }
  invalidateFiles();
  const remaining=await getAll("files","driveId",_clDriveId);
  let b=0; remaining.forEach(f=>b+=f.size||0);
  await updateDrive(_clDriveId,{fileCount:remaining.length,bytes:b});
  renderSidebarDrives(); buildAndDraw();
  const failed=(res.failed||[]).length;
  if(failed) setTimeout(()=>alert(t("cl_trashed_some", delIds.length, failed)),120);
}
async function renderCleanup(files){
  const el=document.getElementById("cleanup"); if(!el) return;
  _clFiles=files;
  const all=await allFiles();
  const hc=new Map(); for(const f of all){ if(f.hash&&(f.size||0)>=1048576){ const k=fkey(f); hc.set(k,(hc.get(k)||0)+1); } }
  const bk={cache:{b:0,n:0,ex:"",exs:0,files:[]},proxy:{b:0,n:0,ex:"",exs:0,files:[]},dup:{b:0,n:0,ex:"",exs:0,files:[]}};
  for(const f of files){
    const p=(f.relPath||""), ext=f.ext||"", sz=f.size||0;
    let key=null;
    if(RE_PROXY.test(p)) key="proxy";
    else if(RE_CACHE.test(p)||RE_CACHE.test(ext)) key="cache";
    else if(f.hash && sz>=1048576 && hc.get(fkey(f))>1) key="dup";
    if(key){ const b=bk[key]; b.b+=sz; b.n++; b.files.push(f); if(sz>b.exs){b.exs=sz;b.ex=f.name;} }
  }
  const cards=[
    {key:"cache",...bk.cache, title:t("cl_cache"), hint:t("cl_cache_hint")},
    {key:"proxy",...bk.proxy, title:t("cl_proxy"), hint:t("cl_proxy_hint")},
    {key:"dup",...bk.dup,   title:t("cl_dup"), hint:t("cl_dup_hint")},
  ].filter(c=>c.n>0).sort((a,b)=>b.b-a.b);
  if(!cards.length){
    el.innerHTML=`<div class="cleanup ok"><span class="cl-ic">${IC.check}</span>
      <div><b>${t("cl_tidy")}</b><div class="muted" style="font-size:12.5px">${t("cl_tidy_sub")}</div></div></div>`;
    return;
  }
  // Ist die aktuelle Platte angeschlossen? Dann ist „Aufräumen" (Papierkorb) möglich.
  let mount=null;
  if(window.diskyNative?.trash){ try{ const drv=(await getAll("drives")).find(d=>d.id===mapDriveId);
    const vols=await getVolumes(); const v=vols.find(x=>x.volumeName===drv?.volumeName||x.name===drv?.volumeName||x.volumeName===drv?.label||x.name===drv?.label);
    if(v) mount=v.mount; }catch(e){} }
  _clCats={cache:bk.cache.files,proxy:bk.proxy.files,dup:bk.dup.files}; _clMount=mount; _clDriveId=mapDriveId;
  const total=cards.reduce((s,c)=>s+c.b,0);
  const driveBytes=files.reduce((s,f)=>s+(f.size||0),0)||1;
  const junkFrac=Math.max(0.1,Math.min(0.4,total/driveBytes));
  el.innerHTML=`<div class="cleanup">
    <div class="cl-main">
      <div class="cl-head"><span class="cl-ic">${IC.spark}</span>
        <div><b>${t("cl_assistant")}</b><span class="cl-tot">${t("cl_freeable",human(total))}</span>
          <div class="muted" style="font-size:12px;margin-top:1px">${mount?t("cl_tip_mount"):t("cl_tip_nomount")}</div></div></div>
      <div class="cl-grid">${cards.map(c=>`<div class="cl-card">
        <div class="cl-sz">${human(c.b)}</div>
        <div class="cl-ti">${esc(c.title)}</div>
        <div class="cl-sub">${t("cl_files_eg",nloc(c.n),c.ex?esc(c.ex):"")}</div>
        <div class="cl-hint">${esc(c.hint)}</div>
        ${mount?`<button class="cl-clean" data-cat="${c.key}">${t("cl_clean_btn")}</button>`:""}</div>`).join("")}</div>
    </div>
    <div class="cl-robot"><span class="cl-robot-glow"></span><div class="asst-robot" id="cleanupRobot"></div></div>
  </div>`;
  loadSplineRobot(document.getElementById("cleanupRobot"));   // unser Roboter im Aufräum-Assistent
  el.querySelectorAll(".cl-clean").forEach(b=>b.onclick=()=>renderCleanList(b.dataset.cat));
}

/* Geordnete Liste der entbehrlichen Dateien — nach Ordner gruppiert, im Finder zeigbar */
async function renderCleanList(key){
  const el=document.getElementById("cleanup"); if(!el) return;
  if(_defragStop){ _defragStop(); _defragStop=null; }
  const list=(_clCats[key]||[]); if(!list.length){ renderCleanup(_clFiles); return; }
  const mount=_clMount, base=mount?mount.replace(/\/$/,""):null;
  const total=list.reduce((s,f)=>s+(f.size||0),0);
  // Bei Duplikaten: ALLE anderen Fundorte (gleiche Prüfsumme + Größe) ermitteln — zur klaren Nachverfolgung
  let byKey=new Map(), labelOf=()=>"?";
  if(key==="dup"){
    const all=await allFiles(); const drives=await getAll("drives");
    const dById=Object.fromEntries(drives.map(d=>[d.id,d.label]));
    labelOf=id=>dById[id]||"?";
    for(const f of all){ if(!f.hash||(f.size||0)<1048576) continue; const k=fkey(f); let a=byKey.get(k); if(!a){a=[];byKey.set(k,a);} a.push(f); }
  }
  const dirOf=f=>{ const p=f.relPath||""; const d=p.slice(0,p.length-(f.name||"").length).replace(/\/$/,""); return d||"/"; };
  // nach (Top-)Ordner gruppieren, größte zuerst
  const groups=new Map();
  for(const f of list){ const k=topFolder(f.relPath)||t("c_root"); let g=groups.get(k); if(!g){g={name:k,files:[],b:0};groups.set(k,g);} g.files.push(f); g.b+=f.size||0; }
  const folders=[...groups.values()].sort((a,b)=>b.b-a.b);

  const FL=300, IL=200;
  const body=folders.slice(0,FL).map((g,gi)=>{

          dupLine=`<div class="cf-dups"><span class="cf-also">${t("cl_also_on")}</span>${locs}${more}</div>`;
        }

          <span class="cf-ic">${IC.file}</span>
          <span class="cf-name">${esc(f.name)}</span>
          <span class="cf-path">${esc(dir)}</span>
          <span class="cf-sz">${human(f.size||0)}</span>

        ${dupLine}</div>`;
    }).join("") + (g.files.length>IL?`<div class="muted" style="padding:6px 14px;font-size:11.5px">${t("dup_more_files",nloc(g.files.length-IL))}</div>`:"");
    return `<details class="dupf"${gi===0?" open":""}>
      <summary><span class="df-ic">${IC.folder}</span><span class="df-name">${esc(g.name)}</span>
        <span class="df-spacer"></span>
        <span class="df-meta"><b>${human(g.b)}</b> · ${t("dc_files",nloc(g.files.length))}</span></summary>
      <div class="df-files">${rows}</div></details>`;
  }).join("");
  el.innerHTML=`<div class="cl-list">
    <div class="cll-head">
      <button class="cll-back">${t("cl_back")}</button>
      <div class="cll-title">${esc(t("cl_"+key)||t("cl_clean_btn"))}</div>
      <div class="cll-sub">${t("dc_files",nloc(list.length))} · ${human(total)}${key==="dup"?` · ${t("cl_dup_note")}`:""}${base?t("cl_list_tap"):t("cl_list_noconn")}</div>
      ${base?`<button class="cll-clean" data-cat="${key}">${t("cl_clean_all")}</button>`:""}
    </div>
    ${folders.length>FL?`<div class="muted" style="padding:0 0 10px;font-size:11.5px">${t("cl_show_largest",FL)}</div>`:""}
    ${body}</div>`;
  el.querySelector(".cll-back").onclick=()=>renderCleanup(_clFiles);
  const cb=el.querySelector(".cll-clean"); if(cb) cb.onclick=()=>trashCategory(key);
  el.querySelectorAll(".cf-row[data-rel]").forEach(r=>r.onclick=()=>{ if(base&&window.diskyNative?.reveal) window.diskyNative.reveal(base+"/"+r.dataset.rel); });
}

function drawSun(){
  const focus=mapStack[mapStack.length-1];
  const svg=document.getElementById("sun"); if(!svg) return;
  const CX=260,CY=260,R0=66,RING=40,MAXRING=4,MINANG=0.013,OFF=-Math.PI/2;
  const paths=[];
  function layout(node,a0,a1,depth,hue){
    if(depth>0 && depth<=MAXRING && (a1-a0)>=MINANG){
      const r0=R0+(depth-1)*RING, r1=r0+RING;
      const sat=Math.max(48,66-depth*3), li=Math.min(67,48+depth*5);
      paths.push({d:arcPath(CX,CY,r0,r1,a0+OFF,a1+OFF),col:`hsl(${hue} ${sat}% ${li}%)`,node});
    }
    if(depth>=MAXRING) return;
    const tot=node.size||1, n=node.childArr.length; let a=a0;
    node.childArr.forEach((c,idx)=>{
      const span=(a1-a0)*(c.size/tot);
      if(span>=MINANG) layout(c,a,a+span,depth+1, depth===0?SUN_HUES[idx%SUN_HUES.length]:hue);
      a+=span;
    });
  }
  layout(focus,0,Math.PI*2,0,0);
  const up=mapStack.length>1;
  svg.innerHTML=`<g id="sungrp">`+
    paths.map((p,i)=>`<path d="${p.d}" fill="${p.col}" data-i="${i}" class="seg"/>`).join("")+
    `<circle cx="${CX}" cy="${CY}" r="${R0-4}" class="upbtn" fill="${up?'rgba(255,255,255,.03)':'transparent'}" style="cursor:${up?'pointer':'default'}"/>`+
    `</g>`;
  updateCenter(focus);
  drawLegend(focus);
  drawCrumbs();
  svg.querySelectorAll(".seg").forEach(el=>{
    const p=paths[+el.dataset.i];
    el.onmouseenter=()=>{ updateCenter(p.node,focus); el.classList.add("hot"); };
    el.onmouseleave=()=>{ updateCenter(focus); el.classList.remove("hot"); };
    el.onclick=()=>{ if(!p.node.isFile && p.node.childArr.length){ mapStack.push(p.node); drawSun(); } };
  });
  const upc=svg.querySelector(".upbtn");
  if(up) upc.onclick=()=>{ mapStack.pop(); drawSun(); };
}

function updateCenter(node,focus){
  const c=document.getElementById("suncenter"); if(!c) return;
  const f=focus||node;
  const pct=f.size?Math.round(100*node.size/f.size):100;
  c.innerHTML=`<div class="cname">${esc(node.name)}</div>
    <div class="csize">${human(node.size)}</div>
    <div class="cpct">${node===f?(node===mapTree?(lang==="en"?"total":"gesamt"):"100%"):pct+"%"}</div>`;
}

function drawLegend(focus){
  const lg=document.getElementById("legend"); if(!lg) return;
  const n=focus.childArr.length, items=focus.childArr.slice(0,16), rest=focus.childArr.slice(16);
  const restSize=rest.reduce((s,c)=>s+c.size,0);
  let html=items.map((c,idx)=>{
    const hue=SUN_HUES[idx%SUN_HUES.length];
    const pct=focus.size?Math.round(100*c.size/focus.size):0;
    const nav=(!c.isFile && c.childArr.length), rev=(c.isFile && _mapMount);
    const cls=(c.isFile?'file ':'')+(nav?'nav ':'')+(rev?'rev ':'');
    return `<div class="leg ${cls}" data-name="${esc(c.name)}" style="animation-delay:${(idx*0.028).toFixed(3)}s"${rev?` title="${t("cf_reveal_t")}"`:''}>
      <span class="ldot" style="background:hsl(${hue} 60% 56%)"></span>
      <span class="lname">${c.isFile?IC.file:IC.folder}${esc(c.name)}</span>
      ${rev?`<span class="lrev">${IC.reveal}</span>`:""}
      <span class="lpct">${pct}%</span><span class="lsize">${human(c.size)}</span></div>`;
  }).join("");
  if(rest.length) html+=`<div class="leg muted"><span class="ldot" style="background:#4a5160"></span>
    <span class="lname">${t("leg_smaller",rest.length)}</span>
    <span class="lpct">${focus.size?Math.round(100*restSize/focus.size):0}%</span>
    <span class="lsize">${human(restSize)}</span></div>`;
  lg.innerHTML=`<div class="legtitle">${t("leg_content_of",esc(focus.name))}</div>`+
    (focus.childArr.length?html:`<div class="muted" style="padding:8px">${t("leg_empty")}</div>`);
  const relOf=child=>{ const prefix=mapStack.slice(1).map(n=>n.name).join("/"); return prefix?prefix+"/"+child.name:child.name; };
  const fullOf=child=> _mapMount ? _mapMount.replace(/\/$/,"")+"/"+relOf(child) : null;
  const legFlash=(el,cls)=>{ el.classList.remove("lg-ok","lg-no"); void el.offsetWidth; el.classList.add(cls); setTimeout(()=>el.classList.remove(cls),760); };
  lg.querySelectorAll(".leg[data-name]").forEach(el=>{
    const child=focus.childArr.find(c=>c.name===el.dataset.name);
    el.onclick=()=>{ if(!child) return;
      if(!child.isFile && child.childArr.length){ mapStack.push(child); drawSun(); return; }
      if(child.isFile){
        if(_mapMount){ legFlash(el,"lg-ok"); try{ window.diskyNative&&window.diskyNative.reveal(fullOf(child)); }catch(e){} }
        else { legFlash(el,"lg-no"); toast(t("map_need_mount")); }
      }
    };
    el.oncontextmenu=ev=>{ if(!child) return; const isFolder=!child.isFile && child.childArr.length, full=fullOf(child), rel=relOf(child);
      const items=[];
      if(isFolder){ items.push({label:t("ctx_open_map"),ic:IC.layers,on:()=>{ mapStack.push(child); drawSun(); }});
        items.push(full?{label:t("ctx_reveal_folder"),ic:IC.reveal,on:()=>window.diskyNative.reveal(full)}:{label:t("ctx_offline"),ic:IC.reveal,disabled:true}); }
      else { items.push(full?{label:t("ctx_reveal_file"),ic:IC.reveal,on:()=>window.diskyNative.reveal(full)}:{label:t("ctx_offline"),ic:IC.reveal,disabled:true}); }
      items.push("sep");
      items.push({label:t("ctx_copy_path"),ic:IC.copy,on:()=>copyText(full||rel)});
      items.push({label:t("ctx_copy_name"),ic:IC.copy,on:()=>copyText(child.name)});
      showCtx(ev, items, child.name);
    };
  });
}

function drawCrumbs(){
  const el=document.getElementById("crumbs"); if(!el) return;
  el.innerHTML=mapStack.map((n,i)=>`<span class="crumb" data-i="${i}" title="${esc(n.name)}">${esc(n.name)}</span>`)

function _btTicks(cx,cy,r,n,len,col,wbig){let s="";for(let i=0;i<n;i++){const a=(i/n)*Math.PI*2;const x1=cx+Math.cos(a)*r,y1=cy+Math.sin(a)*r,x2=cx+Math.cos(a)*(r-len),y2=cy+Math.sin(a)*(r-len);const big=i%5===0;s+=`<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="${col}" stroke-width="${big?(wbig||2):1}" opacity="${big?.95:.4}"/>`;}return s;}
function _btField(n){let s="";for(let i=0;i<n;i++){const x=(7+(i*53)%86),y=(6+(i*37)%88),d=(i%9)*0.18;s+=`<i style="left:${x}%;top:${y}%;animation-delay:${d}s"></i>`;}return s;}

  // Sicherheitsnetz: wenn es heute noch keine Sicherung gibt, einmal beim Start anlegen
  setTimeout(()=>{ try{ if(Date.now()-_bkLast > 12*60*60*1000) autoBackupCatalog(true); }catch(e){} }, 6000);
  // Live: angeschlossene Laufwerke beobachten + (wenn aktiv) automatisch aktuell halten
  if(window.diskyNative?.onVolumes){
    window.diskyNative.onVolumes(vols=>{
      _volCache=vols; _volTs=_now();          // Cache vom Poll frisch halten → getVolumes() vermeidet eigene diskutil-Aufrufe
      if(view==="overview") renderConnected();
      renderSidebarDrives();                   // Status-Punkte (verbunden/im Schrank) live aktualisieren
      renderConstellationOnlineRefresh();
      if(autoScanEnabled()){ for(const v of vols){ if(!v.internal) queueAutoScan(v); } }
    });
  }
  // Befehle aus der macOS-Menüleiste
  if(window.diskyNative?.onMenu){
    window.diskyNative.onMenu(a=>{
      if(a==="scan"){ if(view!=="overview") setView("overview"); setTimeout(startScan,90); }
      else if(a==="export"){ exportCatalog(); }
      else if(a==="ai"){ if(view!=="search") setView("search"); setTimeout(()=>buildAiIndex(),90); }
      else if(a==="license"){ showUpgrade(); }
      else if(a&&a.startsWith("view:")){ setView(a.slice(5)); }
    });
  }
})();
// Constellation „online"-Punkte aktualisieren, ohne neu zu scannen
async function renderConstellationOnlineRefresh(){
  const stage=document.getElementById("constStage");
  if(view!=="overview" || !stage) return;
  // NUR online/offline-Punkte der vorhandenen Knoten umschalten — KEIN Neuaufbau (sonst flackert/„lädt" alles neu).
  let _on={uuids:new Set(),names:new Set()};
  if(window.diskyNative?.listVolumes){ try{ const vols=await getVolumes(); _on=buildOnline(vols); }catch(e){} }
  stage.querySelectorAll(".cnode").forEach(b=>{
    if(b.classList.contains("cint")) return;              // interne Platte gilt immer als online
    const uuid=b.getAttribute("data-uuid")||"";
    const lbl=b.querySelector(".cn")?.textContent||"";
    const on = uuid ? _on.uuids.has(uuid) : _on.names.has(lbl);   // UUID bevorzugt (kein Namens-Fehlalarm)
    b.classList.toggle("off", !on);
    let pin=b.querySelector(".pin");
    if(on && !pin){ pin=document.createElement("span"); pin.className="pin"; b.insertBefore(pin, b.firstChild); }
    else if(!on && pin){ pin.remove(); }
  });
}
</script>

<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Disky · Hero — Scan → Datensog → App</title>
<style>
:root{--bg:#08090c;--ink:#f4f7fb;--mut:rgba(244,247,251,.6);--mut2:rgba(244,247,251,.42);
 --acc:#4a9eff;--acc2:#37cfe0;--line:rgba(255,255,255,.09);--mono:"SF Mono",ui-monospace,Menlo,monospace;
 --disp:-apple-system,"SF Pro Display","Helvetica Neue",sans-serif}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--disp);overflow-x:hidden;-webkit-font-smoothing:antialiased}
.note{position:fixed;left:14px;top:12px;z-index:80;font-family:var(--mono);font-size:11px;color:var(--mut2);background:rgba(8,9,12,.6);padding:6px 10px;border-radius:8px;border:1px solid var(--line)}
.note b{color:var(--acc)}
.rail{position:relative;height:280vh}
.sticky{position:sticky;top:0;height:100vh;overflow:hidden;perspective:1500px}
#stars{position:absolute;inset:0;z-index:0;pointer-events:none;-webkit-mask-image:radial-gradient(ellipse 70% 70% at center,transparent 8%,#000 60%);mask-image:radial-gradient(ellipse 70% 70% at center,transparent 8%,#000 60%)}
.bggrid{position:absolute;inset:0;z-index:0;pointer-events:none;opacity:.5;background-size:60px 60px;
 background-image:linear-gradient(to right,rgba(244,247,251,.05) 1px,transparent 1px),linear-gradient(to bottom,rgba(244,247,251,.05) 1px,transparent 1px);
 -webkit-mask-image:radial-gradient(ellipse at center,#000 0%,transparent 70%);mask-image:radial-gradient(ellipse at center,#000 0%,transparent 70%)}
.glow{position:absolute;left:50%;top:50%;width:1000px;height:680px;transform:translate(-50%,-50%);z-index:0;pointer-events:none;
 background:radial-gradient(closest-side,rgba(45,98,200,.2),transparent 72%)}
.floor{position:absolute;left:50%;bottom:-40px;width:min(1040px,94vw);height:250px;transform:translateX(-50%);z-index:1;pointer-events:none;
 background:radial-gradient(ellipse 46% 50% at 50% 60%,rgba(0,0,0,.72),rgba(0,0,0,.34) 45%,transparent 72%);filter:blur(26px)}

/* zentrale Headline */
.head{position:absolute;inset:0;z-index:3;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:0 24px 250px;will-change:transform,filter,opacity}
.head .eb{font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:var(--acc);font-weight:600;margin-bottom:22px;opacity:0;animation:ebIn 1.2s .15s ease both}
.head h1{margin:0;line-height:.96;font-weight:800;letter-spacing:-.04em;font-size:clamp(50px,8.2vw,98px)}
.t3d{display:block;color:var(--ink);text-shadow:0 10px 30px rgba(244,247,251,.16),0 2px 4px rgba(244,247,251,.1);
 opacity:0;animation:txtReveal 1.7s .25s cubic-bezier(.16,1,.3,1) both}
.silver{display:block;-webkit-text-fill-color:transparent;background:linear-gradient(180deg,#fff 0%,rgba(255,255,255,.42) 100%);
 -webkit-background-clip:text;background-clip:text;transform:translateZ(0);
 filter:drop-shadow(0 10px 20px rgba(120,160,220,.18)) drop-shadow(0 2px 4px rgba(0,0,0,.45));
 clip-path:inset(0 100% 0 0);animation:txtWipe 1.4s .55s cubic-bezier(.7,0,.2,1) both}
.head .sub{margin:28px auto 0;max-width:560px;font-size:18px;color:var(--mut);opacity:0;animation:ebIn 1.2s .9s ease both}
@keyframes ebIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@keyframes txtReveal{from{opacity:0;transform:translateY(54px) scale(.86);filter:blur(18px)}to{opacity:1;transform:none;filter:blur(0)}}
@keyframes txtWipe{from{clip-path:inset(0 100% 0 0)}to{clip-path:inset(0 0 0 0)}}

/* Fächer — GROSS, ragt unten aus dem Bild */
.stage{position:absolute;inset:0;z-index:2}
.fan{position:absolute;left:50%;bottom:-118px;width:0;height:0;transform:scale(var(--fs,1));transform-origin:50% 100%}
.fcard{position:absolute;left:50%;bottom:0;height:280px;transform-origin:50% 86%;will-change:transform,opacity;cursor:pointer}
.fan.resting .fcard{transition:transform .2s cubic-bezier(.2,.8,.3,1),filter .2s ease}
.fcard .drv{height:100%;width:auto;display:block;filter:drop-shadow(0 30px 44px rgba(0,0,0,.7))}

/* DIE T9 — ein Element, immer opak, dreht Hoch→Quer, wird gescannt */
.hero{position:absolute;left:50%;top:50%;width:520px;z-index:11;pointer-events:none;will-change:transform}
.hero.resting{transition:transform .2s cubic-bezier(.2,.8,.3,1),filter .2s ease}
.hero .dimg{display:block;width:100%;height:auto}
.hero .front{filter:drop-shadow(0 34px 56px rgba(0,0,0,.7));will-change:mask}
.hero .xray{position:absolute;inset:0;mix-blend-mode:screen;opacity:0;will-change:mask,opacity}
.scanline{position:absolute;top:0;bottom:0;left:0;width:0;z-index:6;opacity:0;transition:opacity .15s}
.scanline.on{opacity:1}
.scanline .bm{position:absolute;top:-30%;bottom:-30%;left:-1.4px;width:2.8px;border-radius:3px;
 background:linear-gradient(180deg,transparent 0%,rgba(205,238,255,.5) 16%,#cdeeff 40%,#37cfe0 50%,#cdeeff 60%,rgba(205,238,255,.5) 84%,transparent 100%);
 box-shadow:0 0 30px 10px rgba(74,158,255,.72)}
.scanline .bm::before{content:"";position:absolute;top:0;bottom:0;left:-34px;width:68px;background:linear-gradient(90deg,transparent,rgba(74,158,255,.22),transparent);
 -webkit-mask-image:linear-gradient(180deg,transparent 0%,#000 24%,#000 76%,transparent 100%);mask-image:linear-gradient(180deg,transparent 0%,#000 24%,#000 76%,transparent 100%)}
/* Energie-Band: nur Gradient (kein teures backdrop-filter) */
.scanline .warp{position:absolute;top:-16%;bottom:-16%;left:50%;width:70px;transform:translateX(-50%);pointer-events:none;mix-blend-mode:screen;
 background:linear-gradient(90deg,transparent,rgba(120,180,255,.16) 42%,rgba(150,235,255,.34) 50%,rgba(120,180,255,.16) 58%,transparent);
 -webkit-mask-image:linear-gradient(180deg,transparent,#000 14%,#000 86%,transparent);mask-image:linear-gradient(180deg,transparent,#000 14%,#000 86%,transparent)}
.scanline.appear .bm{animation:bmAppear .62s cubic-bezier(.2,.85,.25,1) both}
@keyframes bmAppear{0%{clip-path:inset(47% 0 47% 0);opacity:.12;filter:brightness(2.4)}55%{opacity:1}100%{clip-path:inset(0 0 0 0);opacity:1;filter:brightness(1)}}

/* epische Beleuchtung hinter der gescannten Platte */
.bloom{position:absolute;left:50%;top:50%;width:1150px;height:1150px;transform:translate(-50%,-50%);z-index:7;pointer-events:none;opacity:0;mix-blend-mode:screen;will-change:opacity,transform;
 background:radial-gradient(circle,rgba(255,255,255,.9) 0%,rgba(130,190,255,.6) 18%,rgba(74,158,255,.32) 36%,transparent 62%)}
.shock{position:absolute;left:50%;top:50%;width:500px;height:500px;transform:translate(-50%,-50%);z-index:8;pointer-events:none;opacity:0;border-radius:50%;mix-blend-mode:screen;will-change:opacity,transform;
 border:3px solid rgba(190,224,255,.95);box-shadow:0 0 60px rgba(110,180,255,.7),inset 0 0 50px rgba(74,158,255,.35)}
/* sanfter „Datensog"-Funnel über dem MacBook (statt Partikel-Trails) */
.funnel{position:absolute;left:50%;bottom:1%;width:min(440px,62vw);height:48vh;transform:translateX(-50%);z-index:9;pointer-events:none;opacity:0;mix-blend-mode:screen;will-change:opacity;
 background:radial-gradient(ellipse 48% 66% at 50% 100%,rgba(95,170,255,.3),rgba(74,158,255,.1) 45%,transparent 72%);
 -webkit-mask-image:linear-gradient(180deg,transparent,#000 58%);mask-image:linear-gradient(180deg,transparent,#000 58%)}

.scrollhint{position:fixed;left:50%;bottom:34px;transform:translateX(-50%);z-index:70;color:var(--mut2);font-size:12px;animation:bob 1.8s ease-in-out infinite;transition:opacity .3s}
@keyframes bob{0%,100%{transform:translate(-50%,0)}50%{transform:translate(-50%,7px)}}
.cap{position:fixed;left:50%;bottom:14px;transform:translateX(-50%);z-index:70;font-family:var(--mono);font-size:11px;color:var(--mut2)}

/* Datenpunkte (kein backdrop-filter → günstig in Bewegung) */
.chips{position:absolute;inset:0;z-index:12;pointer-events:none}
.chip{position:absolute;display:inline-flex;align-items:center;gap:9px;padding:8px 14px;border-radius:12px;white-space:nowrap;color:#e6f0ff;
 background:linear-gradient(135deg,rgba(28,36,52,.86),rgba(16,22,34,.82));
 box-shadow:inset 0 1px 0 rgba(255,255,255,.14),0 16px 34px -14px rgba(0,0,0,.8),0 0 20px -10px rgba(74,158,255,.5);opacity:0;will-change:transform,opacity}
.chip::before{content:"";position:absolute;inset:0;border-radius:inherit;padding:1px;pointer-events:none;
 background:linear-gradient(135deg,rgba(255,255,255,.4),rgba(255,255,255,.05) 45%,rgba(74,158,255,.42));
 -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude}
.chip .d{width:7px;height:7px;border-radius:2px;flex:0 0 auto}
.chip .mono{font-family:var(--mono);font-size:12.5px;font-weight:600;letter-spacing:-.02em}
.chip .lbl{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--mut2);font-weight:700}
.chip.proj .d{background:#4a9eff;box-shadow:0 0 9px #4a9eff}
.chip.file .d{background:#37cfe0;box-shadow:0 0 9px #37cfe0}
.chip.geo  .d{background:#43d98a;box-shadow:0 0 9px #43d98a}
.chip.time .d{background:#f2b134;box-shadow:0 0 9px #f2b134}
.chip.size .d{background:#b39dff;box-shadow:0 0 9px #b39dff}

/* MacBook — App = Ziel des Datensogs */
.macbook{position:absolute;left:50%;bottom:1%;transform:translateX(-50%);z-index:4;width:min(720px,84vw);opacity:0;will-change:transform,opacity}
.mb-screen{position:relative;border-radius:16px;padding:10px;background:linear-gradient(160deg,#181a1f,#0a0b0e);box-shadow:0 0 0 1px rgba(255,255,255,.06),0 50px 110px rgba(0,0,0,.75),inset 0 1px 0 rgba(255,255,255,.08)}
.mb-screen::before{content:"";position:absolute;top:10px;left:50%;transform:translateX(-50%);width:90px;height:14px;background:#000;border-radius:0 0 9px 9px;z-index:3}
.mb-app{position:relative;border-radius:8px;overflow:hidden;background:#06080c}
.mb-app img{display:block;width:100%}
.mb-app .ingest{position:absolute;inset:0;pointer-events:none;mix-blend-mode:screen;opacity:0;background:radial-gradient(ellipse 60% 50% at 50% 42%,rgba(120,190,255,.5),transparent 70%)}
.mb-app .glare{position:absolute;inset:0;background:linear-gradient(118deg,rgba(255,255,255,.08),transparent 42%);pointer-events:none;z-index:2}
.mb-body{position:absolute;left:50%;top:calc(100% - 2px);transform:translateX(-50%);width:116%;height:120px;
 background:linear-gradient(180deg,#14161b,#0a0b0e 60%,#08090c);clip-path:polygon(7% 0,93% 0,99% 55%,50% 100%,1% 55%);
 -webkit-mask-image:linear-gradient(180deg,#000 0%,transparent 80%);mask-image:linear-gradient(180deg,#000 0%,transparent 80%)}
@media(prefers-reduced-motion:reduce){.t3d,.silver,.eb,.sub{animation:none!important;opacity:1!important;clip-path:none!important}}
</style></head>
<body>
<div class="note">PROTOTYP · Scan extrahiert Daten · sanfter Sog in die App · <b>scrollen</b></div>

<div class="rail" id="rail">
  <div class="sticky">
    <canvas id="stars"></canvas>
    <span class="glow"></span><div class="bggrid"></div>
    <div class="floor" id="floor"></div>
    <div class="head" id="head">
      <div class="eb">Drive catalog for Mac</div>
      <h1><span class="t3d">Five drives.</span><span class="silver">Or five seconds.</span></h1>
      <p class="sub">Jede Platte einmal indexieren — dann findest du alles, ohne eine einzige anzustecken.</p>
    </div>

    <div class="stage" id="stage"><div class="fan" id="fan">
      <div class="fcard" data-i="-2"><img class="drv" src="../assets/drives/lacie-rugged.webp" alt="LaCie Rugged" decoding="async"></div>
      <div class="fcard" data-i="-1"><img class="drv" src="../assets/drives/gdrive.webp" alt="G-Drive ArmorATD" decoding="async"></div>
      <div class="fcard" data-i="1"><img class="drv" src="../assets/drives/t5.webp" alt="Samsung T5" decoding="async"></div>
      <div class="fcard" data-i="2"><img class="drv" src="../assets/drives/lacie-silver.webp" alt="LaCie Mobile" decoding="async"></div>
    </div></div>

    <div class="bloom" id="bloom"></div>
    <div class="shock" id="shock"></div>
    <div class="funnel" id="funnel"></div>

    <!-- DIE T9 — ein Element, dreht Hoch→Quer, X-ray-Scan -->
    <div class="hero" id="hero">
      <img class="dimg front" src="../assets/drives/t9-land.webp" alt="Samsung T9" decoding="async">
      <img class="dimg xray" src="../assets/drives/t9xray-land.webp" alt="" decoding="async">
      <div class="scanline" id="scanline"><i class="bm"></i><div class="warp"></div></div>
    </div>

    <!-- Datenpunkte (per JS gefüllt) -->
    <div class="chips" id="chips"></div>

    <!-- MacBook: App = Ziel des Datensogs -->
    <div class="macbook" id="macbook">
      <div class="mb-screen"><div class="mb-app"><img src="../assets/screen-overview.webp" alt="Disky" loading="lazy"><span class="ingest" id="ingest"></span><span class="glare"></span></div></div>
      <div class="mb-body"></div>
    </div>
  </div>
</div>
<div class="scrollhint" id="hint">↓ scrollen</div>
<div class="cap">Scan → Datenextraktion → sanfter Sog → App</div>
<script>
const rail=document.getElementById('rail'), cards=[...document.querySelectorAll('.fcard')], head=document.getElementById('head'), hint=document.getElementById('hint');
const fan=document.getElementById('fan'), floor=document.getElementById('floor'), hero=document.getElementById('hero');
const xray=hero.querySelector('.xray'), front=hero.querySelector('.front'), scanline=document.getElementById('scanline');
const bloom=document.getElementById('bloom'), shock=document.getElementById('shock'), funnel=document.getElementById('funnel'), macbook=document.getElementById('macbook'), ingest=document.getElementById('ingest');
const clamp=(v,a=0,b=1)=>Math.max(a,Math.min(b,v));
const lerp=(a,b,t)=>a+(b-a)*t;
const ease=t=>1-Math.pow(1-t,3);
const easeIO=t=>t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;

/* ---------- Datenpunkte ---------- */
const CHIP=[
 {t:"Client_A_2024_Rebrand",l:"Projekt",c:"proj",x:20,y:19},
 {t:"final_master.mp4",l:"Datei",c:"file",x:77,y:14},
 {t:"47.81°N, 11.75°E",l:"GPS",c:"geo",x:13,y:40},
 {t:"2024-08-12 14:32",l:"Zeit",c:"time",x:85,y:36},
 {t:"drone_4k_0423.mov",l:"Datei",c:"file",x:23,y:63},
 {t:"Documentary_Project",l:"Projekt",c:"proj",x:79,y:60},
 {t:"Tegernsee, DE",l:"GPS",c:"geo",x:40,y:11},
 {t:"interview_A.wav",l:"Datei",c:"file",x:61,y:10},
 {t:"color_grade_v1.mov",l:"Datei",c:"file",x:11,y:55},
 {t:"2.16 GB · 847 Dateien",l:"Größe",c:"size",x:88,y:53},
 {t:"vor 3 Jahren",l:"Zeit",c:"time",x:50,y:72}
];
const chipWrap=document.getElementById('chips');
chipWrap.innerHTML=CHIP.map(c=>`<span class="chip ${c.c}" style="left:${c.x}%;top:${c.y}%"><i class="d"></i><span class="mono">${c.t}</span><span class="lbl">${c.l}</span></span>`).join('');
const chips=[...chipWrap.querySelectorAll('.chip')];

/* ---------- Sterne (leichter Canvas, ~50) ---------- */
const starCv=document.getElementById('stars'), starCtx=starCv.getContext('2d'); let stars=[];
function sizeStars(){ starCv.width=innerWidth; starCv.height=innerHeight; const n=Math.round(innerWidth*innerHeight/26000); stars=[];
  for(let i=0;i<n;i++) stars.push({x:Math.random()*starCv.width,y:Math.random()*starCv.height,r:Math.random()*1.3+0.25,p:Math.random()*6.28,s:0.5+Math.random()*1.4}); }
function frame(t){
  starCtx.clearRect(0,0,starCv.width,starCv.height);
  for(const s of stars){ const a=0.22+0.5*(0.5+0.5*Math.sin(t*0.0011*s.s+s.p));
    starCtx.globalAlpha=a; starCtx.fillStyle='#bcd4ff'; starCtx.beginPath(); starCtx.arc(s.x,s.y,s.r,0,6.2832); starCtx.fill(); }
  starCtx.globalAlpha=1; requestAnimationFrame(frame);
}
sizeStars(); requestAnimationFrame(frame);

/* ---------- Fächer-Layout ---------- */
const DRV={'-2':{h:300,ar:0.631},'-1':{h:424,ar:0.666},'0':{h:318,ar:0.683},'1':{h:238,ar:0.766},'2':{h:378,ar:0.710}};
const REFW=1120, HEROW=520, REST_VIS=318, FAN_BOTTOM=-118;
let fanScale=1, heroTyRest=0, heroScRest=0.5, heroScLift=1;
function fanParts(i){ return {tx:i*126, ty:Math.abs(i)*-12, rot:i*8.5}; }
function cardT(i,dy,sc){ const f=fanParts(i); return `translate(calc(-50% + ${f.tx.toFixed(1)}px), ${(f.ty+(dy||0)).toFixed(1)}px) rotate(${f.rot}deg) scale(${(sc||1).toFixed(3)})`; }
function baseZ(i){ return 10-Math.abs(i); }
function layout(){
  fanScale=Math.min(1,innerWidth/REFW);
  fan.style.setProperty('--fs',fanScale.toFixed(3));
  cards.forEach(c=>{ c.style.height=DRV[c.dataset.i].h+'px'; });
  heroScLift=Math.min(1,innerWidth*0.9/HEROW);
  heroScRest=(REST_VIS*fanScale)/HEROW;
  const restCenterY=(innerHeight-FAN_BOTTOM)-(REST_VIS/2)*fanScale;
  heroTyRest=restCenterY-innerHeight/2;
}
function heroGeom(lift){ return { ty:lerp(heroTyRest,-26,lift), rot:lerp(-90,0,lift), scl:lerp(heroScRest,heroScLift,lift) }; }
function heroT(g,dy,sc){ return `translate(-50%,-50%) translateY(${(g.ty+(dy||0)).toFixed(1)}px) rotate(${g.rot.toFixed(2)}deg) scale(${(g.scl*(sc||1)).toFixed(4)})`; }

/* ---------- Haupt-Animation ---------- */
function apply(p){
  const p1=clamp(p/0.5), p2=clamp((p-0.5)/0.5);
  const lift=easeIO(clamp(p1/0.46));
  const scan=clamp((p1-0.5)/0.4);
  const spread=easeIO(clamp(p1/0.5));
  const done=clamp((scan-0.74)/0.26);
  const flash=Math.sin(clamp(done)*Math.PI);
  const pull=clamp(p2/0.82), pullE=pull*pull;
  const resting=p<0.03;
  cards.forEach(c=>{
    const i=+c.dataset.i; const f=fanParts(i); let tx=f.tx,ty=f.ty,rot=f.rot,scl=1,op=1-0.58*spread;
    if(p2>0){ tx*=(1-pullE); ty=ty*(1-pullE)+(-30)*pullE; rot*=(1-pullE); scl*=(1-0.93*pullE); op*=(1-Math.min(1,pullE*1.25)); }
    c.style.transform=`translate(calc(-50% + ${tx.toFixed(1)}px), ${ty.toFixed(1)}px) rotate(${rot.toFixed(2)}deg) scale(${Math.max(.04,scl).toFixed(3)})`;
    c.style.opacity=Math.max(0,op).toFixed(3);
    c.style.zIndex = p2>0.05 ? 3 : baseZ(i);
  });
  fan.classList.toggle('resting',resting);
  floor.style.opacity=((1-0.7*spread)*(1-pullE)).toFixed(3);
  const g=heroGeom(lift); let hSc=1, hDy=0, hOp=1;
  if(p2>0){ hSc*=(1-0.92*pullE); hDy+=70*pullE; hOp=1-clamp((pullE-0.85)/0.15); }
  hero.style.transform=heroT(g,hDy,hSc);
  hero.style.opacity=hOp.toFixed(3);
  hero.style.filter = flash>0.01 ? `brightness(${(1+0.9*flash).toFixed(3)}) drop-shadow(0 0 ${(46*flash).toFixed(0)}px rgba(95,175,255,${(0.95*flash).toFixed(2)}))` : 'none';
  hero.style.zIndex = p2>0.05 ? 3 : 11;
  hero.classList.toggle('resting',resting);
  const bx=scan*100, ft=6;
  if(scan<=0.002){ xray.style.opacity=0; front.style.opacity=1; front.style.webkitMaskImage=front.style.maskImage='none'; scanline.classList.remove('on','appear'); }
  else if(scan>=0.985){ xray.style.opacity=1; xray.style.webkitMaskImage=xray.style.maskImage='none'; front.style.opacity=0; scanline.classList.remove('on','appear'); }
  else {
    xray.style.opacity=1; front.style.opacity=1;
    xray.style.webkitMaskImage=xray.style.maskImage=`linear-gradient(to right,#000 ${(bx-ft).toFixed(2)}%,transparent ${(bx+ft).toFixed(2)}%)`;
    front.style.webkitMaskImage=front.style.maskImage=`linear-gradient(to right,transparent ${(bx-ft).toFixed(2)}%,#000 ${(bx+ft).toFixed(2)}%)`;
    scanline.style.left=bx.toFixed(2)+'%'; scanline.classList.add('on');
    if(!scanline.classList.contains('appear')) scanline.classList.add('appear');
  }
  bloom.style.opacity=clamp(0.12*lift*(1-pullE) + 1.15*flash).toFixed(3);
  bloom.style.transform=`translate(-50%,-50%) scale(${(0.66+0.12*lift+0.55*flash).toFixed(3)})`;
  shock.style.opacity=(flash*0.95*(1-pullE)).toFixed(3);
  shock.style.transform=`translate(-50%,-50%) scale(${(0.5+2.2*clamp(done)).toFixed(3)})`;
  head.style.filter=`blur(${(20*spread).toFixed(1)}px)`;
  head.style.transform=`scale(${(1+0.15*spread).toFixed(3)})`;
  head.style.opacity=(1-0.82*spread).toFixed(3);
  // Datenpunkte: erscheinen mit dem Scan, gleiten dann sauber in die App (kein Partikel-Trail)
  const tgx=innerWidth/2, tgy=innerHeight*0.72;
  chips.forEach((el,i)=>{
    const c=CHIP[i], sx=c.x/100*innerWidth, sy=c.y/100*innerHeight, ord=i/chips.length;
    const appear=ease(clamp((scan-0.18-ord*0.5)/0.2));
    const fl=clamp((p2-ord*0.16)/0.5), flMag=fl*fl;
    const dx=(tgx-sx)*flMag, dy=(tgy-sy)*flMag;
    const sc=(0.84+0.16*appear)*(1-0.82*flMag);
    const op=appear*(1-clamp((flMag-0.62)/0.38));
    el.style.opacity=op.toFixed(3);
    el.style.transform=`translate(calc(-50% + ${dx.toFixed(1)}px), calc(-50% + ${dy.toFixed(1)}px)) scale(${Math.max(.1,sc).toFixed(3)})`;
  });
  funnel.style.opacity=(clamp((pullE-0.05)/0.4)*0.85).toFixed(3);
  const mb=ease(clamp((p2-0.08)/0.5));
  macbook.style.opacity=mb.toFixed(3);
  macbook.style.transform=`translateX(-50%) translateY(${(60*(1-mb)).toFixed(0)}px) scale(${(0.93+0.07*mb).toFixed(3)})`;
  ingest.style.opacity=(clamp((pullE-0.25)/0.5)*0.9).toFixed(3);
  hint.style.opacity=p>0.05?0:1;
}
function setRest(){ cards.forEach(c=>{ c.style.zIndex=baseZ(+c.dataset.i); c.style.transform=cardT(+c.dataset.i,0,1); c.style.filter=''; });
  const g=heroGeom(0); hero.style.transform=heroT(g,0,1); hero.style.zIndex=11; hero.style.filter=''; }

/* ---------- Hover: NUR wenn der Cursor wirklich über dem Platten-Stapel ist, dezent (20%) ---------- */
const DOCK_SIG=110, DOCK_AMP=0.07, DOCK_LIFT=7;
function clusterBox(){ let x0=1e9,y0=1e9,x1=-1e9,y1=-1e9;
  for(const c of cards){ const r=c.getBoundingClientRect(); if(r.left<x0)x0=r.left; if(r.top<y0)y0=r.top; if(r.right>x1)x1=r.right; if(r.bottom>y1)y1=r.bottom; }
  const r=hero.getBoundingClientRect(); if(r.left<x0)x0=r.left; if(r.top<y0)y0=r.top; if(r.right>x1)x1=r.right; if(r.bottom>y1)y1=r.bottom;
  return {x0,y0,x1,y1}; }
let docked=false;
function dock(e){
  if(curP>=0.03){ if(docked) docked=false; return; }
  const mx=e.clientX,my=e.clientY, b=clusterBox(), m=18;
  if(mx<b.x0-m||mx>b.x1+m||my<b.y0-m||my>b.y1+m){ if(docked){ setRest(); docked=false; } return; }
  docked=true;
  cards.forEach(c=>{ const r=c.getBoundingClientRect(); const d=mx-(r.left+r.width/2); const fct=Math.exp(-(d*d)/(2*DOCK_SIG*DOCK_SIG));
    c.style.zIndex=12+Math.round(fct*14);
    c.style.transform=cardT(+c.dataset.i,-DOCK_LIFT*fct,1+DOCK_AMP*fct); });
  const r=hero.getBoundingClientRect(); const dH=mx-(r.left+r.width/2); const fH=Math.exp(-(dH*dH)/(2*DOCK_SIG*DOCK_SIG));
  const g=heroGeom(0); hero.style.zIndex=12+Math.round(fH*16); hero.style.transform=heroT(g,-DOCK_LIFT*fH,1+DOCK_AMP*fH);
}
addEventListener('mousemove',dock,{passive:true});
document.addEventListener('mouseleave',()=>{ if(curP<0.03&&docked){ setRest(); docked=false; } },{passive:true});

layout(); setRest();
/* ---------- Lerp-Scroll ---------- */
let targetP=0,curP=0,looping=false;
function readTarget(){ const r=rail.getBoundingClientRect(); const span=rail.offsetHeight-innerHeight; targetP=clamp(span>0?(-r.top)/span:0); }
function tick(){ const d=targetP-curP; if(Math.abs(d)<0.0006){ curP=targetP; apply(curP); looping=false; return; } curP+=d*0.085; apply(curP); requestAnimationFrame(tick); }
addEventListener('scroll',()=>{ readTarget(); if(!looping){ looping=true; requestAnimationFrame(tick); } },{passive:true});
addEventListener('resize',()=>{ sizeStars(); layout(); readTarget(); apply(curP); },{passive:true});
readTarget(); curP=targetP; apply(curP);
</script>
</body></html>
